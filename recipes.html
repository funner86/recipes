{id:"zc003",name:"龙井虾仁",cuisine:"浙菜",category:"八大菜系",calories:150,cookingTime:15,difficulty:"简单",ingredients:["虾仁300g","龙井茶5g","蛋清1个","淀粉","料酒","盐"],description:"虾仁洁白如玉茶香清雅，一口入魂。",steps:["龙井茶用80度水冲泡，取茶汤备用","虾仁加蛋清、盐、料酒、淀粉抓匀上浆","锅中油温四成热，下虾仁滑炒至变白","立即捞出控油","锅中留少许油，倒入虾仁","淋入龙井茶汤快速翻炒","撒入几片泡开的茶叶即可"]},
{id:"zc004",name:"宋嫂鱼羹",cuisine:"浙菜",category:"八大菜系",calories:120,cookingTime:40,difficulty:"中等",ingredients:["鳜鱼1条","火腿丝","香菇丝","笋丝","蛋清","高汤","醋","胡椒粉"],description:"鱼羹鲜美酸辣开胃，千年传承的南宋味道。",steps:["鳜鱼蒸熟后取肉拆成碎块","火腿、香菇、笋分别切细丝","高汤烧开，放入笋丝香菇丝煮5分钟","放入鱼肉和火腿丝","加盐、醋、胡椒粉调味","淋入蛋清轻轻搅成蛋花","水淀粉勾薄芡即可"]},
{id:"zc005",name:"干炸响铃",cuisine:"浙菜",category:"八大菜系",calories:350,cookingTime:20,difficulty:"简单",ingredients:["豆腐皮10张","猪肉末150g","鸡蛋","葱","料酒","椒盐"],description:"形如马铃咬之脆响，豆腐皮炸到酥脆。",steps:["猪肉末加葱姜料酒调味","豆腐皮铺开抹上薄薄一层肉馅","卷成圆筒状，用蛋液封口","切成斜段","油温五成热下锅慢炸至金黄酥脆","捞出控油，蘸椒盐食用"]},
{id:"zc006",name:"西湖莼菜汤",cuisine:"浙菜",category:"八大菜系",calories:60,cookingTime:15,difficulty:"简单",ingredients:["莼菜200g","鸡丝","火腿丝","鸡汤","盐"],description:"莼菜滑嫩汤清如玉，西湖特有的水生灵物。",steps:["莼菜轻轻漂洗干净（莼菜很嫩不要揉搓）","鸡汤烧开加盐调味","放入鸡丝和火腿丝","放入莼菜轻轻划散","一烧开立即关火（莼菜不能久煮）","淋少许香油即可"]},
{id:"zc007",name:"酱鸭",cuisine:"浙菜",category:"八大菜系",calories:400,cookingTime:120,difficulty:"中等",ingredients:["整鸭1只","酱油200ml","冰糖50g","黄酒","花椒","八角","桂皮","姜"],description:"色如琥珀酱香浓郁，杭州人过年的必备年味。",steps:["整鸭处理干净，焯水去血沫","锅中加酱油、冰糖、黄酒、各种香料","放入鸭子大火烧开","转小火浸煮1小时（保持微沸）","翻面再浸煮30分钟","关火后在酱汁中浸泡1小时入味","捞出晾凉斩件"]},
{id:"zc008",name:"雪菜大汤黄鱼",cuisine:"浙菜",category:"八大菜系",calories:250,cookingTime:30,difficulty:"中等",ingredients:["大黄鱼1条","雪菜100g","笋丝","姜片","料酒","白胡椒粉"],description:"鱼肉细嫩汤白如奶，雪菜提鲜咸香可口。",steps:["黄鱼处理干净划几刀","锅中油热下姜片爆香","放入黄鱼煎至两面微黄","加入开水（一定要开水汤才白）","大火烧开煮5分钟至汤色变白","放入雪菜和笋丝","小火再炖10分钟","加盐和白胡椒粉调味"]},
{id:"zc009",name:"油焖笋",cuisine:"浙菜",category:"八大菜系",calories:150,cookingTime:20,difficulty:"简单",ingredients:["春笋500g","酱油","白糖","蚝油","料酒"],description:"笋肉鲜嫩油润可口，春天最不可错过的时令菜。",steps:["春笋剥壳切滚刀块","入沸水焯3分钟去草酸","锅中多加油烧热","放入笋块中火煸炒至边缘微黄","加酱油、白糖、蚝油、料酒","加少许水焖5分钟","大火收汁即可"]},
{id:"zc010",name:"东坡肉",cuisine:"浙菜",category:"八大菜系",calories:480,cookingTime:150,difficulty:"中等",ingredients:["五花肉500g","黄酒300ml","酱油","冰糖50g","葱","姜"],description:"色泽红亮肥而不腻，酥烂如豆腐，苏东坡的味觉遗产。",steps:["五花肉整块焯水，切大方块","砂锅底铺葱段和姜片","肉皮朝下放入砂锅中","加黄酒、酱油、冰糖（不加水）","大火烧开转小火慢炖2小时","将肉翻面皮朝上再炖30分钟","至肉酥烂入口即化即可"]},
{id:"zc011",name:"糟鸡",cuisine:"浙菜",category:"八大菜系",calories:300,cookingTime:60,difficulty:"中等",ingredients:["三黄鸡1只","酒糟200g","盐","花椒","黄酒"],description:"糟香浓郁鸡皮脆爽，宁波人夏日的开胃冷盘。",steps:["整鸡煮熟捞出放凉斩件","酒糟加盐花椒黄酒调成糟卤","将鸡肉放入糟卤中浸泡","密封放冰箱冷藏24小时","取出即可食用"]},
{id:"zc012",name:"绍兴醉鸡",cuisine:"浙菜",category:"八大菜系",calories:280,cookingTime:60,difficulty:"简单",ingredients:["鸡腿2个","绍兴黄酒200ml","枸杞","当归","盐"],description:"黄酒浸泡的鸡肉酒香四溢，冰凉鲜嫩。",steps:["鸡腿煮熟捞出放凉","当归枸杞用少量水煮5分钟出味","将黄酒和当归水混合加盐","鸡肉浸泡在酒汁中","冰箱冷藏过夜","切片食用"]},
{id:"zc013",name:"片儿川",cuisine:"浙菜",category:"八大菜系",calories:400,cookingTime:15,difficulty:"简单",ingredients:["面条200g","雪菜","笋片","瘦肉片","酱油","猪油"],description:"雪菜笋片肉片三鲜合一，杭州人最爱的面食。",steps:["瘦肉片加酱油腌制","锅中猪油炒香肉片","加入雪菜和笋片翻炒","加足量开水","下面条煮熟","加盐调味即可"]},
{id:"zc014",name:"猫耳朵",cuisine:"浙菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["面粉200g","虾仁","火腿丁","青豆","鸡汤","盐"],description:"面片形似猫耳朵小巧可爱，杭州传统面食。",steps:["面粉加水和成面团擀薄切小丁","用拇指将每个面丁碾成猫耳朵状","鸡汤烧开放入猫耳朵煮5分钟","加入虾仁火腿丁青豆","加盐调味即可"]},
{id:"zc015",name:"西湖牛肉羹",cuisine:"浙菜",category:"八大菜系",calories:150,cookingTime:20,difficulty:"简单",ingredients:["牛肉末100g","嫩豆腐","鸡蛋清","香菜","鸡汤","淀粉"],description:"汤鲜味醇牛肉嫩滑，杭州名汤羹。",steps:["牛肉末加料酒腌制","鸡汤烧开，放入牛肉末搅散","加入切碎的豆腐","加盐和胡椒粉调味","水淀粉勾芡","淋入蛋清搅成蛋花","撒上香菜"]},
{id:"zc016",name:"干菜焖肉",cuisine:"浙菜",category:"八大菜系",calories:480,cookingTime:120,difficulty:"中等",ingredients:["五花肉400g","梅干菜150g","酱油","冰糖","黄酒","姜"],description:"梅干菜吸饱肉油比肉还香，绍兴人的家乡味。",steps:["五花肉切块焯水","梅干菜泡发洗净","锅中炒糖色放入肉块翻炒","加酱油黄酒姜","梅干菜铺在肉上","加水大火烧开转小火焖1.5小时","大火收汁"]},
{id:"zc017",name:"宁波汤圆",cuisine:"浙菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"中等",ingredients:["糯米粉300g","黑芝麻100g","猪板油80g","白糖80g","桂花"],description:"皮薄馅大糯而不粘，咬一口芝麻馅缓缓流淌。",steps:["黑芝麻炒熟打成粉","芝麻粉加白糖和猪板油拌匀成馅","将馅搓成小球冷藏定型","糯米粉加温水和面","取面团按扁包入芝麻馅","收口搓圆","水开下汤圆煮至浮起再煮1分钟即可"]},
{id:"zc018",name:"葱包烩",cuisine:"浙菜",category:"八大菜系",calories:250,cookingTime:10,difficulty:"简单",ingredients:["春卷皮","油条","小葱","甜面酱","辣酱"],description:"春卷皮裹油条葱段煎至酥脆，杭州街头小吃。",steps:["油条切段，小葱切段","春卷皮摊开，放油条和葱段","紧紧卷起","平底锅少油小火慢煎","煎至两面金黄","刷上甜面酱和辣酱即可"]},
{id:"zc019",name:"定胜糕",cuisine:"浙菜",category:"八大菜系",calories:220,cookingTime:30,difficulty:"中等",ingredients:["糯米粉","粳米粉","红豆沙","白糖","红曲粉"],description:"粉红色元宝形寓意定胜，杭州传统糕点。",steps:["糯米粉和粳米粉混合加糖","加少量水搓成雪花粉","模具中先铺一层粉","放上红豆沙馅","再铺一层粉压平","上蒸锅大火蒸20分钟","脱模即可"]},
{id:"zc020",name:"西湖龙井虾仁",cuisine:"浙菜",category:"八大菜系",calories:150,cookingTime:15,difficulty:"简单",ingredients:["虾仁300g","龙井茶5g","蛋清1个","淀粉","料酒","盐"],description:"虾仁洁白如玉茶香清雅，一口入魂。",steps:["龙井茶用80度水冲泡，取茶汤备用","虾仁加蛋清、盐、料酒、淀粉抓匀上浆","锅中油温四成热，下虾仁滑炒至变白","立即捞出控油","锅中留少许油，倒入虾仁","淋入龙井茶汤快速翻炒","撒入几片泡开的茶叶即可"]},
{id:"zc021",name:"莼菜鱼圆汤",cuisine:"浙菜",category:"八大菜系",calories:120,cookingTime:25,difficulty:"中等",ingredients:["莼菜200g","鱼肉200g","鸡蛋清","鸡汤","盐"],description:"鱼圆嫩滑莼菜滑腻，清汤中两滑相得益彰。",steps:["鱼肉打成泥加蛋清盐搅拌起胶","用虎口挤出鱼圆入温水定型","鸡汤烧开放入鱼圆煮3分钟","放入莼菜","一开即关火"]},
{id:"zc022",name:"新风鳗鲞",cuisine:"浙菜",category:"八大菜系",calories:300,cookingTime:60,difficulty:"中等",ingredients:["鳗鱼1条","盐","姜","醋"],description:"冬日冷风吹干的鳗鱼干，蒸熟后撕成丝蘸醋吃。",steps:["鳗鱼去内脏洗净不刮鳞","用盐腌制2小时","挂在通风处让冷风吹干3-5天","吃的时候取下来蒸20分钟","撕成丝蘸姜丝醋食用"]},
{id:"zc023",name:"宁波烤菜",cuisine:"浙菜",category:"八大菜系",calories:120,cookingTime:30,difficulty:"中等",ingredients:["青菜500g","酱油","糖","醋","干辣椒"],description:"青菜烤至焦香入味，咸甜微辣冷吃更佳。",steps:["青菜整棵焯水挤干","锅中多油放入青菜","小火慢慢翻炒至菜叶焦黄","加酱油糖醋干辣椒","继续翻炒至汁收干","放凉食用"]},
{id:"zc024",name:"杭州卤鸭",cuisine:"浙菜",category:"八大菜系",calories:380,cookingTime:90,difficulty:"中等",ingredients:["整鸭1只","酱油","冰糖","黄酒","八角","桂皮","姜"],description:"卤汁浓郁鸭肉入味，杭州人餐桌上的常客。",steps:["整鸭焯水洗净","锅中加酱油冰糖黄酒香料","放入鸭子加水没过","大火烧开转小火卤制1小时","翻面上色","大火收汁至浓稠"]},
{id:"zc025",name:"张生记老鸭煲",cuisine:"浙菜",category:"八大菜系",calories:450,cookingTime:240,difficulty:"中等",ingredients:["老鸭1只","火腿","笋干","枸杞","姜","黄酒"],description:"老鸭慢火炖煮汤浓味鲜，杭州名店的招牌菜。",steps:["老鸭焯水去血沫","笋干提前泡发","砂锅加足量水放入老鸭","加火腿片、笋干、姜片、黄酒","大火烧开转小火炖3小时","加枸杞和盐调味"]},
{id:"zc026",name:"虎跑泉水牛肉",cuisine:"浙菜",category:"八大菜系",calories:300,cookingTime:90,difficulty:"中等",ingredients:["牛腱子肉500g","虎跑泉水（或矿泉水）","姜","花椒","盐","蘸水"],description:"用虎跑泉水煮的牛肉格外鲜甜，原汁原味才是顶级。",steps:["牛腱子肉整块冷水下锅焯水","换虎跑泉水加姜片花椒","大火烧开转小火炖1.5小时","捞出切片","蘸生抽蒜泥食用"]},
{id:"zc027",name:"龙井问茶",cuisine:"浙菜",category:"八大菜系",calories:80,cookingTime:10,difficulty:"简单",ingredients:["龙井茶5g","虎跑泉水","玻璃杯"],description:"不是菜是茶，却是杭州饮食文化的灵魂。",steps:["虎跑泉水烧至80度","杯中放龙井茶叶","先倒少量水润茶闻香","再冲入80度水至七分满","看着茶叶在水中舒展","慢慢品味"]},
{id:"zc028",name:"抱腌菜",cuisine:"浙菜",category:"八大菜系",calories:30,cookingTime:10080,difficulty:"简单",ingredients:["大白菜","盐","花椒","姜"],description:"杭州人冬日的必备腌菜，酸爽清脆开胃解腻。",steps:["白菜洗净沥干切段","加盐和花椒揉搓均匀","放入缸中用石头压住","密封发酵7-10天","取出即可炒食或凉拌"]},
{id:"zc029",name:"荷花酥",cuisine:"浙菜",category:"八大菜系",calories:250,cookingTime:40,difficulty:"困难",ingredients:["面粉","猪油","红豆沙","糖粉"],description:"形如荷花层层绽放，杭州传统酥点颜值担当。",steps:["油皮和油酥分别和好","油皮包油酥反复擀开折叠","切成圆片包入豆沙馅","表面划十字刀","油温四成热小火慢炸","炸至开花如荷花即可"]},
{id:"zc030",name:"西湖雪媚娘",cuisine:"浙菜",category:"八大菜系",calories:250,cookingTime:25,difficulty:"中等",ingredients:["糯米粉","淡奶油","芒果","糖"],description:"软糯Q弹包裹奶油和水果，西湖边的网红甜品。",steps:["糯米粉加水蒸熟揉成面团","淡奶油打发","面团擀薄包入奶油和芒果丁","收口朝下摆放"]},
{id:"zc031",name:"绍三鲜",cuisine:"浙菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["鸡肉","猪肉","鱼圆","蛋饺","火腿","香菇","青菜","高汤"],description:"一锅三鲜汇聚，绍兴宴席的头道大菜。",steps:["鸡肉猪肉煮熟切片","砂锅加高汤烧开","依次码入各种食材","小火炖15分钟","加盐调味即可"]},
{id:"zc032",name:"绍兴臭豆腐",cuisine:"浙菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"简单",ingredients:["臭豆腐","辣椒酱","蒜蓉","香菜"],description:"闻着臭吃着香，外酥里嫩回味无穷。",steps:["臭豆腐切块沥干","油温七成热下锅炸","炸至金黄酥脆捞出","淋辣椒酱蒜蓉","撒上香菜"]},
{id:"zc033",name:"宁波汤团",cuisine:"浙菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"中等",ingredients:["糯米粉","黑芝麻","猪板油","白糖"],description:"皮薄馅大糯而不粘，咬一口芝麻馅缓缓流淌。",steps:["黑芝麻炒熟打成粉","芝麻粉加白糖和猪板油拌匀成馅","将馅搓成小球冷藏定型","糯米粉加温水和面","取面团按扁包入芝麻馅","收口搓圆","水开下汤圆煮至浮起"]},
{id:"zc034",name:"干炸臭豆腐",cuisine:"浙菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"简单",ingredients:["臭豆腐","辣椒酱","蒜蓉","香菜"],description:"闻着臭吃着香，外酥里嫩回味无穷。",steps:["臭豆腐切块沥干","油温七成热下锅炸","炸至金黄酥脆捞出","淋辣椒酱蒜蓉","撒上香菜"]},
{id:"zc035",name:"西湖醋鱼",cuisine:"浙菜",category:"八大菜系",calories:200,cookingTime:25,difficulty:"中等",ingredients:["草鱼1条","醋3勺","白糖2勺","姜末","酱油","淀粉"],description:"鱼肉鲜嫩酸甜适口，杭州的味道名片。",steps:["草鱼处理干净，两面划刀","锅中水加姜片烧开","将鱼放入沸水中烫煮3-4分钟至熟","捞出装盘","另起锅加酱油、醋、白糖、姜末煮开","水淀粉勾芡至浓稠","浇在鱼身上即可"]},
{id:"zc036",name:"虾爆鳝面",cuisine:"浙菜",category:"八大菜系",calories:450,cookingTime:25,difficulty:"中等",ingredients:["面条200g","虾仁","鳝鱼","洋葱","酱油","猪油"],description:"河虾和鳝鱼的双鲜合璧，杭州奎元馆的招牌面。",steps:["鳝鱼切段焯水","虾仁上浆滑油","锅中猪油爆香洋葱","放入鳝段翻炒","加酱油和高汤烧开","下面条煮熟","放入虾仁撒葱花"]},
{id:"zc037",name:"宋嫂鱼羹面",cuisine:"浙菜",category:"八大菜系",calories:380,cookingTime:20,difficulty:"简单",ingredients:["面条150g","鱼肉","火腿丝","香菇丝","蛋清","醋","胡椒粉"],description:"将宋嫂鱼羹的精髓融入面条，酸辣鲜美。",steps:["鱼肉蒸熟拆碎","锅中高汤烧开","下面条煮至八分熟","加入鱼肉火腿丝香菇丝","加醋和胡椒粉调味","淋入蛋清搅成蛋花"]},
{id:"zc038",name:"杭州小笼包",cuisine:"浙菜",category:"八大菜系",calories:280,cookingTime:40,difficulty:"中等",ingredients:["面粉","猪肉末","皮冻","姜","酱油","糖"],description:"皮薄汤多肉馅鲜美，一口一个小心烫嘴。",steps:["猪肉末加皮冻碎和调味料拌成馅","面粉加温水和面醒30分钟","擀成中间厚边薄的皮","包入馅料收口","上蒸锅大火蒸8分钟"]},
{id:"zc039",name:"酱萝卜",cuisine:"浙菜",category:"八大菜系",calories:30,cookingTime:1440,difficulty:"简单",ingredients:["白萝卜1根","酱油","白糖","醋","姜","蒜"],description:"脆爽酸甜开胃解腻，杭州人餐桌上的必备小菜。",steps:["白萝卜切薄片或条","加盐腌制1小时挤去水分","酱油加白糖煮开放凉","加醋姜蒜调成酱汁","将萝卜浸泡在酱汁中","放冰箱腌制24小时"]},
{id:"zc040",name:"龙井虾仁炒饭",cuisine:"浙菜",category:"八大菜系",calories:400,cookingTime:10,difficulty:"简单",ingredients:["米饭2碗","虾仁150g","龙井茶","鸡蛋2个","盐"],description:"龙井茶香渗入每一粒米饭，杭州风味的炒饭。",steps:["龙井茶冲泡取茶汤和茶叶","虾仁滑油盛出","鸡蛋炒成蛋碎","锅中油热倒入米饭大火翻炒","淋入龙井茶汤","加入虾仁和蛋碎","撒上泡开的茶叶"]},
{id:"zc041",name:"笋干老鸭煲",cuisine:"浙菜",category:"八大菜系",calories:480,cookingTime:240,difficulty:"中等",ingredients:["老鸭1只","笋干200g","火腿","枸杞","姜","黄酒"],description:"老鸭慢火炖煮汤浓味鲜，杭州名店的招牌菜。",steps:["老鸭焯水去血沫","笋干提前泡发切段","砂锅加足量水放入老鸭","加火腿片、笋干、姜片、黄酒","大火烧开转小火炖3小时","加枸杞和盐调味"]},
{id:"zc042",name:"杭州卤鸭",cuisine:"浙菜",category:"八大菜系",calories:380,cookingTime:90,difficulty:"中等",ingredients:["整鸭1只","酱油","冰糖","黄酒","八角","桂皮","姜"],description:"卤汁浓郁鸭肉入味，杭州人餐桌上的常客。",steps:["整鸭焯水洗净","锅中加酱油冰糖黄酒香料","放入鸭子加水没过","大火烧开转小火卤制1小时","翻面上色","大火收汁至浓稠"]},
{id:"zc043",name:"糖醋排骨",cuisine:"浙菜",category:"八大菜系",calories:400,cookingTime:40,difficulty:"中等",ingredients:["猪小排400g","醋","白糖","酱油","料酒","姜"],description:"排骨酥烂酸甜可口，杭帮菜中的家常经典。",steps:["排骨斩段焯水洗净","锅中少许油将排骨煎至微黄","加姜片料酒酱油翻炒","加开水没过排骨炖30分钟","加大量白糖和醋","大火收汁至浓稠"]},
{id:"zc044",name:"龙井茶酥",cuisine:"浙菜",category:"八大菜系",calories:300,cookingTime:40,difficulty:"中等",ingredients:["面粉","猪油","龙井茶粉","糖粉"],description:"层层酥脆茶香四溢，杭州特色的茶点。",steps:["龙井茶叶碾成细粉","油皮和油酥分别和好","油皮包油酥反复擀开折叠","撒上龙井茶粉","切成方块入烤箱","180度烤20分钟至金黄"]},
{id:"zc045",name:"糟溜鱼片",cuisine:"浙菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"中等",ingredients:["鱼肉片300g","酒糟","木耳","鸡蛋清","淀粉","鸡汤"],description:"糟香浓郁鱼片嫩滑，浙菜酒糟技法的代表。",steps:["鱼肉片加蛋清淀粉上浆","锅中水微沸将鱼片滑熟捞出","另锅加鸡汤和酒糟烧开","加盐糖调味","放入鱼片和木耳","勾薄芡轻轻推匀"]},

{id:"fc001",name:"佛跳墙",cuisine:"闽菜",category:"八大菜系",calories:500,cookingTime:300,difficulty:"困难",ingredients:["鲍鱼","海参","鱼翅","花胶","干贝","鸽蛋","猪蹄","老母鸡","金华火腿","花菇","花雕酒"],description:"坛启荤香飘四邻佛闻弃禅跳墙来。顶级闽菜用料奢华工序繁复。",steps:["所有干货提前2-3天分别泡发","老母鸡和猪蹄熬制高汤4小时","将所有材料分层码入瓦罐中","倒入熬好的高汤没过食材","加入花雕酒和调味的酱油","用荷叶封口再盖紧盖子","小火慢炖3-4小时","上桌时连坛一起端上"]},
{id:"fc002",name:"荔枝肉",cuisine:"闽菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["猪瘦肉300g","荸荠100g","番茄酱","醋","白糖","淀粉","蒜"],description:"肉块形似荔枝酸甜可口，福州人从小吃到大的家乡味。",steps:["猪肉切块，剞十字花刀（炸后会卷起像荔枝）","加盐料酒腌制后裹上水淀粉","油温六成热下锅炸至金黄卷曲捞出","锅中少油炒香蒜末和番茄酱","加白糖、醋、少许水烧开","水淀粉勾芡至浓稠","倒入炸好的肉块和荸荠翻炒均匀"]},
{id:"fc003",name:"醉排骨",cuisine:"闽菜",category:"八大菜系",calories:400,cookingTime:40,difficulty:"中等",ingredients:["猪排骨400g","黄酒50ml","酱油","番茄酱","白糖","醋","蒜蓉"],description:"酒香浓郁酸甜开胃，下酒下饭皆宜的闽菜名品。",steps:["排骨斩段焯水洗净","油温六成热下排骨炸至金红捞出","调醉汁：黄酒+酱油+番茄酱+白糖+醋+蒜蓉","锅中少油，倒入醉汁烧开","放入炸好的排骨翻炒","大火收汁至汁浓附着排骨即可"]},
{id:"fc004",name:"蚵仔煎",cuisine:"闽菜",category:"八大菜系",calories:300,cookingTime:15,difficulty:"简单",ingredients:["鲜蚝200g","地瓜粉100g","鸡蛋2个","生菜","蒜蓉酱","香菜"],description:"海蛎鲜甜地瓜粉Q弹，闽南街头巷尾的经典小吃。",steps:["海蛎用清水漂洗干净沥干","地瓜粉加水调成浆状","平底锅多油烧热","倒入地瓜粉浆摊匀","在地瓜粉上铺满海蛎","打入鸡蛋，用铲子划散","底部煎至金黄酥脆翻面","煎至两面金黄，配上蒜蓉酱和香菜"]},
{id:"fc005",name:"卤面",cuisine:"闽菜",category:"八大菜系",calories:450,cookingTime:30,difficulty:"中等",ingredients:["面条200g","猪肉","虾仁","鱿鱼","香菇","黄花菜","高汤","酱油"],description:"面条吸满浓稠卤汁，闽南人待客的最高礼遇。",steps:["面条煮至八成熟捞出拌油","锅中炒香香菇丝猪肉丝","加入高汤和各种海鲜配料煮开","加酱油调味","水淀粉勾芡至汤汁浓稠","放入面条小火煮2分钟入味"]},
{id:"fc006",name:"福州鱼丸",cuisine:"闽菜",category:"八大菜系",calories:250,cookingTime:40,difficulty:"中等",ingredients:["鲜鱼肉500g","猪肉末200g","姜葱水","盐","淀粉"],description:"外皮弹牙内馅多汁，咬一口肉馅的汁水在口中爆开。",steps:["鱼肉去骨去皮打成泥","加盐和冰水搅拌起胶","加淀粉继续搅拌至Q弹","猪肉末加姜葱水调味成馅","手中抹油，取鱼浆压扁包入肉馅","搓成圆形入冷水锅中","全部做完后开小火慢慢煮熟（不能大火）"]},
{id:"fc007",name:"红糟肉",cuisine:"闽菜",category:"八大菜系",calories:400,cookingTime:60,difficulty:"中等",ingredients:["五花肉400g","红糟2勺","蒜","姜","料酒","白糖"],description:"红糟赋予独特酒香和红润色泽，闽菜特色调味。",steps:["五花肉整块焯水后切片","锅中少许油煸香姜片和蒜","放入肉片煸炒出油","加入红糟翻炒均匀","加料酒和少许水焖20分钟","加白糖提鲜，收汁即可"]},
{id:"fc008",name:"海蛎煎蛋",cuisine:"闽菜",category:"八大菜系",calories:280,cookingTime:10,difficulty:"简单",ingredients:["海蛎200g","鸡蛋3个","地瓜粉","葱花","盐","鱼露"],description:"海蛎与鸡蛋的结合，鲜美无比的家常菜。",steps:["海蛎洗净沥干","鸡蛋打散加地瓜粉水调匀","放入海蛎和葱花","平底锅多油烧热","倒入蛋液摊平","中小火煎至底部金黄","翻面继续煎至两面金黄"]},
{id:"fc009",name:"沙茶面",cuisine:"闽菜",category:"八大菜系",calories:450,cookingTime:20,difficulty:"简单",ingredients:["面条200g","沙茶酱","虾仁","鱿鱼","豆腐","豆芽","花生酱"],description:"沙茶酱香浓郁汤头鲜美，厦门人的灵魂早餐。",steps:["沙茶酱加花生酱用高汤调开","锅中烧开沙茶汤","下面条和海鲜配料煮熟","放入豆芽和豆腐","盛入碗中淋上沙茶汤"]},
{id:"fc010",name:"五香卷",cuisine:"闽菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["猪肉末300g","荸荠","洋葱","五香粉","豆腐皮","鸡蛋"],description:"豆腐皮包裹五香肉馅炸至金黄，闽南传统小吃。",steps:["猪肉末加荸荠碎洋葱碎五香粉调味","豆腐皮切成方块","将肉馅放在腐皮上卷起","用蛋液封口","入油锅炸至金黄","切段配甜辣酱食用"]},
{id:"fc011",name:"扁肉燕",cuisine:"闽菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"中等",ingredients:["猪肉","燕皮（猪肉捶成的薄皮）","虾仁","葱花","高汤"],description:"燕皮薄如纸透明如翼，福州独有的肉包肉。",steps:["猪肉加虾仁剁成泥调味","燕皮切成方块","包入肉馅捏成燕子形","高汤烧开","放入扁肉燕煮至浮起","撒葱花即可"]},
{id:"fc012",name:"太平燕",cuisine:"闽菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["扁肉燕","鸭蛋","粉丝","高汤","葱花"],description:"福州人过年必吃，太平燕寓意岁岁平安。",steps:["鸭蛋煮熟剥壳","高汤烧开放入扁肉燕","放入粉丝和鸭蛋","煮至扁肉燕浮起","撒葱花即可"]},
{id:"fc013",name:"锅边糊",cuisine:"闽菜",category:"八大菜系",calories:280,cookingTime:15,difficulty:"简单",ingredients:["大米浆","虾皮","紫菜","葱花","虾油"],description:"米浆沿锅边淋下形成的薄片，福州人的早餐记忆。",steps:["大锅烧热抹油","沿锅边淋入大米浆","米浆受热凝固成薄片","用铲子铲入锅中汤里","加虾皮紫菜葱花虾油","煮开即可"]},
{id:"fc014",name:"芋泥",cuisine:"闽菜",category:"八大菜系",calories:300,cookingTime:40,difficulty:"中等",ingredients:["槟榔芋500g","白糖100g","猪油80g","红枣","芝麻"],description:"芋泥绵密香甜热乎乎，福州的传统甜品。",steps:["芋头蒸熟压成泥","锅中放猪油和白糖","倒入芋泥小火翻炒","不停搅拌至猪油充分吸收","盛入碗中表面放红枣芝麻"]},
{id:"fc015",name:"肉燕",cuisine:"闽菜",category:"八大菜系",calories:280,cookingTime:40,difficulty:"中等",ingredients:["猪肉500g","淀粉","高汤","盐","葱花"],description:"猪肉千锤百炼成燕皮，包入肉馅鲜上加鲜。",steps:["猪肉用木棒反复捶打成泥","撒上淀粉继续捶打至薄如纸","切成方块即成燕皮","剩余肉泥调味成馅","燕皮包入肉馅","高汤中煮熟"]},
{id:"fc016",name:"爆炒双脆",cuisine:"闽菜",category:"八大菜系",calories:300,cookingTime:15,difficulty:"困难",ingredients:["猪腰","海蜇皮","青椒","酱油","醋","淀粉"],description:"猪腰脆海蜇脆，一盘中两种截然不同的脆。",steps:["猪腰去筋膜切花刀焯水","海蜇皮泡发切块焯水","大火热油爆香蒜片","放入猪腰和海蜇快速翻炒","淋入酱汁翻炒10秒出锅"]},
{id:"fc017",name:"佛跳墙素版",cuisine:"闽菜",category:"八大菜系",calories:250,cookingTime:200,difficulty:"中等",ingredients:["花菇","竹荪","猴头菇","莲子","栗子","素高汤"],description:"素食版的佛跳墙，用菌菇代替海鲜同样鲜美。",steps:["各种菌菇提前泡发","素高汤用多种菌菇熬制","将所有食材码入瓦罐","倒入素高汤","小火慢炖3小时"]},
{id:"fc018",name:"淡糟螺片",cuisine:"闽菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"中等",ingredients:["海螺片300g","红糟","姜","料酒","糖"],description:"红糟炒螺片，糟香与海鲜的完美结合。",steps:["螺片切薄片，焯水3秒捞出","锅中油热炒香姜末和红糟","放入螺片快速翻炒","加料酒和少许糖","快速翻炒均匀出锅"]},
{id:"fc019",name:"鱼丸汤",cuisine:"闽菜",category:"八大菜系",calories:180,cookingTime:25,difficulty:"中等",ingredients:["福州鱼丸","葱花","虾皮","紫菜","高汤","醋"],description:"一碗清汤配上弹牙鱼丸，闽菜汤品的代表。",steps:["高汤烧开放入鱼丸","煮至鱼丸浮起","碗中放紫菜虾皮葱花","盛入鱼丸和汤","加少许醋"]},
{id:"fc020",name:"醉蟹",cuisine:"闽菜",category:"八大菜系",calories:250,cookingTime:1440,difficulty:"中等",ingredients:["活蟹2只","黄酒","酱油","糖","姜","蒜"],description:"生蟹用黄酒醉制，鲜美至极的海味冷盘。",steps:["活蟹洗净放入容器中","黄酒加酱油糖姜蒜调成醉汁","将醉汁倒入蟹中","密封腌制24小时","取出斩件食用"]},
{id:"fc021",name:"炒米粉",cuisine:"闽菜",category:"八大菜系",calories:420,cookingTime:15,difficulty:"简单",ingredients:["米粉200g","虾仁","鱿鱼","香菇","白菜","酱油"],description:"闽南人最家常的主食，配料丰富镬气十足。",steps:["米粉用温水泡软沥干","锅中炒香香菇丝和海鲜","加入白菜丝翻炒","放入米粉大火翻炒","加酱油调味","炒至米粉散开入味"]},
{id:"fc022",name:"土笋冻",cuisine:"闽菜",category:"八大菜系",calories:100,cookingTime:60,difficulty:"简单",ingredients:["沙虫（土笋）","蒜蓉酱","酱油","醋","芥末"],description:"晶莹剔透Q弹爽滑，厦门独有的海洋果冻。",steps:["沙虫洗净熬煮出胶质","过滤后倒入模具","冷却凝固成冻","切块蘸蒜蓉酱油醋芥末食用"]},
{id:"fc023",name:"同安封肉",cuisine:"闽菜",category:"八大菜系",calories:500,cookingTime:120,difficulty:"中等",ingredients:["五花肉500g","蒜","酱油","糖","八角"],description:"用纱布包裹蒸制，肉香完全锁住肥而不腻。",steps:["五花肉整块焯水","用纱布将肉包裹扎紧","加酱油糖八角蒸2小时","取出解开纱布","切片装盘"]},
{id:"fc024",name:"姜母鸭",cuisine:"闽菜",category:"八大菜系",calories:500,cookingTime:90,difficulty:"中等",ingredients:["鸭子1只","老姜200g","米酒","酱油","冰糖"],description:"老姜的辛辣与鸭肉的鲜美完美结合，闽南冬季进补首选。",steps:["老姜切片入锅煸炒至焦香","鸭子斩块焯水","砂锅底铺满姜片","放入鸭块","加米酒酱油冰糖","不加水小火焖煮1小时"]},
{id:"fc025",name:"面线糊",cuisine:"闽菜",category:"八大菜系",calories:300,cookingTime:20,difficulty:"简单",ingredients:["面线","虾仁","海蛎","猪血","葱花","胡椒粉"],description:"细如发丝的面线煮成糊状，泉州人的暖心早餐。",steps:["锅中加水和高汤烧开","放入虾仁海蛎猪血等配料","面线捏碎放入锅中","煮至浓稠糊状","加盐胡椒粉调味","撒葱花"]},
{id:"fc026",name:"润饼",cuisine:"闽菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"中等",ingredients:["润饼皮","豆芽","胡萝卜","蛋皮","花生粉","糖","香菜"],description:"薄饼卷各色蔬菜，福州人清明时节的必吃。",steps:["各种蔬菜切丝焯水","蛋皮切丝","润饼皮摊开","依次铺上各种菜丝","撒花生粉和糖","紧紧卷起"]},
{id:"fc027",name:"鼎边糊",cuisine:"闽菜",category:"八大菜系",calories:250,cookingTime:15,difficulty:"简单",ingredients:["大米浆","海蛎","虾皮","紫菜","虾油","葱花"],description:"福州版的锅边糊，米浆沿锅边淋下形成薄片。",steps:["大锅烧热抹油","沿锅边淋入大米浆","米浆受热凝固成薄片","用铲子铲入锅中汤里","加海蛎虾皮紫菜虾油","煮开撒葱花"]},
{id:"fc028",name:"海蛎羹",cuisine:"闽菜",category:"八大菜系",calories:150,cookingTime:10,difficulty:"简单",ingredients:["海蛎200g","地瓜粉","姜丝","葱花","醋","胡椒粉"],description:"海蛎裹着薄薄地瓜粉浆滑入汤中，鲜美嫩滑。",steps:["海蛎洗净沥干","地瓜粉加水调成浆","海蛎裹上薄薄一层地瓜粉浆","锅中水烧开，逐颗放入海蛎","海蛎浮起即熟","加姜丝醋胡椒粉葱花"]},
{id:"fc029",name:"炸五香",cuisine:"闽菜",category:"八大菜系",calories:380,cookingTime:25,difficulty:"中等",ingredients:["五花肉","荸荠","洋葱","五香粉","豆腐皮"],description:"闽南版的五香肉卷，外酥里嫩香气扑鼻。",steps:["五花肉荸荠洋葱切碎加五香粉调味","用豆腐皮卷成条","入油锅小火炸至金黄","切片配甜辣酱"]},
{id:"fc030",name:"肉粽",cuisine:"闽菜",category:"八大菜系",calories:450,cookingTime:120,difficulty:"中等",ingredients:["糯米","五花肉","咸蛋黄","香菇","栗子","粽叶","酱油"],description:"闽南肉粽料足味美，一个管饱。",steps:["糯米和五花肉加酱油炒香","粽叶包入米和馅料","五花肉咸蛋黄香菇栗子放入","包裹扎紧","大锅水煮2小时"]},
{id:"fc031",name:"沙虫冻",cuisine:"闽菜",category:"八大菜系",calories:100,cookingTime:60,difficulty:"简单",ingredients:["沙虫","蒜蓉酱","酱油","醋","芥末"],description:"晶莹剔透Q弹爽滑，厦门独有的海洋果冻。",steps:["沙虫洗净熬煮出胶质","过滤后倒入模具","冷却凝固成冻","切块蘸蒜蓉酱油醋芥末食用"]},
{id:"fc032",name:"炒线面",cuisine:"闽菜",category:"八大菜系",calories:400,cookingTime:15,difficulty:"中等",ingredients:["线面200g","猪肉丝","虾仁","香菇","韭黄","酱油"],description:"线面细如发丝先炸后炒，福州宴席的主食。",steps:["线面入油锅炸至蓬松捞出","锅中炒香猪肉丝虾仁香菇","加少许水烧开","放入炸好的线面快速翻炒","加韭黄翻匀"]},
{id:"fc033",name:"花生汤",cuisine:"闽菜",category:"八大菜系",calories:200,cookingTime:120,difficulty:"简单",ingredients:["花生200g","白糖","牛奶或炼乳"],description:"花生炖至入口即化汤白如奶，福州甜品之王。",steps:["花生用开水烫过去皮","加水大火煮开转小火","慢炖2小时至花生酥烂","加白糖调味","可加少许牛奶或炼乳"]},
{id:"fc034",name:"太极芋泥",cuisine:"闽菜",category:"八大菜系",calories:320,cookingTime:40,difficulty:"中等",ingredients:["槟榔芋500g","白糖100g","猪油","红豆沙"],description:"芋泥和豆沙摆成太极图案，福州宴席甜品。",steps:["芋头蒸熟压成泥加糖和猪油炒至绵密","红豆沙同样炒好","盘中用芋泥和豆沙摆成太极图","蒸5分钟热透即可"]},
{id:"fc035",name:"白炒鲜鱿",cuisine:"闽菜",category:"八大菜系",calories:200,cookingTime:10,difficulty:"简单",ingredients:["鲜鱿鱼300g","青椒","红椒","盐","料酒","淀粉"],description:"洁白爽脆原汁原味，闽菜清炒海味的经典。",steps:["鱿鱼切花刀片","快速焯水5秒捞出","大火热油爆香青红椒","放入鱿鱼快速翻炒","加盐料酒调味","勾薄芡出锅"]},
{id:"fc036",name:"南煎肝",cuisine:"闽菜",category:"八大菜系",calories:250,cookingTime:10,difficulty:"困难",ingredients:["猪肝300g","酱油","糖","醋","淀粉","葱"],description:"猪肝嫩滑无比酸甜可口，火候精准是关键。",steps:["猪肝切片，加酱油淀粉抓匀","油温八成热快速滑油5秒捞出","锅中调好酸甜汁","倒回猪肝和葱段","快速翻匀出锅"]},
{id:"fc037",name:"蛏干炖排骨",cuisine:"闽菜",category:"八大菜系",calories:350,cookingTime:90,difficulty:"简单",ingredients:["蛏干50g","排骨300g","姜","料酒","盐"],description:"蛏干的鲜味渗入排骨汤中，鲜上加鲜。",steps:["蛏干提前泡发","排骨焯水","砂锅加水放入排骨和蛏干","加姜片料酒","大火烧开转小火炖1小时","加盐调味"]},
{id:"fc038",name:"鱼面",cuisine:"闽菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["鱼肉500g","淀粉","盐"],description:"用鱼肉做成的面条，Q弹鲜美海味十足。",steps:["鱼肉去骨去皮打成泥","加盐和淀粉搅拌起胶","擀成薄片切成面条状","入沸水煮熟","可炒可汤"]},
{id:"fc039",name:"清蒸鱼",cuisine:"闽菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"简单",ingredients:["鲜鱼1条","姜","葱","蒸鱼豉油","花生油"],description:"福建人清蒸鱼讲究一个鲜字，火候精准鱼肉嫩滑。",steps:["鱼处理干净划刀","铺上姜丝","水开大火蒸8-10分钟","取出倒掉腥水","重新铺葱丝","淋蒸鱼豉油和热油"]},
{id:"fc040",name:"虾酥",cuisine:"闽菜",category:"八大菜系",calories:300,cookingTime:20,difficulty:"中等",ingredients:["河虾","面粉","鸡蛋","盐","葱花"],description:"小河虾与面糊炸成饼，酥脆鲜香。",steps:["面粉加鸡蛋和水调成面糊","加入小河虾和葱花","油热用勺子舀入面糊","炸至金黄酥脆"]},

{id:"xc001",name:"剁椒鱼头",cuisine:"湘菜",category:"八大菜系",calories:280,cookingTime:35,difficulty:"中等",ingredients:["胖头鱼头1个","剁椒150g","姜","蒜","蒸鱼豉油","料酒"],description:"鲜辣过瘾鱼头嫩滑，剁椒的咸香与鱼鲜完美融合。",steps:["鱼头从中间劈开但不要劈断，洗净抹盐料酒腌制20分钟","大盘中铺姜片，放上鱼头","将大量剁椒均匀铺在鱼头上","再铺上蒜末和姜末","蒸锅水开后放入，大火蒸12-15分钟","取出倒掉盘中多余汤汁","淋蒸鱼豉油","浇一勺滚烫热油即可"]},
{id:"xc002",name:"小炒肉",cuisine:"湘菜",category:"八大菜系",calories:380,cookingTime:15,difficulty:"简单",ingredients:["五花肉300g","螺丝椒4个","蒜","豆豉","酱油"],description:"湖南人最家常的下饭菜，肉片焦香辣椒鲜辣锅气十足。",steps:["五花肉切薄片，辣椒斜切圈","锅不放油，下辣椒干煸至表面起虎皮斑盛出","锅中下肉片煸炒至出油卷曲","加蒜片和豆豉炒香","加酱油翻炒上色","倒回辣椒大火翻炒均匀"]},
{id:"xc003",name:"腊味合蒸",cuisine:"湘菜",category:"八大菜系",calories:450,cookingTime:45,difficulty:"简单",ingredients:["腊肉200g","腊肠2根","腊鸭200g","豆豉","干辣椒"],description:"三腊同蒸咸香浓郁，配白米饭是天作之合。",steps:["腊肉、腊肠、腊鸭分别用温水洗净","切成均匀的薄片","将三种腊味整齐码入蒸碗中","撒上豆豉和干辣椒","上蒸锅大火蒸30分钟","腊味的油香和腊香充分融合即可"]},
{id:"xc004",name:"口味虾",cuisine:"湘菜",category:"八大菜系",calories:320,cookingTime:30,difficulty:"中等",ingredients:["小龙虾1000g","干辣椒","花椒","紫苏","蒜","啤酒","酱油"],description:"香辣鲜麻虾肉Q弹，长沙夜宵的灵魂霸主。",steps:["小龙虾刷洗干净，去虾线","多油大火炸至虾壳变红捞出","留底油爆香干辣椒花椒蒜末","放入小龙虾翻炒","倒入半瓶啤酒和酱油","加盖焖煮10分钟入味","放入紫苏和青椒翻炒","大火收汁即可"]},
{id:"xc005",name:"永州血鸭",cuisine:"湘菜",category:"八大菜系",calories:380,cookingTime:30,difficulty:"中等",ingredients:["鸭子半只","鸭血1碗","干辣椒","花椒","姜","蒜","酱油"],description:"鸭肉裹满鸭血酱香浓郁，永州独有的待客名菜。",steps:["鸭子斩块，鸭血加少许醋搅匀备用（防凝固）","锅中不放油下鸭块煸炒出油","加姜蒜干辣椒花椒炒香","加酱油和少量水焖15分钟","大火收汁","关火后立即倒入鸭血快速搅拌","利用余温将鸭血烫熟包裹鸭肉"]},
{id:"xc006",name:"擂辣椒皮蛋",cuisine:"湘菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"简单",ingredients:["青辣椒5个","皮蛋2个","蒜","酱油","醋","香油"],description:"用擂钵捣出最原始的美味，辣椒和皮蛋的绝妙碰撞。",steps:["辣椒放火上烧至表皮焦黑起泡","洗去焦皮，撕成条","皮蛋剥壳切块","将所有材料放入擂钵","加蒜瓣、酱油、醋、香油","用擂棒捣碎拌匀即可"]},
{id:"xc007",name:"东安子鸡",cuisine:"湘菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"中等",ingredients:["嫩鸡半只","红辣椒","花椒","醋","姜丝","蒜","料酒"],description:"麻辣酸鲜嫩五味调和，湘菜之首国宴名菜。",steps:["鸡肉煮至七成熟捞出放凉","去骨切成长条","锅中油热下姜丝蒜末花椒红辣椒炒香","放入鸡肉翻炒","加料酒、醋、盐调味","加少许鸡汤焖5分钟入味","大火收汁至汤汁附着鸡肉"]},
{id:"xc008",name:"外婆菜炒鸡蛋",cuisine:"湘菜",category:"八大菜系",calories:250,cookingTime:10,difficulty:"简单",ingredients:["外婆菜200g","鸡蛋3个","蒜","干辣椒","食用油"],description:"咸香下饭的快手菜，外婆的味道最下饭。",steps:["外婆菜（梅干菜/萝卜干/腌菜）用温水泡软切碎","鸡蛋打散","锅中多油炒鸡蛋至凝固盛出","锅中放油爆香蒜末干辣椒","放入外婆菜翻炒出香味","倒回鸡蛋翻炒均匀"]},
{id:"xc009",name:"酸豆角炒肉末",cuisine:"湘菜",category:"八大菜系",calories:220,cookingTime:10,difficulty:"简单",ingredients:["酸豆角200g","猪肉末150g","干辣椒","蒜","酱油"],description:"酸辣开胃爽脆可口，三碗饭打底的节奏。",steps:["酸豆角洗净切碎，挤干水分","锅中炒香肉末出油","加蒜末干辣椒炒香","放入酸豆角翻炒","加少许酱油调味","炒至酸豆角水分收干即可"]},
{id:"xc010",name:"辣椒炒肉",cuisine:"湘菜",category:"八大菜系",calories:350,cookingTime:15,difficulty:"简单",ingredients:["猪前腿肉300g","湖南青椒4个","蒜","豆豉","酱油"],description:"湖南人的精神支柱，一碗辣椒炒肉能干掉三碗饭。",steps:["猪肉切薄片，肥瘦分开","青椒去籽切滚刀块","锅不放油，下青椒干煸至起虎皮盛出","锅中放入肥肉煸出油","放入瘦肉炒至变色","加蒜片豆豉酱油翻炒","倒回青椒大火翻炒均匀"]},
{id:"xc011",name:"红烧肉",cuisine:"湘菜",category:"八大菜系",calories:500,cookingTime:90,difficulty:"中等",ingredients:["五花肉400g","干辣椒","八角","桂皮","酱油","冰糖","姜"],description:"湘式红烧肉加干辣椒，咸辣回甜肥而不腻。",steps:["五花肉切块焯水","锅中炒糖色放入肉块","加酱油干辣椒八角桂皮姜","加开水大火烧开转小火","炖1小时至肉软烂","大火收汁"]},
{id:"xc012",name:"剁椒蒸排骨",cuisine:"湘菜",category:"八大菜系",calories:380,cookingTime:40,difficulty:"中等",ingredients:["猪小排400g","剁椒150g","豆豉","姜","蒜","淀粉"],description:"剁椒的咸辣渗入排骨，蒸制后鲜嫩脱骨。",steps:["排骨切段加淀粉酱油腌制","盘中铺一层剁椒和豆豉","放上排骨","再盖一层剁椒和姜蒜末","蒸锅大火蒸35分钟"]},
{id:"xc013",name:"湘西外婆菜",cuisine:"湘菜",category:"八大菜系",calories:200,cookingTime:10,difficulty:"简单",ingredients:["外婆菜200g","蒜","干辣椒","酱油","猪油"],description:"湘西特有的腌菜，简单一炒就着它能吃三碗饭。",steps:["外婆菜用温水泡软","猪油烧热爆香蒜末干辣椒","放入外婆菜翻炒","加少许酱油和水","翻炒至水分收干"]},
{id:"xc014",name:"毛氏红烧肉",cuisine:"湘菜",category:"八大菜系",calories:480,cookingTime:120,difficulty:"中等",ingredients:["五花肉500g","冰糖","酱油","料酒","八角","干辣椒","姜"],description:"毛主席爱吃的红烧肉，不用酱油用糖色上色。",steps:["五花肉切块焯水","锅中炒糖色至枣红色","放入肉块翻炒上色","加料酒八角干辣椒姜","加开水大火烧开转小火","炖1.5小时至肉酥烂"]},
{id:"xc015",name:"白辣椒炒肉",cuisine:"湘菜",category:"八大菜系",calories:300,cookingTime:15,difficulty:"简单",ingredients:["白辣椒100g","猪肉200g","蒜","酱油"],description:"白辣椒是湖南特有的干辣椒品种，辣而不燥。",steps:["白辣椒泡发切段","猪肉切片煸炒出油","加蒜末和白辣椒翻炒","加酱油和少许水","炒至入味收干"]},
{id:"xc016",name:"干锅牛蛙",cuisine:"湘菜",category:"八大菜系",calories:350,cookingTime:25,difficulty:"中等",ingredients:["牛蛙500g","干辣椒","花椒","青红椒","洋葱","郫县豆瓣酱"],description:"蛙肉嫩滑麻辣鲜香，干锅系列中的经典。",steps:["牛蛙斩块加料酒盐腌制","多油炸至表面金黄捞出","留底油炒香豆瓣酱和干辣椒花椒","放入牛蛙和配料翻炒","加少量水焖5分钟","收干汤汁装干锅"]},
{id:"xc017",name:"干锅花菜",cuisine:"湘菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"简单",ingredients:["花菜1棵","五花肉片100g","干辣椒","蒜","酱油"],description:"花菜焦香入味五花肉提鲜，湘菜干锅素菜之王。",steps:["花菜掰小朵焯水沥干","锅中煸炒五花肉出油","加干辣椒蒜片炒香","放入花菜大火翻炒","加酱油调味","炒至花菜边缘微焦"]},
{id:"xc018",name:"萝卜干炒腊肉",cuisine:"湘菜",category:"八大菜系",calories:300,cookingTime:15,difficulty:"简单",ingredients:["萝卜干100g","腊肉150g","蒜苗","干辣椒","姜"],description:"萝卜干的脆与腊肉的香，湖南人餐桌上的常客。",steps:["萝卜干泡发切段","腊肉煮软切片","腊肉入锅煸炒出油","加姜干辣椒蒜苗","放入萝卜干翻炒","加少许水焖2分钟"]},
{id:"xc019",name:"蒜苗炒腊肉",cuisine:"湘菜",category:"八大菜系",calories:280,cookingTime:10,difficulty:"简单",ingredients:["腊肉200g","蒜苗5根","干辣椒","姜"],description:"冬季蒜苗上市时的必吃菜，腊肉的绝配。",steps:["腊肉煮软切片","蒜苗切段，蒜白蒜叶分开","腊肉入锅煸炒出油","加姜干辣椒蒜白翻炒","放入蒜叶快速翻炒出锅"]},
{id:"xc020",name:"红烧蹄花",cuisine:"湘菜",category:"八大菜系",calories:450,cookingTime:120,difficulty:"中等",ingredients:["猪蹄2只","干辣椒","八角","桂皮","酱油","冰糖","姜"],description:"麻辣版本的猪蹄，香辣软糯胶原蛋白满满。",steps:["猪蹄剁块焯水","炒糖色放入猪蹄翻炒","加酱油干辣椒八角桂皮姜","加开水大火烧开转小火","炖1.5小时至软糯","大火收汁"]},
{id:"xc021",name:"酸菜炒粉皮",cuisine:"湘菜",category:"八大菜系",calories:280,cookingTime:15,difficulty:"简单",ingredients:["酸菜150g","粉皮200g","猪肉末80g","干辣椒","蒜"],description:"酸辣爽滑粉皮Q弹，下饭程度三颗星。",steps:["粉皮泡软切宽条","酸菜切碎","猪肉末炒香","加干辣椒蒜末酸菜翻炒","放入粉皮大火炒","加少许酱油和水调匀"]},
{id:"xc022",name:"攸县香干",cuisine:"湘菜",category:"八大菜系",calories:250,cookingTime:10,difficulty:"简单",ingredients:["攸县香干300g","青红椒","蒜","酱油","豆豉"],description:"攸县特产香干，炒出来比肉还香。",steps:["香干切片","锅中油热放入香干煎至两面微焦","加蒜末豆豉青红椒翻炒","加酱油调味","炒至干香出锅"]},
{id:"xc023",name:"蒸腊鱼",cuisine:"湘菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"简单",ingredients:["腊鱼1条","豆豉","干辣椒","姜","蒜","猪油"],description:"腊鱼本身的咸香加上豆豉辣椒，蒸一蒸满屋飘香。",steps:["腊鱼用温水洗净切块","碗中放腊鱼块","铺上豆豉干辣椒姜蒜","淋上猪油","蒸锅大火蒸25分钟"]},
{id:"xc024",name:"湘味牛肉粉",cuisine:"湘菜",category:"八大菜系",calories:450,cookingTime:20,difficulty:"简单",ingredients:["米粉200g","牛肉100g","辣椒油","酱油","酸豆角","花生"],description:"一碗热气腾腾的牛肉粉，湖南人的早晨从它开始。",steps:["牛肉卤好切片","米粉用开水烫热","碗底放酱油辣椒油","放入米粉和牛肉片","加酸豆角花生","冲入滚烫牛肉汤"]},
{id:"xc025",name:"剁椒蒸鱼",cuisine:"湘菜",category:"八大菜系",calories:250,cookingTime:20,difficulty:"简单",ingredients:["鲜鱼1条","剁椒150g","姜","蒜","蒸鱼豉油"],description:"剁椒蒸万物，蒸鱼最经典。",steps:["鱼处理干净划刀","盘底铺姜片放鱼","大量剁椒铺满鱼身","蒸锅大火蒸12分钟","取出淋蒸鱼豉油和热油"]},
{id:"xc026",name:"魔芋烧鸭",cuisine:"湘菜",category:"八大菜系",calories:400,cookingTime:45,difficulty:"中等",ingredients:["鸭子半只","魔芋300g","郫县豆瓣酱","干辣椒","花椒","姜蒜"],description:"魔芋吸饱了鸭肉和麻辣汤汁，比鸭肉还好吃。",steps:["鸭子斩块焯水","魔芋切块焯水","锅中炒香豆瓣酱和香料","放入鸭块翻炒","加开水焖煮30分钟","放入魔芋再煮10分钟收汁"]},
{id:"xc027",name:"酸辣鸡杂",cuisine:"湘菜",category:"八大菜系",calories:280,cookingTime:10,difficulty:"简单",ingredients:["鸡胗200g","鸡心100g","泡椒","酸豆角","蒜苗","姜蒜"],description:"鸡杂脆嫩酸辣开胃，下饭下酒的神器。",steps:["鸡杂切片焯水5秒捞出","锅中油热爆香姜蒜泡椒","放入鸡杂快速翻炒","加酸豆角和蒜苗","大火翻炒入味"]},
{id:"xc028",name:"辣椒皮蛋",cuisine:"湘菜",category:"八大菜系",calories:180,cookingTime:10,difficulty:"简单",ingredients:["皮蛋3个","青红椒","蒜","酱油","醋","香油"],description:"最简单的凉拌皮蛋却能吃到停不下。",steps:["皮蛋剥壳切块摆盘","青红椒切碎加蒜末","加酱油醋香油调成汁","浇在皮蛋上"]},
{id:"xc029",name:"醴陵小炒肉",cuisine:"湘菜",category:"八大菜系",calories:350,cookingTime:10,difficulty:"简单",ingredients:["猪前腿肉300g","青椒","红椒","蒜","酱油"],description:"醴陵特色的快炒肉片，刀法讲究炒法更讲究。",steps:["猪肉切极薄的片","辣椒切圈","大火油热下肉片快速滑散","肉变色立即加辣椒和蒜","大火翻炒30秒出锅"]},
{id:"xc030",name:"湘辣子鸡",cuisine:"湘菜",category:"八大菜系",calories:400,cookingTime:30,difficulty:"中等",ingredients:["鸡腿肉400g","干辣椒50g","花椒","蒜","姜","酱油"],description:"湘版的辣子鸡，比川版的更辣更香。",steps:["鸡腿肉切块腌制","入油炸至金黄捞出","留底油炒香干辣椒花椒","加姜蒜放入鸡块","大火快速翻炒","加酱油调味"]},
{id:"xc031",name:"常德牛肉粉",cuisine:"湘菜",category:"八大菜系",calories:480,cookingTime:30,difficulty:"中等",ingredients:["米粉200g","牛肉200g","辣椒油","香料包","酱油","姜"],description:"常德米粉天下闻名，牛肉浇头是灵魂。",steps:["牛肉切块焯水","加香料包酱油卤制1小时","米粉用开水烫热","碗底放辣椒油酱油","放入米粉浇上牛肉和汤汁"]},
{id:"xc032",name:"腊肉炒蕨菜",cuisine:"湘菜",category:"八大菜系",calories:250,cookingTime:15,difficulty:"简单",ingredients:["腊肉150g","蕨菜200g","干辣椒","蒜","酱油"],description:"春天的蕨菜遇上冬天的腊肉，湘西时令美味。",steps:["蕨菜焯水切段","腊肉煮软切片","腊肉入锅煸炒出油","加干辣椒蒜末蕨菜翻炒","加少许酱油调味"]},
{id:"xc033",name:"香辣蟹",cuisine:"湘菜",category:"八大菜系",calories:350,cookingTime:25,difficulty:"中等",ingredients:["螃蟹2只","干辣椒","花椒","蒜","姜","啤酒","酱油"],description:"湘式的辣炒蟹，比清蒸的更加过瘾。",steps:["螃蟹处理干净斩件","入油锅炸至变红捞出","爆香干辣椒花椒姜蒜","放入蟹块翻炒","倒入半瓶啤酒焖5分钟","收汁即可"]},
{id:"xc034",name:"钵子菜",cuisine:"湘菜",category:"八大菜系",calories:400,cookingTime:40,difficulty:"中等",ingredients:["五花肉","豆腐","白菜","粉条","辣椒","蒜"],description:"常德钵子菜，一钵煮万物越炖越有味。",steps:["五花肉切片煸炒出油","放入辣椒蒜炒香","加入豆腐白菜粉条","加水和酱油","小火慢炖30分钟"]},
{id:"xc035",name:"糖油粑粑",cuisine:"湘菜",category:"八大菜系",calories:300,cookingTime:20,difficulty:"简单",ingredients:["糯米粉200g","红糖80g","食用油"],description:"外酥里糯红糖甜蜜，长沙人从小吃到大的甜品。",steps:["糯米粉加温水和成面团","揪成小剂子压成饼","平底锅油热放入糯米饼","小火煎至两面金黄","红糖加水熬成糖浆","将煎好的粑粑放入糖浆中裹匀"]},
{id:"xc036",name:"臭豆腐",cuisine:"湘菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"简单",ingredients:["臭豆腐","辣椒酱","蒜蓉","香菜","萝卜干"],description:"长沙臭豆腐天下闻名，闻着臭吃着香。",steps:["臭豆腐入油锅炸至金黄","捞出控油","戳洞灌入辣椒酱和蒜蓉","撒上萝卜干和香菜"]},
{id:"xc037",name:"刮凉粉",cuisine:"湘菜",category:"八大菜系",calories:150,cookingTime:20,difficulty:"简单",ingredients:["豌豆淀粉100g","辣椒油","醋","蒜泥","花生碎","葱花"],description:"用刮子刮出长条凉粉，长沙夏天的消暑神器。",steps:["豌豆淀粉加水煮成凉粉凝固","用刮子刮出长条","放入碗中","加辣椒油醋蒜泥花生碎葱花","拌匀食用"]},
{id:"xc038",name:"姊妹团子",cuisine:"湘菜",category:"八大菜系",calories:250,cookingTime:30,difficulty:"中等",ingredients:["糯米粉","猪肉末","香菇","糖","芝麻"],description:"一甜一咸两个团子，长沙火宫殿的名小吃。",steps:["糯米粉加温水和面","一半包入咸馅（猪肉香菇）","一半包入甜馅（芝麻糖）","搓圆入蒸锅","大火蒸15分钟"]},
{id:"xc039",name:"剁椒鱼头拌面",cuisine:"湘菜",category:"八大菜系",calories:400,cookingTime:35,difficulty:"中等",ingredients:["胖头鱼头1个","剁椒","面条","姜","蒜","蒸鱼豉油"],description:"吃完鱼头用汤汁拌面，一滴都不能浪费。",steps:["鱼头加剁椒姜蒜蒸12分钟","面条煮熟捞出","吃完鱼肉后","将面条倒入盘中","与剁椒汁充分拌匀"]},
{id:"xc040",name:"双椒鱼头",cuisine:"湘菜",category:"八大菜系",calories:300,cookingTime:35,difficulty:"中等",ingredients:["胖头鱼头1个","红剁椒","青剁椒","姜","蒜","蒸鱼豉油"],description:"红绿双色剁椒各铺一半，视觉味觉双重享受。",steps:["鱼头劈开洗净","一半铺红剁椒一半铺青剁椒","蒜末姜末撒匀","蒸锅大火蒸12分钟","浇热油和蒸鱼豉油"]},

{id:"hc001",name:"臭鳜鱼",cuisine:"徽菜",category:"八大菜系",calories:250,cookingTime:50,difficulty:"中等",ingredients:["鳜鱼1条","臭卤水","五花肉片","笋","姜蒜","干辣椒","酱油"],description:"闻着臭吃着香，鱼肉如蒜瓣般紧实，徽菜一绝名声在外。",steps:["鳜鱼宰杀洗净，用臭卤水腌制24小时发酵","取出冲洗后擦干水分","锅中油热将鱼两面煎至金黄","放入五花肉片、笋片、姜蒜干辣椒","加酱油和少量水","大火烧开转小火焖15分钟","收汁至浓稠即可"]},
{id:"hc002",name:"毛豆腐",cuisine:"徽菜",category:"八大菜系",calories:200,cookingTime:20,difficulty:"简单",ingredients:["毛豆腐300g","辣椒酱","蒜","酱油","葱花","食用油"],description:"发酵长白毛的豆腐煎至金黄，外酥里糯风味独特。",steps:["毛豆腐小心取出（表面白色绒毛是正常菌丝）","平底锅多油烧热","放入毛豆腐小火慢煎","煎至一面金黄翻面","两面金黄后取出装盘","淋上辣椒酱、酱油、撒蒜末葱花"]},
{id:"hc003",name:"李鸿章杂烩",cuisine:"徽菜",category:"八大菜系",calories:420,cookingTime:60,difficulty:"中等",ingredients:["海参","鱼肚","火腿","鸡肉","鹌鹑蛋","花菇","笋片","高汤"],description:"名臣命名的宴客大菜，多种珍味一锅烩汤醇味厚。",steps:["各种干货提前泡发","鸡肉切块焯水","砂锅中依次码入各种食材","加入高汤没过食材","加少许酱油和黄酒","大火烧开转小火慢炖1小时","加盐调味即可"]},
{id:"hc004",name:"符离集烧鸡",cuisine:"徽菜",category:"八大菜系",calories:380,cookingTime:120,difficulty:"中等",ingredients:["土鸡1只","麦芽糖","桂皮","良姜","砂仁","酱油","料酒","盐"],description:"皮色酱红油亮肉烂脱骨，中国四大名鸡之一。",steps:["整鸡处理干净，用盐和香料腌制4小时","麦芽糖用温水化开，均匀刷在鸡皮上","锅中多油烧至七成热","将鸡炸至皮色金红捞出","卤锅加水和各种香料酱油","放入鸡煮40分钟至软烂","捞出晾凉斩件"]},
{id:"hc005",name:"徽州一品锅",cuisine:"徽菜",category:"八大菜系",calories:500,cookingTime:90,difficulty:"中等",ingredients:["五花肉","鸡肉","火腿","豆腐","蛋饺","粉丝","青菜"],description:"层层叠叠一锅炖，从底到顶味不同。",steps:["各种肉类分别焯水处理","大砂锅底层铺粉丝和白菜","第二层放豆腐和蛋饺","第三层放鸡肉和火腿","最上层放五花肉","加入高汤，小火慢炖1小时","上桌时保持锅中翻滚"]},
{id:"hc006",name:"黄山炖鸽",cuisine:"徽菜",category:"八大菜系",calories:300,cookingTime:150,difficulty:"中等",ingredients:["乳鸽2只","黄山石耳或木耳","枸杞","姜片","盐","黄酒"],description:"鸽肉酥烂汤清味鲜，黄山石耳赋予独特清香。",steps:["乳鸽处理干净焯水","石耳泡发洗净","砂锅加足量水放入乳鸽","加姜片黄酒大火烧开转小火","炖1小时后加入石耳和枸杞","继续炖30分钟加盐调味"]},
{id:"hc007",name:"问政山笋",cuisine:"徽菜",category:"八大菜系",calories:80,cookingTime:30,difficulty:"简单",ingredients:["鲜嫩山笋500g","火腿","鸡汤","盐"],description:"山笋细嫩清甜无渣，最简单却最见食材本味。",steps:["山笋剥去外壳取嫩尖部分","切滚刀块焯水去涩","鸡汤烧开放入笋块","放入几片火腿提鲜","小火煮15分钟","加少许盐调味即可"]},

{id:"jz040",name:"白灼西兰花",cuisine:"减脂餐",category:"减脂餐",calories:70,cookingTime:5,difficulty:"简单",ingredients:["西兰花1棵","蒜","蚝油","盐"],description:"西兰花是减脂神菜，营养密度高热量极低。",steps:["西兰花掰小朵焯水1分钟","捞出过凉保持翠绿","蒜末加蚝油和少许水烧开","浇在西兰花上"]},
{id:"jz041",name:"柠檬鸡胸",cuisine:"减脂餐",category:"减脂餐",calories:200,cookingTime:20,difficulty:"简单",ingredients:["鸡胸肉250g","柠檬1个","蒜","迷迭香","橄榄油","盐"],description:"柠檬的清香让鸡胸肉不再枯燥乏味。",steps:["鸡胸肉表面划几刀","柠檬汁加橄榄油蒜末迷迭香调成腌料","鸡胸肉腌制30分钟","平底锅中小火煎","每面煎4-5分钟至金黄熟透"]},
{id:"jz042",name:"蔬菜鸡蛋饼",cuisine:"减脂餐",category:"减脂餐",calories:220,cookingTime:10,difficulty:"简单",ingredients:["鸡蛋3个","胡萝卜","西葫芦","洋葱","面粉少许","盐"],description:"蔬菜多多鸡蛋香，少油煎的健康早餐饼。",steps:["所有蔬菜切细丝或末","鸡蛋打散加少许面粉和盐搅匀","加入蔬菜丝拌匀","平底锅少油小火","倒入蛋糊摊平","两面煎至金黄"]},
{id:"jz043",name:"什锦菌菇炒",cuisine:"减脂餐",category:"减脂餐",calories:150,cookingTime:10,difficulty:"简单",ingredients:["香菇","蟹味菇","杏鲍菇","青椒","蒜","蚝油"],description:"多种菌菇一起炒，鲜美程度不输肉菜。",steps:["各种菌菇处理好切片","锅中少油炒香蒜末","放入菌菇中火翻炒","菌菇会出水继续炒至收干","加青椒和蚝油翻炒"]},
{id:"jz044",name:"牛腱子冷盘",cuisine:"减脂餐",category:"减脂餐",calories:250,cookingTime:90,difficulty:"中等",ingredients:["牛腱子肉500g","酱油","八角","桂皮","花椒","姜","料酒"],description:"卤好的牛腱子切片冷藏，高蛋白低脂的冷盘。",steps:["牛腱子焯水","卤锅加水和所有香料酱油","放入牛腱子大火烧开转小火","卤1小时至筷子能扎透","捞出放凉","切片冷藏后食用"]},
{id:"jz045",name:"蒸玉米",cuisine:"减脂餐",category:"减脂餐",calories:150,cookingTime:20,difficulty:"简单",ingredients:["甜玉米2根"],description:"天然全谷物碳水，高纤维饱腹感强。",steps:["玉米保留内层薄皮","放入蒸锅","大火蒸15-20分钟","取出剥皮食用"]},
{id:"jz046",name:"黑米粥",cuisine:"减脂餐",category:"减脂餐",calories:160,cookingTime:40,difficulty:"简单",ingredients:["黑米80g","红枣","枸杞","冰糖少许"],description:"黑米花青素丰富，补血养颜的低GI粥品。",steps:["黑米提前浸泡2小时","锅中加水放入黑米和红枣","大火烧开转小火熬30分钟","至粥浓稠米粒开花","加枸杞和少许冰糖"]},
{id:"jz047",name:"娃娃菜豆腐汤",cuisine:"减脂餐",category:"减脂餐",calories:80,cookingTime:10,difficulty:"简单",ingredients:["娃娃菜1棵","嫩豆腐","虾皮","姜","盐","白胡椒粉"],description:"娃娃菜清甜豆腐嫩滑，清清淡淡却很暖胃。",steps:["娃娃菜切段","锅中水加姜片和虾皮烧开","放入娃娃菜煮3分钟","放入豆腐块煮2分钟","加盐和胡椒粉调味"]},
{id:"jz048",name:"西芹炒虾仁",cuisine:"减脂餐",category:"减脂餐",calories:180,cookingTime:10,difficulty:"简单",ingredients:["西芹200g","虾仁150g","蒜","盐","料酒"],description:"西芹爽脆虾仁弹嫩，清爽的低卡快手菜。",steps:["西芹去筋切段焯水1分钟","虾仁加料酒盐腌制","锅中少油炒香蒜末","放入虾仁炒至变红","加入西芹翻炒均匀"]},
{id:"jz049",name:"蒸南瓜",cuisine:"减脂餐",category:"减脂餐",calories:120,cookingTime:20,difficulty:"简单",ingredients:["南瓜500g"],description:"南瓜天然甜糯，最简单的减脂碳水来源。",steps:["南瓜去瓤切大块（不去皮）","放入蒸锅","大火蒸15-20分钟","用筷子能扎透即可","皮也可食用"]},
{id:"jz050",name:"番茄牛肉汤",cuisine:"减脂餐",category:"减脂餐",calories:250,cookingTime:40,difficulty:"简单",ingredients:["牛腱子200g","番茄3个","洋葱","姜","盐","香叶"],description:"牛肉与番茄的经典搭配，酸甜浓郁高蛋白。",steps:["牛肉切块焯水","番茄去皮切块","锅中少油炒香洋葱","放入牛肉和番茄翻炒","加水姜片香叶","大火烧开转小火炖30分钟","加盐调味"]},

{id:"sc061",name:"陈皮兔丁",cuisine:"川菜",category:"八大菜系",calories:320,cookingTime:35,difficulty:"中等",ingredients:["兔肉400g","陈皮20g","干辣椒","花椒","酱油","白糖","料酒"],description:"陈皮清香与麻辣交融，冷吃兔的另一种经典做法。",steps:["兔肉切丁加料酒盐腌制","陈皮温水泡软切丝","兔丁入油炸至金黄捞出","留底油炒香干辣椒花椒","加陈皮丝和兔丁翻炒","加酱油白糖调味","收汁放凉食用"]},
{id:"sc062",name:"水煮肉片",cuisine:"川菜",category:"八大菜系",calories:380,cookingTime:25,difficulty:"中等",ingredients:["猪里脊300g","豆芽","莴笋","干辣椒","花椒","郫县豆瓣酱","姜蒜"],description:"肉片嫩滑麻辣鲜香，水煮系列最经典的一道。",steps:["里脊肉切薄片加蛋清淀粉上浆","豆芽莴笋焯水铺碗底","锅中炒香豆瓣酱姜蒜","加水烧开调味","将肉片逐片滑入汤中","肉变白即熟","倒入碗中撒干辣椒花椒","浇滚烫热油"]},
{id:"sc063",name:"仔姜兔",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["兔肉400g","仔姜150g","青红椒","泡椒","蒜","豆瓣酱"],description:"仔姜的鲜辣与兔肉的细嫩，自贡盐帮菜代表。",steps:["兔肉切丁腌制","仔姜切片，青红椒切圈","兔丁入油滑炒盛出","锅中炒香豆瓣酱泡椒","加仔姜和兔丁翻炒","加青红椒快速翻炒出锅"]},
{id:"sc064",name:"鱼香茄盒",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["茄子2根","猪肉末150g","鸡蛋","面粉","泡椒","姜蒜","酱油","醋","糖"],description:"茄子夹肉馅炸至金黄，浇上鱼香汁酸甜可口。",steps:["茄子切连刀片中间不切断","肉末加姜葱调味","将肉馅夹入茄子片中","裹上蛋糊入油炸至金黄","另起锅炒香泡椒姜蒜","加酱油醋糖和水淀粉勾芡","浇在茄盒上"]},
{id:"sc065",name:"火爆黄喉",cuisine:"川菜",category:"八大菜系",calories:280,cookingTime:10,difficulty:"困难",ingredients:["黄喉300g","青红椒","干辣椒","花椒","姜蒜","酱油"],description:"黄喉脆嫩爽口，急火快炒一气呵成。",steps:["黄喉洗净切花刀","快速焯水5秒捞出","大火烧油至冒烟","下黄喉和配料快速翻炒","10秒出锅"]},
{id:"sc066",name:"酸萝卜老鸭汤",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:180,difficulty:"中等",ingredients:["老鸭半只","酸萝卜200g","姜","花椒","料酒"],description:"酸萝卜的酸爽渗入鸭汤中，开胃解腻的冬日暖汤。",steps:["老鸭斩块焯水","酸萝卜切片","砂锅中放入鸭块和酸萝卜","加足量水和姜片花椒","大火烧开转小火炖2.5小时","加少许盐调味"]},
{id:"sc067",name:"泡椒牛蛙",cuisine:"川菜",category:"八大菜系",calories:300,cookingTime:20,difficulty:"中等",ingredients:["牛蛙500g","泡椒150g","泡姜","蒜","料酒","酱油"],description:"泡椒的酸辣与牛蛙嫩滑，川南江湖菜经典。",steps:["牛蛙斩块加料酒腌制","油温七成热下牛蛙炸至表面金黄","锅中留底油炒香泡椒泡姜蒜","倒入牛蛙翻炒","加少许水和酱油焖2分钟","收汁出锅"]},
{id:"sc068",name:"五香卤牛肉",cuisine:"川菜",category:"八大菜系",calories:280,cookingTime:120,difficulty:"中等",ingredients:["牛腱子肉500g","卤料包","酱油","冰糖","干辣椒","花椒","姜"],description:"川式卤牛肉麻辣回甜，切片凉拌下酒绝配。",steps:["牛腱子焯水","卤锅加水放入卤料包和调味料","放入牛腱子大火烧开转小火","卤1.5小时关火浸泡1小时","捞出放凉切片"]},
{id:"sc069",name:"麻辣香锅",cuisine:"川菜",category:"八大菜系",calories:500,cookingTime:25,difficulty:"中等",ingredients:["虾","牛肉","午餐肉","藕","土豆","花菜","麻辣香锅底料","干辣椒","花椒"],description:"想吃什么放什么，麻辣干香下饭无敌。",steps:["所有食材分别处理好焯水或过油","锅中炒香麻辣香锅底料","加干辣椒花椒炒香","放入所有食材大火翻炒","撒芝麻香菜出锅"]},
{id:"sc070",name:"自贡小煎鸡",cuisine:"川菜",category:"八大菜系",calories:400,cookingTime:25,difficulty:"中等",ingredients:["鸡腿肉400g","青红椒","泡椒","仔姜","蒜","豆瓣酱"],description:"急火快炒鸡丁外焦里嫩，自贡盐帮菜的代表。",steps:["鸡腿肉切丁腌制","青红椒切圈，仔姜切片","锅中多油下鸡丁煸炒至焦黄","加豆瓣酱泡椒仔姜蒜炒香","放入青红椒大火快炒","加少许酱油调味出锅"]},
{id:"sc071",name:"酸菜粉丝汤",cuisine:"川菜",category:"八大菜系",calories:180,cookingTime:15,difficulty:"简单",ingredients:["酸菜200g","粉丝100g","猪肉末80g","姜","花椒"],description:"酸爽开胃的简单汤品，配饭或单独喝都很棒。",steps:["酸菜切丝，粉丝泡软","锅中油热炒香肉末","加姜末花椒和酸菜翻炒","加入足量开水烧开","放入粉丝煮2分钟","加盐和白胡椒粉调味"]},
{id:"sc072",name:"怪味鸡",cuisine:"川菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"中等",ingredients:["鸡腿2个","芝麻酱","辣椒油","花椒粉","酱油","醋","白糖","蒜泥","芝麻"],description:"酸甜麻辣咸香兼备，一味之中尝尽人生百味。",steps:["鸡腿煮熟撕成丝","调怪味汁：芝麻酱+辣椒油+花椒粉+酱油+醋+白糖+蒜泥+芝麻","将汁浇在鸡丝上拌匀"]},
{id:"sc073",name:"干锅排骨",cuisine:"川菜",category:"八大菜系",calories:480,cookingTime:35,difficulty:"中等",ingredients:["猪排骨500g","土豆","藕","洋葱","青红椒","干辣椒","花椒","郫县豆瓣酱"],description:"排骨焦香配菜入味，干锅系列中最受欢迎的一款。",steps:["排骨斩段焯水入油炸至金黄","土豆藕条炸至金黄","锅中炒香豆瓣酱干辣椒花椒","放入排骨和配菜翻炒","加酱油调味","盛入干锅中边加热边吃"]},
{id:"sc074",name:"腊肉花菜",cuisine:"川菜",category:"八大菜系",calories:300,cookingTime:15,difficulty:"简单",ingredients:["腊肉150g","花菜1棵","干辣椒","蒜","酱油"],description:"腊肉的咸香渗入花菜，简单的家常菜最下饭。",steps:["腊肉煮软切片","花菜掰小朵焯水","腊肉入锅煸炒出油","加干辣椒蒜末花菜翻炒","加少许酱油调味"]},
{id:"sc075",name:"渣渣面",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:15,difficulty:"简单",ingredients:["面条200g","猪肉末100g","芽菜","辣椒油","花椒粉","酱油","蒜泥"],description:"成都渣渣面，肉末炒到酥脆如渣才是精髓。",steps:["猪肉末炒至干香酥脆","加芽菜翻匀","碗底放酱油辣椒油花椒粉蒜泥","面条煮熟放入碗中","浇上肉渣和汤"]},
{id:"sc076",name:"腊拼",cuisine:"川菜",category:"八大菜系",calories:450,cookingTime:30,difficulty:"简单",ingredients:["腊肉","腊肠","腊排骨","腊猪舌"],description:"各种腊味一起蒸，腊味爱好者的终极享受。",steps:["各种腊味用温水洗净","切成均匀薄片","整齐码入蒸碗中","大火蒸25分钟","取出直接食用"]},
{id:"sc077",name:"火爆腰花",cuisine:"川菜",category:"八大菜系",calories:250,cookingTime:10,difficulty:"困难",ingredients:["猪腰2个","青椒","红椒","泡椒","姜蒜","酱油","醋","淀粉"],description:"腰花嫩脆泡椒提味，下饭下酒两相宜。",steps:["猪腰去筋膜切花刀","加料酒淀粉抓匀","快速焯水3秒捞出","大火热油爆香姜蒜泡椒","下腰花快速翻炒","淋入酱油醋淀粉芡","大火翻炒10秒出锅"]},
{id:"sc078",name:"蘸水豆花",cuisine:"川菜",category:"八大菜系",calories:200,cookingTime:60,difficulty:"中等",ingredients:["黄豆300g","胆水或内酯","蘸水：辣椒油花椒油蒜泥葱花酱油"],description:"自己点的豆花嫩滑无比，配一碗麻辣蘸水那就是天堂。",steps:["黄豆泡发磨成豆浆过滤","豆浆煮开后转小火","缓缓点入胆水或内酯","静置15分钟凝固成豆花","调蘸水：辣椒油花椒油蒜泥葱花酱油","豆花盛碗蘸着吃"]},
{id:"sc079",name:"脆皮鱼",cuisine:"川菜",category:"八大菜系",calories:380,cookingTime:35,difficulty:"中等",ingredients:["鱼1条","葱姜","料酒","淀粉","糖","醋","番茄酱"],description:"鱼皮酥脆鱼肉鲜嫩，浇上糖醋汁酸甜可口。",steps:["鱼去骨切片裹淀粉","入油锅炸至金黄酥脆","另起锅炒糖醋汁","汁浇在鱼上即可"]},

{id:"yc085",name:"竹蔗茅根水",cuisine:"粤菜",category:"八大菜系",calories:120,cookingTime:60,difficulty:"简单",ingredients:["竹蔗2根","茅根1把","胡萝卜","马蹄","冰糖"],description:"广东凉茶中的清甜派，清热润燥全家适宜。",steps:["竹蔗劈开切段","茅根洗净","所有材料放入锅中","加足量水大火烧开","转小火煲45分钟","过滤后饮用"]}
];

const cuisineColors={"川菜":"linear-gradient(135deg,#e74c3c,#f39c12)","粤菜":"linear-gradient(135deg,#e67e22,#f1c40f)","鲁菜":"linear-gradient(135deg,#f1c40f,#f39c12)","苏菜":"linear-gradient(135deg,#2ecc71,#27ae60)","浙菜":"linear-gradient(135deg,#1abc9c,#16a085)","闽菜":"linear-gradient(135deg,#3498db,#2980b9)","湘菜":"linear-gradient(135deg,#e74c3c,#c0392b)","徽菜":"linear-gradient(135deg,#9b59b6,#8e44ad)","减脂餐":"linear-gradient(135deg,#4CAF50,#45a049)"};
const cuisineNames={"all":"全部菜系","川菜":"川菜 · 麻辣鲜香","粤菜":"粤菜 · 清中求鲜","鲁菜":"鲁菜 · 咸鲜为主","苏菜":"苏菜 · 本味平和","浙菜":"浙菜 · 清鲜脆嫩","闽菜":"闽菜 · 鲜香清淡","湘菜":"湘菜 · 香辣酸鲜","徽菜":"徽菜 · 火候独到","减脂餐":"减脂餐 · 低卡健康"};
const cuisineEmojis={"川菜":"🌶️","粤菜":"🥢","鲁菜":"🍲","苏菜":"🍃","浙菜":"🍵","闽菜":"🦐","湘菜":"🔥","徽菜":"🏺","减脂餐":"💪"};
let currentCuisine='all',currentQuery='',menuItems=[],menuItemIds=new Set();

function renderRecipes(filtered){
  const grid=document.getElementById('recipeGrid'),empty=document.getElementById('emptyState');
  if(!filtered.length){grid.innerHTML='';empty.style.display='flex';return}
  empty.style.display='none';
  grid.innerHTML=filtered.map(r=>{const isLow=r.category==='减脂餐',emoji=cuisineEmojis[r.cuisine]||'🍽️',selected=menuItemIds.has(r.id);
    return`<div class="recipe-card"><div class="card-select-btn${selected?' selected':''}" onclick="event.stopPropagation();toggleMenuItem('${r.id}')">${selected?'✓':'＋'}</div><div class="card-image" style="background:${cuisineColors[r.cuisine]||cuisineColors['减脂餐']}" onclick="showDetail('${r.id}')"><span>${emoji} ${r.name}</span>${isLow?'<span class="card-badge">低卡</span>':''}</div><div class="card-body" onclick="showDetail('${r.id}')"><h3>${r.name}</h3><p class="card-desc">${r.description}</p><div class="card-meta"><span><span class="meta-icon">🔥</span>${r.calories}千卡</span><span><span class="meta-icon">⏱</span>${r.cookingTime}分钟</span><span><span class="meta-icon">📊</span>${r.difficulty}</span></div></div></div>`}).join('')}

function filterAndRender(){let f=recipes;if(currentCuisine!=='all')f=f.filter(r=>r.cuisine===currentCuisine);if(currentQuery){const q=currentQuery.toLowerCase();f=f.filter(r=>r.name.toLowerCase().includes(q)||r.cuisine.toLowerCase().includes(q)||r.description.toLowerCase().includes(q)||r.ingredients.some(i=>i.toLowerCase().includes(q)))}renderRecipes(f)}

function showDetail(id){const r=recipes.find(x=>x.id===id);if(!r)return;
document.getElementById('modalName').textContent=r.name;
document.getElementById('modalCuisine').textContent=r.cuisine+' · '+r.difficulty+' · 🔥'+r.calories+'千卡 · ⏱'+r.cookingTime+'分钟';
document.getElementById('modalIngredients').innerHTML='<h3>🥬 食材清单</h3><div class="ingredient-tags">'+r.ingredients.map(i=>'<span class="ingredient-tag">'+i+'</span>').join('')+'</div>';
document.getElementById('modalSteps').innerHTML='<h3>📝 烹饪步骤</h3><ol class="step-list">'+r.steps.map(s=>'<li>'+s+'</li>').join('')+'</ol>';
document.getElementById('modalOverlay').style.display='flex'}

function closeModal(){document.getElementById('modalOverlay').style.display='none'}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape'){closeModal();closeMenuPanel()}});
document.querySelectorAll('.nav-item').forEach(l=>{l.addEventListener('click',function(e){e.preventDefault();document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));this.classList.add('active');currentCuisine=this.dataset.cuisine;document.getElementById('cuisineTitle').textContent=cuisineNames[currentCuisine]||currentCuisine;filterAndRender()})});
document.getElementById('searchInput').addEventListener('input',function(e){currentQuery=this.value.trim();filterAndRender()});
// 今日菜单逻辑
function toggleMenuItem(id){
  if(menuItemIds.has(id)){menuItemIds.delete(id);menuItems=menuItems.filter(r=>r.id!==id)}
  else{const r=recipes.find(x=>x.id===id);if(r){menuItemIds.add(id);menuItems.push(r)}}
  updateMenuUI();
  const f=recipes.filter(r=>{if(currentCuisine!=='all')return r.cuisine===currentCuisine;return true}).filter(r=>{if(currentQuery){const q=currentQuery.toLowerCase();return r.name.toLowerCase().includes(q)||r.cuisine.toLowerCase().includes(q)||r.description.toLowerCase().includes(q)||r.ingredients.some(i=>i.toLowerCase().includes(q))}return true});
  renderRecipes(f)
}
function updateMenuUI(){
  const badge=document.getElementById('fabBadge'),count=document.getElementById('menuCount'),body=document.getElementById('menuPanelBody');
  if(menuItems.length){badge.style.display='flex';badge.textContent=menuItems.length}else{badge.style.display='none'}
  count.textContent=menuItems.length+' 道菜';
  if(!menuItems.length){body.innerHTML='<div class="menu-empty">还没选菜呢～<br>去菜谱里挑几道吧</div>';return}
  body.innerHTML=menuItems.map(r=>`<div class="menu-item"><div><div class="menu-item-name">${r.name}</div><div class="menu-item-cuisine">${r.cuisine} · 🔥${r.calories}千卡</div></div><button class="menu-item-remove" onclick="toggleMenuItem('${r.id}')">✕</button></div>`).join('')
}
function toggleMenuPanel(){document.getElementById('menuPanel').classList.toggle('show')}
function closeMenuPanel(){document.getElementById('menuPanel').classList.remove('show')}
function clearMenu(){menuItems=[];menuItemIds.clear();updateMenuUI();closeMenuPanel();filterAndRender()}
// 导出图片
function exportMenu(){
  if(!menuItems.length){alert('请先选菜加入今日菜单！');return}
  document.getElementById('previewList').innerHTML=menuItems.map(r=>`<li><span>${cuisineEmojis[r.cuisine]||''} ${r.name}</span><span>🔥${r.calories}千卡 · ${r.cuisine}</span></li>`).join('');
  document.getElementById('exportPreview').classList.add('show')
}
function closeExportPreview(){document.getElementById('exportPreview').classList.remove('show')}
function doExport(){
  const canvas=document.getElementById('exportCanvas'),ctx=canvas.getContext('2d'),w=620,h=130+menuItems.length*52;
  canvas.width=w;canvas.height=h;
  ctx.fillStyle='#ffffff';ctx.fillRect(0,0,w,h);
  ctx.fillStyle='#2c3e50';ctx.font='bold 22px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.fillText('📋 今日菜单',30,42);
  ctx.fillStyle='#7f8c8d';ctx.font='13px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.fillText('共 '+menuItems.length+' 道菜 | 总热量 '+menuItems.reduce((s,r)=>s+r.calories,0)+' 千卡',30,68);
  ctx.strokeStyle='#e8ecef';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(30,84);ctx.lineTo(w-30,84);ctx.stroke();
  menuItems.forEach((r,i)=>{
    const y=114+i*52;
    ctx.fillStyle='#2c3e50';ctx.font='bold 15px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.fillText((cuisineEmojis[r.cuisine]||'')+' '+r.name,30,y);
    ctx.fillStyle='#7f8c8d';ctx.font='12px -apple-system,"PingFang SC","Microsoft YaHei",sans-serif';ctx.fillText(r.cuisine+' · 🔥'+r.calories+'千卡 · ⏱'+r.cookingTime+'分钟 · '+r.difficulty,30,y+20)
  });
  canvas.toBlob(function(blob){const url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='今日菜单.png';a.click();URL.revokeObjectURL(url);closeExportPreview()})
}
document.getElementById('fabBtn').addEventListener('click',function(e){e.stopPropagation();toggleMenuPanel()});
renderRecipes(recipes);
</script></body></html>
