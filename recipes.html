<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>每日菜谱 — 八大菜系 · 减脂餐</title>
<style>
:root{--primary:#4CAF50;--primary-light:#e8f5e9;--sidebar-width:230px;--bg:#f7f8f5;--card-bg:#fff;--text:#2c3e50;--text-secondary:#7f8c8d;--text-light:#95a5a6;--border:#e8ecef;--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-hover:0 8px 24px rgba(0,0,0,.1);--radius:12px;--transition:.25s ease}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased}
.app-container{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar-width);position:fixed;top:0;left:0;height:100vh;background:#fff;box-shadow:2px 0 16px rgba(0,0,0,.04);display:flex;flex-direction:column;z-index:100;overflow-y:auto}
.sidebar .logo{padding:28px 24px 20px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.sidebar .logo-icon{font-size:28px;line-height:1}
.sidebar .logo-text{font-size:20px;font-weight:700;color:var(--text);letter-spacing:1px}
.sidebar nav{padding:12px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:12px 24px;text-decoration:none;color:var(--text);font-size:14.5px;font-weight:500;transition:all var(--transition);border-left:3px solid transparent;position:relative}
.nav-item:hover{background:#f8faf9;color:var(--primary)}
.nav-item.active{background:var(--primary-light);color:var(--primary);border-left-color:var(--primary);font-weight:600}
.nav-dot{width:10px;height:10px;border-radius:50%;display:inline-block;flex-shrink:0;background:#bdc3c7}
.nav-item.active .nav-dot{box-shadow:0 0 0 3px rgba(76,175,80,.2)}
.nav-special{margin-top:4px;font-weight:600}
.nav-special .nav-dot{box-shadow:0 0 0 3px rgba(76,175,80,.15)}
.divider{display:flex;align-items:center;padding:16px 24px 8px;gap:10px}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-label{font-size:12px;color:var(--text-light);font-weight:500;letter-spacing:2px;text-transform:uppercase}
.main-content{margin-left:var(--sidebar-width);flex:1;padding:0;min-height:100vh}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:20px 28px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.04);position:sticky;top:0;z-index:50;gap:20px;flex-wrap:wrap}
.search-box{display:flex;align-items:center;gap:10px;background:var(--bg);border:1.5px solid transparent;border-radius:24px;padding:10px 18px;flex:1;max-width:400px;transition:all var(--transition)}
.search-box:focus-within{border-color:var(--primary);background:#fff;box-shadow:0 0 0 3px rgba(76,175,80,.1)}
.search-icon{font-size:16px;line-height:1;flex-shrink:0}
.search-box input{border:none;outline:none;background:transparent;font-size:14.5px;color:var(--text);width:100%;font-family:inherit}
.search-box input::placeholder{color:var(--text-light)}
.cuisine-title{font-size:18px;font-weight:700;color:var(--text);white-space:nowrap}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:22px;padding:28px}
.recipe-card{background:var(--card-bg);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:all var(--transition);cursor:pointer;display:flex;flex-direction:column;position:relative}
.recipe-card .card-select-btn{position:absolute;top:8px;left:8px;z-index:5;width:32px;height:32px;border-radius:50%;border:2px solid #fff;background:rgba(255,255,255,.8);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.recipe-card .card-select-btn.selected{background:var(--primary);border-color:var(--primary);color:#fff}
.recipe-card .card-select-btn:hover{transform:scale(1.15)}
.recipe-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-hover)}
.card-image{height:160px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;font-weight:700;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.2);position:relative}
.card-badge{position:absolute;top:12px;right:12px;background:rgba(255,255,255,.95);color:var(--primary);font-size:11px;font-weight:600;padding:4px 10px;border-radius:12px;letter-spacing:1px;box-shadow:0 2px 6px rgba(0,0,0,.08)}
.card-body{padding:18px 20px;flex:1;display:flex;flex-direction:column}
.card-body h3{font-size:17px;font-weight:700;color:var(--text);margin-bottom:6px}
.card-body .card-desc{font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:14px;flex:1}
.card-meta{display:flex;gap:14px;padding-top:12px;border-top:1px solid var(--border);font-size:12.5px;color:var(--text-secondary)}
.card-meta span{display:flex;align-items:center;gap:4px;white-space:nowrap}
.card-meta .meta-icon{font-size:14px;line-height:1}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;text-align:center}
.empty-icon{font-size:56px;margin-bottom:16px;opacity:.6}
.empty-state p{font-size:16px;color:var(--text-secondary);margin-bottom:6px}
.empty-hint{font-size:13px;color:var(--text-light)}
/* 详情弹窗 */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s ease}
.modal-content{background:#fff;border-radius:16px;width:90%;max-width:650px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:slideUp .3s ease}
.modal-header{padding:24px 28px 0;display:flex;justify-content:space-between;align-items:flex-start}
.modal-header h2{font-size:22px;color:var(--text)}
.modal-header .modal-cuisine{font-size:13px;color:var(--primary);font-weight:600;margin-top:4px}
.modal-close{background:none;border:none;font-size:24px;cursor:pointer;color:var(--text-light);padding:4px 8px;border-radius:8px;transition:all var(--transition)}
.modal-close:hover{background:#f5f5f5;color:var(--text)}
.modal-body{padding:0 28px 28px}
.modal-section{margin-top:20px}
.modal-section h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:10px;display:flex;align-items:center;gap:6px}
.ingredient-tags{display:flex;flex-wrap:wrap;gap:8px}
.ingredient-tag{background:var(--bg);padding:6px 14px;border-radius:20px;font-size:13px;color:var(--text-secondary)}
.step-list{list-style:none;counter-reset:step}
.step-list li{counter-increment:step;padding:12px 0 12px 40px;position:relative;border-bottom:1px solid var(--border);font-size:14px;line-height:1.7;color:var(--text)}
.step-list li::before{content:counter(step);position:absolute;left:0;top:14px;width:26px;height:26px;background:var(--primary);color:#fff;border-radius:50%;text-align:center;line-height:26px;font-size:12px;font-weight:700}
.step-list li:last-child{border-bottom:none}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
/* 悬浮菜单球 */
.fab{position:fixed;bottom:24px;right:24px;z-index:150;width:56px;height:56px;border-radius:50%;background:var(--primary);color:#fff;border:none;cursor:pointer;font-size:22px;box-shadow:0 4px 16px rgba(76,175,80,.4);display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.fab:hover{transform:scale(1.1);box-shadow:0 6px 24px rgba(76,175,80,.5)}
.fab .fab-badge{position:absolute;top:-4px;right:-4px;background:#e74c3c;color:#fff;font-size:11px;font-weight:700;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;line-height:1}
/* 今日菜单面板 */
.menu-panel{position:fixed;bottom:96px;right:24px;z-index:149;width:380px;max-height:70vh;background:#fff;border-radius:16px;box-shadow:0 8px 40px rgba(0,0,0,.15);display:none;flex-direction:column;overflow:hidden;animation:slideUp .25s ease}
.menu-panel.show{display:flex}
.menu-panel-header{padding:18px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.menu-panel-header h3{font-size:17px;color:var(--text);margin:0}
.menu-panel-header .menu-count{font-size:13px;color:var(--text-secondary)}
.menu-panel-actions{display:flex;gap:8px}
.menu-panel-body{flex:1;overflow-y:auto;padding:12px 20px;max-height:40vh}
.menu-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.menu-item:last-child{border-bottom:none}
.menu-item-name{flex:1;font-size:14px;font-weight:600;color:var(--text)}
.menu-item-cuisine{font-size:12px;color:var(--text-light)}
.menu-item-remove{background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:4px;transition:color var(--transition)}
.menu-item-remove:hover{color:#e74c3c}
.menu-panel-footer{padding:14px 20px;border-top:1px solid var(--border);display:flex;gap:10px}
.menu-panel-footer button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;transition:all var(--transition)}
.btn-export{background:var(--primary);color:#fff}
.btn-export:hover{opacity:.9}
.btn-clear{background:var(--bg);color:var(--text-secondary)}
.btn-clear:hover{background:#e8e8e8}
.menu-empty{padding:40px 20px;text-align:center;color:var(--text-light);font-size:14px}
/* 导出预览 */
.export-preview{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
.export-preview.show{display:flex}
.export-preview-inner{background:#fff;border-radius:16px;padding:24px;max-width:600px;width:90%;max-height:80vh;overflow-y:auto}
.export-preview-inner h3{margin-bottom:12px;text-align:center}
.export-preview-inner .preview-list{list-style:none;margin-bottom:16px}
.export-preview-inner .preview-list li{padding:8px 0;border-bottom:1px solid var(--border);font-size:14px;display:flex;justify-content:space-between}
.export-preview-btns{display:flex;gap:10px}
.export-preview-btns button{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer}
.btn-confirm-export{background:var(--primary);color:#fff}
.btn-cancel-export{background:var(--bg);color:var(--text-secondary)}
.export-canvas-wrap{text-align:center}
@media(max-width:768px){
.menu-panel{width:calc(100vw - 32px);right:16px;bottom:88px}
}
@media(max-width:768px){
.app-container{flex-direction:column}
.sidebar{position:relative;width:100%;height:auto;box-shadow:0 2px 8px rgba(0,0,0,.04);flex-shrink:0}
.sidebar .logo{padding:16px 20px 12px}
.sidebar .logo-text{font-size:18px}
.sidebar .logo-icon{font-size:24px}
.sidebar nav{display:flex;overflow-x:auto;padding:8px 16px 12px;gap:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.sidebar nav::-webkit-scrollbar{display:none}
.nav-item{padding:8px 14px;border-left:none;border-bottom:2px solid transparent;white-space:nowrap;font-size:13px;border-radius:6px 6px 0 0;flex-shrink:0}
.nav-item.active{border-left:none;border-bottom-color:var(--primary);background:var(--primary-light);border-radius:6px 6px 0 0}
.nav-item:hover{border-radius:6px}
.nav-dot{width:8px;height:8px}
.divider{display:none}
.main-content{margin-left:0}
.top-bar{flex-direction:column;align-items:stretch;padding:16px 20px;gap:12px}
.search-box{max-width:none;width:100%}
.cuisine-title{font-size:16px}
.recipe-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px;padding:20px}
.card-image{height:140px;font-size:18px}
.modal-content{width:95%;max-height:90vh}
}
@media(max-width:480px){
.recipe-grid{grid-template-columns:1fr;gap:14px;padding:14px}
.card-image{height:130px;font-size:16px}
.top-bar{padding:12px 14px}
}
</style>
</head>
<body>
<div class="app-container">
<aside class="sidebar">
<div class="logo"><span class="logo-icon">🍳</span><span class="logo-text">每日菜谱</span></div>
<nav>
<a href="#" class="nav-item active" data-cuisine="all"><span class="nav-dot"></span>全部菜系</a>
<a href="#" class="nav-item" data-cuisine="川菜"><span class="nav-dot" style="background:#e74c3c"></span>川菜</a>
<a href="#" class="nav-item" data-cuisine="粤菜"><span class="nav-dot" style="background:#e67e22"></span>粤菜</a>
<a href="#" class="nav-item" data-cuisine="鲁菜"><span class="nav-dot" style="background:#f1c40f"></span>鲁菜</a>
<a href="#" class="nav-item" data-cuisine="苏菜"><span class="nav-dot" style="background:#2ecc71"></span>苏菜</a>
<a href="#" class="nav-item" data-cuisine="浙菜"><span class="nav-dot" style="background:#1abc9c"></span>浙菜</a>
<a href="#" class="nav-item" data-cuisine="闽菜"><span class="nav-dot" style="background:#3498db"></span>闽菜</a>
<a href="#" class="nav-item" data-cuisine="湘菜"><span class="nav-dot" style="background:#e74c3c"></span>湘菜</a>
<a href="#" class="nav-item" data-cuisine="徽菜"><span class="nav-dot" style="background:#9b59b6"></span>徽菜</a>
<div class="divider"><span class="divider-line"></span><span class="divider-label">健康专区</span><span class="divider-line"></span></div>
<a href="#" class="nav-item nav-special" data-cuisine="减脂餐"><span class="nav-dot" style="background:#4CAF50"></span>减脂餐</a>
</nav>
</aside>
<main class="main-content">
<header class="top-bar">
<div class="search-box"><span class="search-icon">🔍</span><input type="text" id="searchInput" placeholder="搜索菜谱..."></div>
<div class="cuisine-title" id="cuisineTitle">全部菜系</div>
</header>
<div class="recipe-grid" id="recipeGrid"></div>
<div class="empty-state" id="emptyState" style="display:none"><div class="empty-icon">🍽️</div><p>没有找到相关菜谱</p><p class="empty-hint">试试其他关键词或菜系吧</p></div>
</main>
</div>
<div class="modal-overlay" id="modalOverlay" style="display:none">
<div class="modal-content"><div class="modal-header"><div><h2 id="modalName"></h2><div class="modal-cuisine" id="modalCuisine"></div></div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-body"><div class="modal-section" id="modalIngredients"></div><div class="modal-section" id="modalSteps"></div></div></div>
</div>
<button class="fab" id="fabBtn">
  <span style="font-size:14px">📋</span>
  <span class="fab-badge" id="fabBadge" style="display:none">0</span>
</button>
<div class="menu-panel" id="menuPanel">
  <div class="menu-panel-header">
    <div><h3>📋 今日菜单</h3><span class="menu-count" id="menuCount">0 道菜</span></div>
    <button class="btn-clear" style="padding:6px 12px;font-size:12px" onclick="clearMenu()">清空</button>
  </div>
  <div class="menu-panel-body" id="menuPanelBody">
    <div class="menu-empty">还没选菜呢～<br>去菜谱里挑几道吧</div>
  </div>
  <div class="menu-panel-footer">
    <button class="btn-clear" onclick="clearMenu()">清空</button>
    <button class="btn-export" onclick="exportMenu()">📸 导出图片</button>
  </div>
</div>
<div class="export-preview" id="exportPreview">
  <div class="export-preview-inner">
    <h3>📸 导出今日菜单</h3>
    <ul class="preview-list" id="previewList"></ul>
    <div class="export-canvas-wrap"><canvas id="exportCanvas" style="display:none"></canvas></div>
    <div class="export-preview-btns">
      <button class="btn-cancel-export" onclick="closeExportPreview()">取消</button>
      <button class="btn-confirm-export" onclick="doExport()">下载图片</button>
    </div>
  </div>
</div>
<script>
const recipes = [
// ==================== 川菜 (60道) ====================
{id:"sc001",name:"宫保鸡丁",cuisine:"川菜",category:"八大菜系",calories:380,cookingTime:25,difficulty:"中等",ingredients:["鸡胸肉300g","花生米50g","干辣椒10个","大葱2根","姜","蒜","酱油","醋","白糖","淀粉"],description:"川菜经典名菜，鸡肉滑嫩花生酥脆，麻辣鲜香下饭一绝。",steps:["鸡胸肉切丁，加料酒、盐、淀粉抓匀腌制15分钟","花生米小火炒至金黄酥脆盛出备用","调碗汁：酱油2勺、醋1勺半、糖1勺、淀粉1勺、清水3勺搅匀","锅中多油烧至六成热，下鸡丁滑炒至变色盛出","留底油下干辣椒段、花椒粒小火炒出红油","加姜蒜末爆香，放入葱段翻炒","倒入鸡丁大火翻炒均匀","淋入碗汁快速翻炒至汁水收浓","撒入花生米翻匀即可出锅"]},
{id:"sc002",name:"麻婆豆腐",cuisine:"川菜",category:"八大菜系",calories:260,cookingTime:20,difficulty:"简单",ingredients:["嫩豆腐1块","牛肉末100g","郫县豆瓣酱2勺","豆豉1勺","花椒粉","蒜苗","姜蒜末","水淀粉"],description:"麻辣烫鲜香嫩，豆腐入口即化，米饭杀手。",steps:["豆腐切成2cm方块，入加了盐的开水中焯2分钟捞出","牛肉末加少许料酒和生抽拌匀","锅烧热倒油，下牛肉末煸炒至酥香盛出","锅中加油，小火下豆瓣酱炒出红油","加豆豉、姜蒜末炒香","加适量清水或高汤烧开","轻轻放入豆腐块，小火煮3-5分钟入味","加酱油、少许糖调味","淋入水淀粉勾薄芡推匀","撒上牛肉末、花椒粉和蒜苗碎即可"]},
{id:"sc003",name:"回锅肉",cuisine:"川菜",category:"八大菜系",calories:450,cookingTime:30,difficulty:"中等",ingredients:["五花肉300g","蒜苗4根","郫县豆瓣酱2勺","甜面酱1勺","豆豉","姜片","料酒","白糖"],description:"色泽红亮肥而不腻，肉片卷曲如灯盏窝，川菜之首。",steps:["五花肉整块冷水下锅，加姜片料酒煮至筷子能扎透","捞出放凉后切成约3mm薄片","蒜苗斜切成段，蒜白和蒜叶分开","锅不放油，直接下肉片中火煸炒","炒至肉片卷曲出油、表面微焦黄","将肉推到一边，下豆瓣酱小火炒出红油","加甜面酱、豆豉、白糖翻炒均匀","先放蒜白段翻炒至断生","再放蒜叶翻炒几下即可出锅"]},
{id:"sc004",name:"水煮鱼",cuisine:"川菜",category:"八大菜系",calories:320,cookingTime:35,difficulty:"中等",ingredients:["草鱼1条","豆芽200g","干辣椒15个","花椒2勺","郫县豆瓣酱2勺","姜蒜末","蛋清","淀粉"],description:"鱼片嫩滑麻辣鲜香，红油翻滚中透着鱼肉鲜美。",steps:["草鱼去骨片成薄片，加盐、料酒、蛋清、淀粉抓匀上浆","豆芽焯水断生铺在大碗底部","锅中油烧热，下豆瓣酱炒出红油","加姜蒜末炒香，倒入适量清水或高汤","大火烧开后加盐、胡椒粉调味","将鱼片一片片滑入汤中，轻轻推动","鱼肉变白即熟，连汤带鱼倒入铺好豆芽的碗中","鱼片上撒大量干辣椒段和花椒","另起锅烧热油至冒烟，泼在辣椒花椒上即可"]},
{id:"sc005",name:"夫妻肺片",cuisine:"川菜",category:"八大菜系",calories:280,cookingTime:60,difficulty:"中等",ingredients:["牛腱子肉200g","牛肚200g","牛舌100g","芹菜","花生碎","芝麻","辣椒油","花椒油","蒜泥","酱油","醋"],description:"麻辣醇厚细嫩化渣，夫妻合力创出的川味传奇。",steps:["牛腱、牛肚、牛舌分别清洗干净","冷水下锅加姜片、料酒焯水去腥","锅中加卤料包（八角桂皮香叶等）卤制40-60分钟","卤好捞出放凉，分别切成薄片","芹菜切段焯水垫在盘底","将牛杂片整齐码放在芹菜上","调汁：辣椒油3勺、花椒油1勺、蒜泥、生抽、醋、糖拌匀","将汁浇在肉上，撒花生碎、白芝麻、香菜即可"]},
{id:"sc006",name:"鱼香肉丝",cuisine:"川菜",category:"八大菜系",calories:320,cookingTime:20,difficulty:"中等",ingredients:["猪里脊肉250g","木耳50g","胡萝卜1根","青椒1个","泡椒2个","姜蒜","葱","酱油","醋","白糖","淀粉"],description:"酸甜微辣葱姜蒜香浓郁，鱼香味型的经典代表。",steps:["里脊肉切丝，加少许盐、料酒、淀粉抓匀","木耳泡发切丝，胡萝卜、青椒切丝","调鱼香汁：酱油2勺、醋2勺、白糖3勺、淀粉1勺、清水2勺","锅中油烧热，下肉丝滑炒至变色盛出","留底油下泡椒末和姜蒜末炒香","放入胡萝卜丝、木耳丝翻炒","倒入肉丝翻炒均匀","淋入鱼香汁大火快速翻炒收汁即可"]},
{id:"sc007",name:"辣子鸡丁",cuisine:"川菜",category:"八大菜系",calories:400,cookingTime:25,difficulty:"中等",ingredients:["鸡腿肉300g","干辣椒50g","花椒2勺","姜蒜","料酒","酱油","白糖","白芝麻"],description:"辣椒比鸡多，在辣椒堆里找鸡丁的快乐。",steps:["鸡腿肉切小丁，加料酒、酱油、盐、淀粉腌制20分钟","干辣椒剪成段去籽","鸡肉丁入锅炸至金黄酥脆捞出","油温升高后快速复炸一次更酥","锅中留少许油，小火炒香花椒和干辣椒段","加姜蒜片爆香","倒入炸好的鸡丁大火翻炒","加少许白糖和白芝麻翻匀出锅"]},
{id:"sc008",name:"水煮牛肉",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["牛里脊300g","生菜","豆芽","芹菜","蒜苗","干辣椒","花椒","郫县豆瓣酱","姜蒜"],description:"牛肉滑嫩麻辣鲜烫，冬日里的一把火。",steps:["牛肉逆纹切薄片，加盐、料酒、蛋清、淀粉抓匀","生菜、豆芽、芹菜、蒜苗分别处理切段","蔬菜焯水铺在大碗底","锅中油烧热，下豆瓣酱炒出红油","加姜蒜炒香后倒入高汤或清水烧开","加盐、胡椒粉调味","将牛肉片一片片滑入沸腾的汤中","牛肉变色即连汤倒入蔬菜碗中","撒干辣椒段和花椒，浇上滚烫热油"]},
{id:"sc009",name:"酸菜鱼",cuisine:"川菜",category:"八大菜系",calories:300,cookingTime:35,difficulty:"中等",ingredients:["草鱼1条","酸菜300g","泡椒5个","干辣椒","花椒","姜蒜","蛋清","料酒"],description:"酸爽开胃鱼肉嫩滑，汤都可以泡三碗饭。",steps:["草鱼片成薄片，加盐、料酒、蛋清、淀粉腌制","酸菜切丝，泡椒切段","锅中油热，下姜蒜和泡椒炒香","加入酸菜翻炒3分钟出酸味","加入足量清水烧开煮5分钟","加盐、白胡椒粉调味","将鱼片逐片滑入锅中","鱼片变白即熟，出锅盛入大碗","鱼上撒干辣椒花椒，浇热油即可"]},
{id:"sc010",name:"毛血旺",cuisine:"川菜",category:"八大菜系",calories:480,cookingTime:40,difficulty:"中等",ingredients:["鸭血300g","毛肚200g","午餐肉100g","豆芽","黄喉","干辣椒","花椒","火锅底料","郫县豆瓣酱"],description:"麻辣鲜香料足味浓，重庆江湖菜的代表。",steps:["鸭血切块焯水，毛肚洗净切片","午餐肉切片，豆芽焯水铺底","锅中油热下豆瓣酱和火锅底料炒化","加姜蒜、干辣椒花椒炒香","倒入高汤或清水烧开煮5分钟","放入鸭血、午餐肉等耐煮食材先煮3分钟","再放入毛肚、黄喉涮烫30秒即熟","连汤带料倒入铺好豆芽的碗中","撒蒜末辣椒，浇一勺滚烫热油"]},
{id:"sc011",name:"蒜泥白肉",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"简单",ingredients:["五花肉300g","大蒜1整头","黄瓜1根","酱油","红油","花椒油","白糖","醋"],description:"蒜香浓郁肥而不腻，最简单的食材最极致的味道。",steps:["五花肉整块冷水下锅，加姜片料酒煮至熟透","捞出放凉，切成极薄的薄片","黄瓜用刮刀刮成薄片卷起围在盘边","将白肉片整齐码在盘中","大蒜捣成蒜泥（越细越好）","调汁：蒜泥+酱油3勺+红油2勺+少许糖醋花椒油","将调好的汁均匀浇在白肉上","撒上葱花即可上桌"]},
{id:"sc012",name:"干煸四季豆",cuisine:"川菜",category:"八大菜系",calories:200,cookingTime:20,difficulty:"简单",ingredients:["四季豆300g","猪肉末80g","芽菜50g","干辣椒","花椒","姜蒜","酱油"],description:"外皮微焦内里软嫩，干香微辣的下饭素菜。",steps:["四季豆去筋掰成段，洗净沥干水分","锅中不放油，下四季豆中火干煸","煸至表皮出现焦斑、豆角变软时盛出","锅中倒油，下肉末炒至酥香","加姜蒜末、干辣椒段、花椒炒香","加入芽菜翻炒均匀","倒回四季豆快速翻炒","加少许酱油和盐调味即可出锅"]},
{id:"sc013",name:"口水鸡",cuisine:"川菜",category:"八大菜系",calories:320,cookingTime:40,difficulty:"中等",ingredients:["鸡腿2个","花生碎","白芝麻","辣椒油","花椒油","芝麻酱","蒜泥","姜","葱","黄瓜"],description:"麻辣鲜香嫩，看着就流口水，故名口水鸡。",steps:["鸡腿冷水下锅加姜片葱结料酒煮15分钟","关火焖10分钟后取出放入冰水中冷却","黄瓜切片垫在盘底","将凉透的鸡腿斩件摆盘","调汁：芝麻酱1勺调开+辣椒油3勺+花椒油1勺+生抽2勺+醋1勺+糖+蒜泥+鸡汤","将料汁均匀淋在鸡上","撒上花生碎、白芝麻、葱花即可"]},
{id:"sc014",name:"钵钵鸡",cuisine:"川菜",category:"八大菜系",calories:380,cookingTime:50,difficulty:"中等",ingredients:["鸡腿2个","鸡胗100g","藕","土豆","花菜","木耳","白芝麻","红油","花椒油","芝麻酱"],description:"冷锅串串滋味足，四川街头最受欢迎的小吃。",steps:["鸡腿、鸡胗煮熟后切片，蔬菜切片焯水至断生","将所有食材用竹签串成串","大碗中调汁：大量红油+花椒油+芝麻酱+生抽+醋+糖+蒜泥+鸡汤","将串好的食材浸泡在料汁中","至少浸泡30分钟以上入味","吃之前撒上大量白芝麻和葱花"]},
{id:"sc015",name:"担担面",cuisine:"川菜",category:"八大菜系",calories:450,cookingTime:25,difficulty:"简单",ingredients:["细面条200g","猪肉末100g","芽菜30g","芝麻酱","辣椒油","花椒粉","蒜泥","葱花","酱油"],description:"面细无汤麻辣鲜香，挑着担子叫卖出的百年名面。",steps:["猪肉末入锅炒至酥香，加少许酱油和芽菜炒匀成臊子","芝麻酱用温水调开，加酱油、辣椒油、花椒粉、蒜泥调成底","面条入沸水煮熟捞出","碗底先放调好的酱汁","放入煮好的面条","浇上炒好的肉臊","撒上葱花和花生碎即可"]},
{id:"sc016",name:"宜宾燃面",cuisine:"川菜",category:"八大菜系",calories:420,cookingTime:20,difficulty:"简单",ingredients:["细面条200g","猪肉末80g","芽菜","花生碎","芝麻","辣椒油","花椒粉","葱花"],description:"面干无汤油亮如燃，鲜辣爽口回味悠长。",steps:["猪肉末炒至酥香，加芽菜翻匀备用","碗中放酱油、辣椒油、花椒粉、少许猪油调底","面条入沸水煮至断生捞出沥干","迅速放入调好底的碗中","浇上炒好的肉臊芽菜","撒花生碎、白芝麻、葱花","趁热拌匀食用"]},
{id:"sc017",name:"粉蒸牛肉",cuisine:"川菜",category:"八大菜系",calories:320,cookingTime:50,difficulty:"中等",ingredients:["牛里脊300g","蒸肉粉100g","红薯1个","郫县豆瓣酱","姜蒜","花椒粉","香菜"],description:"米粉包裹的牛肉软糯鲜香，四川蒸菜代表。",steps:["牛肉切片，加入豆瓣酱、酱油、料酒腌制20分钟","红薯去皮切滚刀块铺在蒸笼底部","腌好的牛肉裹上蒸肉粉","将牛肉均匀铺在红薯上面","蒸锅水开后放入蒸笼，大火蒸30分钟","出锅撒上蒜泥、花椒粉和香菜即可"]},
{id:"sc018",name:"麻酱凤尾",cuisine:"川菜",category:"八大菜系",calories:120,cookingTime:10,difficulty:"简单",ingredients:["莴笋尖300g","芝麻酱2勺","酱油","醋","白糖","蒜泥","辣椒油"],description:"清脆爽口麻酱浓香，最经典的川味凉拌素菜。",steps:["莴笋尖洗净，削去老皮","切成滚刀块或条状","入沸水焯烫30秒捞出过凉","芝麻酱用香油调开至顺滑","加入酱油、醋、白糖、蒜泥、辣椒油调匀","将调好的麻酱汁浇在莴笋上","拌匀即可食用"]},
{id:"sc019",name:"叶儿粑",cuisine:"川菜",category:"八大菜系",calories:280,cookingTime:40,difficulty:"中等",ingredients:["糯米粉200g","猪肉末150g","芽菜50g","柚子叶或粽叶","酱油","花椒粉"],description:"糯米皮包裹咸香肉馅，用叶子包裹蒸制的川南小吃。",steps:["猪肉末炒香加芽菜、酱油、花椒粉做成馅料","糯米粉加温水和成光滑面团","分成小剂子，压扁包入肉馅","搓成椭圆形的粑","柚叶洗净抹少许油，包裹住粑","放入蒸锅大火蒸15分钟即可"]},
{id:"sc020",name:"三大炮",cuisine:"川菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"简单",ingredients:["糯米300g","黄豆粉","红糖","白芝麻"],description:"糯米团砸在案板上砰然三响，成都名小吃的仪式感。",steps:["糯米浸泡4小时后蒸熟","蒸熟的糯米放入石臼中捣成糍粑","手蘸水，揪成小团","案板上铺黄豆粉，将糍粑团用力摔在案板上","让糍粑团裹满黄豆粉","红糖加水熬成浓稠糖浆","糍粑装碗，淋红糖浆、撒芝麻即可"]},
{id:"sc021",name:"灯影牛肉",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:90,difficulty:"困难",ingredients:["牛后腿肉500g","辣椒粉","花椒粉","五香粉","白糖","芝麻","香油"],description:"肉片薄如纸可透灯光，麻辣回甜入口化渣。",steps:["牛肉去筋膜，切极薄的片（可先冷冻方便切）","肉片铺在烤网上，自然风干或低温烘干2-3小时","锅中油温六七成热，下牛肉片炸至酥脆","捞出控油","另取锅小火，加少许油将辣椒粉花椒粉五香粉炒香","放入炸好的牛肉片翻炒","加白糖和芝麻翻匀","淋少许香油出锅晾凉后食用"]},
{id:"sc022",name:"鸡豆花",cuisine:"川菜",category:"八大菜系",calories:150,cookingTime:40,difficulty:"困难",ingredients:["鸡胸肉200g","鸡蛋清3个","火腿","青菜心","清鸡汤","淀粉"],description:"吃鸡不见鸡，形似豆花嫩滑如脂，川菜清鲜极致之作。",steps:["鸡胸肉去筋，用刀背反复砸成极细的泥","鸡泥中加入蛋清和少许水淀粉搅拌上劲","清鸡汤烧开转小火保持微沸","将鸡浆缓缓倒入汤中","小火慢煮至鸡浆浮起凝固如豆花状","轻轻盛入汤碗中","配上火腿末和焯过水的菜心即可"]},
{id:"sc023",name:"开水白菜",cuisine:"川菜",category:"八大菜系",calories:80,cookingTime:120,difficulty:"困难",ingredients:["大白菜心1个","老母鸡半只","火腿","干贝","排骨","姜葱"],description:"看似清水实为顶级高汤，国宴级川菜清鲜巅峰。",steps:["老母鸡、排骨、火腿、干贝加水小火熬制高汤4小时","将高汤用鸡茸扫汤法反复澄清至水一样清澈","白菜心洗净，纵向剖开","白菜用澄清的高汤小火慢煮至软透入味","捞出装盘，浇上滚烫的澄清高汤即可"]},
{id:"sc024",name:"咸烧白",cuisine:"川菜",category:"八大菜系",calories:480,cookingTime:90,difficulty:"中等",ingredients:["五花肉400g","芽菜200g","酱油","料酒","花椒","姜片","白糖"],description:"耙糯入味肥而不腻，四川宴席九斗碗之一。",steps:["五花肉整块煮至七成熟，捞出趁热在皮上抹酱油","锅中多油烧热，肉皮朝下炸至起泡呈金红色","捞出放入原汤中泡至皮软起皱","切成约5mm厚的大片","肉皮朝下整齐码入蒸碗中","芽菜切碎加姜末花椒炒香铺在肉上","淋酱油、料酒、少许糖","上蒸锅大火蒸1小时","取出倒扣在盘中即可"]},
{id:"sc025",name:"甜烧白",cuisine:"川菜",category:"八大菜系",calories:500,cookingTime:90,difficulty:"中等",ingredients:["五花肉400g","糯米200g","红糖100g","红豆沙100g","猪油"],description:"糯米甜糯肉香浓郁，四川宴席甜菜之首。",steps:["五花肉煮至七成熟，切连刀片（两片夹一刀不切断）","肉片中夹入红豆沙","糯米浸泡2小时后蒸熟","蒸熟的糯米加红糖和猪油拌匀","夹好豆沙的肉片皮朝下摆在碗中","将甜糯米铺在肉上面压实","上蒸锅大火蒸1小时","取出倒扣在盘中即可"]},
{id:"sc026",name:"锅巴肉片",cuisine:"川菜",category:"八大菜系",calories:380,cookingTime:25,difficulty:"中等",ingredients:["猪里脊200g","锅巴100g","木耳","玉兰片","番茄酱","醋","白糖","淀粉"],description:"上桌时吱吱作响，锅巴酥脆酸甜可口，色香味声俱全。",steps:["里脊肉切片，加盐料酒淀粉抓匀","调汁：番茄酱+醋+白糖+盐+水淀粉+清水","木耳玉兰片切片焯水","锅中油热下肉片滑炒盛出","锅中留底油下姜蒜爆香，倒入调好的汁煮至浓稠","放入肉片和蔬菜翻炒","同时另起锅将锅巴炸至金黄酥脆","锅巴铺在盘底，浇上炒好的肉片汁即可（有声）"]},
{id:"sc027",name:"鱼香茄子",cuisine:"川菜",category:"八大菜系",calories:250,cookingTime:20,difficulty:"简单",ingredients:["茄子2根","猪肉末80g","泡椒","姜蒜","葱","酱油","醋","白糖","郫县豆瓣酱"],description:"茄子软糯吸入鱼香汁水，没有鱼却胜似有鱼。",steps:["茄子切条，撒少许盐腌制10分钟后挤去水分","调鱼香汁：酱油2勺、醋2勺、白糖3勺、淀粉1勺、水2勺","锅中多油烧热，下茄子条炸软捞出","留底油下肉末炒香","加豆瓣酱和泡椒末炒出红油","加姜蒜末炒香，放入茄子翻炒","淋入鱼香汁大火收汁","撒葱花出锅"]},
{id:"sc028",name:"蚂蚁上树",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:15,difficulty:"简单",ingredients:["粉丝100g","猪肉末150g","郫县豆瓣酱2勺","姜蒜","葱花","高汤","酱油"],description:"肉末粘在粉丝上如蚂蚁上树，软糯鲜香。",steps:["粉丝用温水泡软剪段","锅中油热下肉末煸炒至酥香","下豆瓣酱炒出红油","加姜蒜末炒香","加入适量高汤或清水烧开","放入粉丝翻炒至吸干汤汁","加酱油调味，炒至干香","撒上葱花即可"]},
{id:"sc029",name:"四川泡菜",cuisine:"川菜",category:"八大菜系",calories:30,cookingTime:10080,difficulty:"中等",ingredients:["白萝卜","胡萝卜","豇豆","卷心菜","姜","蒜","干辣椒","花椒","白酒","盐","老泡菜水"],description:"酸脆爽口开胃解腻，四川家家户户的传家宝。",steps:["准备泡菜坛，洗净消毒晾干","蔬菜洗净晾干水分（不能有生水）","锅中加水加盐（盐：水约1：15）烧开晾凉","将盐水倒入坛中，加入花椒干辣椒白酒","加入老泡菜水（或密封发酵3天养水）","依次放入各种蔬菜，按压使蔬菜完全浸泡在盐水中","坛沿加水密封，放置阴凉处发酵","夏天2-3天、冬天5-7天即可食用"]},
{id:"sc030",name:"椒麻鸡",cuisine:"川菜",category:"八大菜系",calories:280,cookingTime:35,difficulty:"简单",ingredients:["鸡腿2个","花椒1把","小葱5根","姜","酱油","香油","盐"],description:"椒麻味型清爽利落，花椒与葱的完美合奏。",steps:["鸡腿冷水下锅，加姜片料酒煮熟","捞出放凉后撕成条","花椒用温水泡10分钟去涩","小葱切碎，与花椒一起剁成极细的椒麻泥","椒麻泥中加入酱油、香油、少许盐和鸡汤调匀","将椒麻汁浇在鸡肉上拌匀即可"]},
{id:"sc031",name:"醪糟粉子",cuisine:"川菜",category:"八大菜系",calories:220,cookingTime:20,difficulty:"简单",ingredients:["糯米粉150g","醪糟100g","鸡蛋1个","枸杞","冰糖"],description:"软糯香甜酒香四溢，四川人从小吃到大的甜品。",steps:["糯米粉加温水揉成面团，搓成小圆子","锅中水烧开，放入糯米小圆子","煮至圆子全部浮起","倒入醪糟和枸杞煮1分钟","淋入打散的鸡蛋液","加冰糖调味即可"]},
{id:"sc032",name:"冰粉",cuisine:"川菜",category:"八大菜系",calories:150,cookingTime:10,difficulty:"简单",ingredients:["冰粉粉10g","红糖","花生碎","葡萄干","山楂碎","白芝麻","水果丁"],description:"晶莹剔透冰凉爽滑，四川夏天的续命神器。",steps:["冰粉粉倒入沸水中搅拌至完全溶解","倒入容器中放凉后冷藏3小时凝固","红糖加水熬成浓稠的糖浆","凝固的冰粉切成块盛入碗中","浇上冰镇红糖浆","撒上花生碎、葡萄干、山楂碎、芝麻、水果丁即可"]},
{id:"sc033",name:"赖汤圆",cuisine:"川菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"中等",ingredients:["糯米粉300g","黑芝麻100g","白糖80g","猪油50g"],description:"皮薄馅大糯而不粘，咬一口黑芝麻馅缓缓流淌。",steps:["黑芝麻炒熟后打成粉","芝麻粉加白糖和融化的猪油拌匀成馅","将馅搓成小球冷藏定型","糯米粉加温水和成面团","取一小块面团按扁包入芝麻馅小球","收口搓圆","水开下汤圆，煮至浮起再煮2分钟即可"]},
{id:"sc034",name:"韩包子",cuisine:"川菜",category:"八大菜系",calories:250,cookingTime:60,difficulty:"中等",ingredients:["中筋面粉300g","猪肉末250g","姜葱水","酱油","花椒粉","酵母","白糖"],description:"皮薄馅大汁多味美，成都百年名小吃。",steps:["面粉加酵母温水白糖揉成面团发酵1小时","肉末加姜葱水搅拌上劲","加酱油、盐、花椒粉、香油调味成馅","发好的面团排气揉匀，分成小剂子","擀成中间厚边薄的皮","包入肉馅捏成包子","醒发20分钟后上蒸锅大火蒸15分钟"]},
{id:"sc035",name:"钟水饺",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["饺子皮30张","猪肉末300g","姜葱水","复制酱油","红油","蒜泥","芝麻酱"],description:"皮薄馅嫩纯肉馅，甜辣回甘的成都味道。",steps:["肉末加姜葱水顺一个方向搅拌上劲，加盐调味","包成饺子（纯肉馅不掺菜）","水开下饺子，煮至浮起捞出沥干","复制酱油（酱油+红糖熬制）+红油+蒜泥+芝麻酱调汁","将调汁浇在饺子上即可"]},
{id:"sc036",name:"龙抄手",cuisine:"川菜",category:"八大菜系",calories:320,cookingTime:25,difficulty:"简单",ingredients:["抄手皮30张","猪肉末250g","鸡蛋1个","姜葱水","鸡汤","紫菜","虾皮","胡椒粉"],description:"皮薄如纸馅嫩汤鲜，红油清汤两种吃法。",steps:["肉末加蛋液、姜葱水、盐搅拌上劲成馅","包抄手：取皮放馅，对折成三角形再捏合两角","清汤：碗底放紫菜虾皮盐胡椒粉，冲入滚烫鸡汤","另起锅水开下抄手，煮至浮起","捞出放入汤碗中即可","红油版：不放汤，浇红油佐料"]},
{id:"sc037",name:"冒菜",cuisine:"川菜",category:"八大菜系",calories:400,cookingTime:30,difficulty:"简单",ingredients:["牛肉片","土豆片","藕片","豆皮","花菜","火锅底料100g","干辣椒","花椒","蒜泥","芝麻","香菜"],description:"一个人的火锅，想吃什么冒什么。",steps:["准备各种食材：牛肉片、土豆片、藕片、豆皮等","锅中加油和火锅底料炒化","加入干辣椒花椒炒香","加入足量清水烧开煮5分钟出味","将难熟的食材先下锅煮","再放入易熟的蔬菜","全部煮熟后捞出盛入大碗","浇上汤汁，撒蒜泥香菜芝麻"]},
{id:"sc038",name:"蹄花汤",cuisine:"川菜",category:"八大菜系",calories:380,cookingTime:180,difficulty:"简单",ingredients:["猪前蹄2只","芸豆100g","姜","葱","花椒","料酒","蘸水料"],description:"汤白如奶蹄花软糯，蘸着麻辣料汁吃是无上享受。",steps:["猪蹄烧毛刮洗干净，剁成大块","冷水下锅加料酒焯水去血沫","芸豆提前浸泡4小时","焯好的猪蹄放入砂锅，加足量水和姜葱花椒","大火烧开转小火炖2小时","加入芸豆继续炖1小时","至汤色奶白蹄花软糯脱骨即可","另配蘸碟：生抽、醋、辣椒油、蒜泥、葱花"]},
{id:"sc039",name:"冷吃兔",cuisine:"川菜",category:"八大菜系",calories:300,cookingTime:40,difficulty:"中等",ingredients:["兔肉500g","干辣椒50g","花椒2勺","姜蒜","料酒","酱油","白糖","陈皮"],description:"冷吃热吃皆可，麻辣干香有嚼劲，自贡招牌。",steps:["兔肉切小丁，加料酒、盐、姜片腌制30分钟","干辣椒剪段去籽","锅中多油烧至七成热，下兔丁炸至金黄","捞出控油","留底油小火炒香花椒和干辣椒","加姜蒜末陈皮炒香","倒入兔丁翻炒","加酱油、白糖、少许水焖2分钟收汁","放凉后食用风味更佳"]},
{id:"sc040",name:"乐山甜皮鸭",cuisine:"川菜",category:"八大菜系",calories:450,cookingTime:120,difficulty:"困难",ingredients:["整鸭1只","麦芽糖100g","酱油","料酒","八角","桂皮","花椒","姜","冰糖"],description:"外皮红亮微甜，肉质紧实有嚼劲，乐山城市名片。",steps:["整鸭处理干净，用开水烫皮收紧","卤水中加八角桂皮花椒姜等卤制40分钟","捞出沥干水分","麦芽糖用温水化开，均匀刷在鸭皮上","锅中多油烧至七成热，鸭子入锅炸","用勺子不断往鸭身上浇热油使其上色","炸至鸭皮金红油亮捞出","斩件上桌"]},
{id:"sc041",name:"蛋烘糕",cuisine:"川菜",category:"八大菜系",calories:180,cookingTime:20,difficulty:"中等",ingredients:["面粉150g","鸡蛋2个","红糖50g","酵母","小苏打","馅料（肉松/芽菜/芝麻糖等）"],description:"外酥里嫩可甜可咸，成都街头巷尾的小确幸。",steps:["面粉加鸡蛋、红糖水、酵母调成糊状","发酵1小时至表面起小泡","加少许小苏打搅匀","特制铜锅（或小不粘锅）小火加热刷油","舀一勺面糊倒入，转动使面糊均匀铺开","小火烘至表面起蜂窝状","放入喜欢的馅料（肉松/芽菜/芝麻糖等）","对折取出即可"]},
{id:"sc042",name:"糖油果子",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["糯米粉300g","红糖100g","白芝麻","食用油"],description:"外脆里糯甜蜜拉丝，成都人童年的甜蜜记忆。",steps:["糯米粉加温水和成光滑面团","揪成小剂子搓圆","锅中倒油，加入红糖小火加热至糖融化","油温五成热时放入糯米球","小火慢炸并不断翻动使均匀上色","炸至金红糖色浮起捞出","趁热撒上白芝麻即可"]},
{id:"sc043",name:"宜宾把把烧",cuisine:"川菜",category:"八大菜系",calories:400,cookingTime:30,difficulty:"简单",ingredients:["猪鼻筋","五花肉片","牛肉片","辣椒面","孜然粉","花椒粉","盐","葱花"],description:"一把一把烤着吃，焦香麻辣烟火气十足。",steps:["将各种肉类切成适合串的小片","用竹签将肉串成小把（每把约10-15根）","炭火烤至表面焦香","边烤边撒盐、辣椒面、孜然粉、花椒粉","快速翻面使其均匀受热","烤好后撒上葱花即可上桌"]},
{id:"sc044",name:"李庄白肉",cuisine:"川菜",category:"八大菜系",calories:320,cookingTime:40,difficulty:"中等",ingredients:["二刀肉400g","蒜泥","复制酱油","红油","花椒油","白糖"],description:"肉片薄可透光大如手掌，蘸蒜泥酱汁一口满足。",steps:["二刀肉整块冷水下锅煮熟，捞出放凉","用大刀将肉片成极薄的大片（越薄越好）","黄瓜切丝垫在盘底","将白肉片铺在黄瓜丝上","调蘸汁：大量蒜泥+复制酱油+红油+花椒油+少许糖","蘸汁可浇在肉上，也可另碟蘸食"]},
{id:"sc045",name:"肥肠粉",cuisine:"川菜",category:"八大菜系",calories:450,cookingTime:60,difficulty:"中等",ingredients:["红薯粉条200g","猪肥肠300g","豆芽","酱油","辣椒油","花椒粉","蒜泥","香菜"],description:"粉条Q弹肥肠软糯，麻辣鲜香一口上头。",steps:["肥肠用面粉和醋反复搓洗至无异味","肥肠加姜片料酒焯水去腥","卤料包卤制肥肠40分钟至软糯，切段","红薯粉条温水泡软","碗底放酱油、辣椒油、花椒粉、蒜泥","锅中水开，下粉条和豆芽煮透捞出","放入调好底的碗中","浇上滚烫高汤，铺上卤肥肠段和香菜"]},
{id:"sc046",name:"老妈蹄花",cuisine:"川菜",category:"八大菜系",calories:400,cookingTime:180,difficulty:"简单",ingredients:["猪前蹄2只","芸豆150g","姜","花椒","当归","蘸水"],description:"汤白如奶蹄花软糯，芸豆绵密入口即化。",steps:["猪蹄烧毛刮洗干净，剁块焯水","芸豆提前泡4小时","焯好的猪蹄加足量水、姜片、花椒大火烧开","小火慢炖2小时至汤色变白","加入泡好的芸豆和当归继续炖1小时","至蹄花软糯芸豆绵密","蘸水：生抽+醋+红油+蒜泥+葱花","喝汤吃肉蘸料三吃"]},
{id:"sc047",name:"烤鱼",cuisine:"川菜",category:"八大菜系",calories:420,cookingTime:40,difficulty:"中等",ingredients:["草鱼1条","土豆","藕","洋葱","干辣椒","花椒","郫县豆瓣酱","火锅底料"],description:"外焦里嫩麻辣入味，先吃鱼后涮菜一锅两吃。",steps:["草鱼开背去内脏，两面花刀，用盐料酒姜腌制30分钟","鱼入烤箱200度烤20分钟至表面焦黄","锅中炒香豆瓣酱和火锅底料","加入干辣椒花椒姜蒜炒香","加入适量水烧开，放入配菜煮熟","将配菜和汤汁浇在烤好的鱼上","撒上大量干辣椒和花椒，浇热油激发香味","放在炭火炉上边加热边吃"]},
{id:"sc048",name:"川北凉粉",cuisine:"川菜",category:"八大菜系",calories:180,cookingTime:30,difficulty:"中等",ingredients:["豌豆淀粉100g","水600ml","辣椒油","花椒粉","酱油","醋","蒜泥","豆豉酱","葱花"],description:"晶莹剔透爽滑Q弹，麻辣酸香夏日必吃。",steps:["豌豆淀粉加200ml冷水调成水淀粉","锅中400ml水烧开，转小火","缓缓倒入水淀粉同时不停搅拌","煮至透明浓稠起大泡","倒入模具放凉凝固（冰箱冷藏2小时）","凝固后切成条或片","调汁：辣椒油+花椒粉+酱油+醋+蒜泥+豆豉酱","汁浇在凉粉上撒葱花即可"]},
{id:"sc049",name:"鸡丝凉面",cuisine:"川菜",category:"八大菜系",calories:380,cookingTime:25,difficulty:"简单",ingredients:["细面条200g","鸡胸肉1块","黄瓜","豆芽","芝麻酱","辣椒油","酱油","醋","蒜泥","白糖"],description:"清凉爽口麻辣回甜，四川夏天的续命面。",steps:["鸡胸肉煮熟撕成丝，黄瓜切丝，豆芽焯水","面条煮至断生捞出，拌上熟油摊凉","芝麻酱用香油调开","加酱油、醋、辣椒油、蒜泥、白糖、花椒粉调成汁","凉面装盘，铺上鸡丝黄瓜豆芽","浇上调好的酱汁拌匀食用"]},
{id:"sc050",name:"红糖糍粑",cuisine:"川菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"简单",ingredients:["糯米300g","黄豆粉","红糖100g","食用油"],description:"外酥里糯蘸满红糖浆，川菜馆必点的饭后甜点。",steps:["糯米浸泡4小时后蒸熟","趁热用擀面杖捣成糍粑（保持米粒感）","模具抹油，将糍粑压平整形","放凉后切成长条","红糖加水小火熬成浓稠糖浆","糍粑条入油锅炸至表面金黄","捞出控油，撒黄豆粉","浇上红糖糖浆即可"]},
{id:"sc051",name:"酸辣粉",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:20,difficulty:"简单",ingredients:["红薯粉条150g","猪肉末80g","芽菜","花生碎","辣椒油","醋","花椒粉","蒜泥","葱花"],description:"酸辣鲜麻粉条Q弹，一碗不够再来一碗。",steps:["红薯粉条提前用温水泡软","碗底放辣椒油、花椒粉、蒜泥、酱油、醋","锅中水开下粉条煮至透明","捞出放入调好底的碗中","浇上滚烫高汤","铺上炒好的肉末芽菜","撒花生碎和葱花即可"]},
{id:"sc052",name:"鸡公煲",cuisine:"川菜",category:"八大菜系",calories:500,cookingTime:40,difficulty:"中等",ingredients:["土鸡半只","洋葱","青椒","红椒","干辣椒","郫县豆瓣酱","酱油","姜蒜","啤酒"],description:"浓香四溢鸡块入味，吃完鸡肉加汤涮菜。",steps:["鸡肉剁块，焯水沥干","锅中多油煸炒鸡块至表面金黄","加豆瓣酱炒出红油","加姜蒜干辣椒炒香","倒入半瓶啤酒和适量清水","加盖焖煮20分钟至鸡肉熟透","加酱油调味大火收汁","放入洋葱青红椒翻炒1分钟即可"]},
{id:"sc053",name:"折耳根炒腊肉",cuisine:"川菜",category:"八大菜系",calories:280,cookingTime:15,difficulty:"简单",ingredients:["折耳根200g","腊肉150g","干辣椒","蒜苗","姜蒜"],description:"折耳根清香与腊肉咸香交织，云贵川人的乡愁。",steps:["折耳根洗净切段","腊肉煮软后切薄片","锅中不放油，下腊肉炒出油","加姜蒜干辣椒炒香","放入折耳根大火快速翻炒1分钟","加蒜苗翻匀即可"]},
{id:"sc054",name:"棒棒鸡",cuisine:"川菜",category:"八大菜系",calories:300,cookingTime:35,difficulty:"中等",ingredients:["熟鸡肉300g","黄瓜","芝麻酱","辣椒油","花椒油","酱油","白糖","蒜泥"],description:"用木棒敲打使鸡肉松软，麻辣香甜嫩。",steps:["熟鸡肉去骨，用木棒轻轻敲打至肉质松软","将鸡肉用手撕成丝","黄瓜切丝垫在盘底，铺上鸡丝","调汁：芝麻酱+辣椒油+花椒油+酱油+白糖+蒜泥+鸡汤","将汁浇在鸡丝上","撒上芝麻和葱花即可"]},
{id:"sc055",name:"粉蒸排骨",cuisine:"川菜",category:"八大菜系",calories:420,cookingTime:60,difficulty:"中等",ingredients:["猪小排400g","蒸肉粉100g","土豆2个","郫县豆瓣酱","酱油","姜蒜","花椒粉"],description:"米粉包裹的排骨软糯脱骨，四川蒸菜经典。",steps:["排骨洗净沥干，加豆瓣酱酱油姜蒜腌制30分钟","土豆去皮切块铺碗底","腌好排骨裹上蒸肉粉","将排骨码放在土豆上","蒸锅水开大火蒸45分钟","出锅撒花椒粉和葱花"]},
{id:"sc056",name:"豌豆面",cuisine:"川菜",category:"八大菜系",calories:380,cookingTime:30,difficulty:"中等",ingredients:["面条200g","干豌豆100g","猪肉末80g","辣椒油","花椒粉","酱油","蒜泥"],description:"豌豆耙糯肉臊酥香，重庆小面的经典版本。",steps:["干豌豆提前泡4小时，加水煮至耙烂","猪肉末炒至酥香成臊子","碗底放酱油辣椒油花椒粉蒜泥","面条煮熟捞出放入碗中","浇上煮好的耙豌豆和肉臊","撒葱花即可"]},
{id:"sc057",name:"泡椒凤爪",cuisine:"川菜",category:"八大菜系",calories:200,cookingTime:40,difficulty:"简单",ingredients:["鸡爪500g","泡椒200g","花椒","姜","料酒","白醋","盐","洋葱","芹菜"],description:"酸辣爽脆根本停不下来，追剧零食之王。",steps:["鸡爪去指甲斩成两半，焯水去血沫","加姜片料酒煮10分钟至熟","捞出放入冰水中冷却（皮才Q弹）","泡椒连汁倒入碗中，加白醋盐花椒","加入洋葱丝芹菜段","放入鸡爪浸泡","密封放冰箱冷藏4小时以上入味"]},
{id:"sc058",name:"糖醋排骨",cuisine:"川菜",category:"八大菜系",calories:420,cookingTime:40,difficulty:"中等",ingredients:["猪小排400g","醋","白糖","酱油","料酒","姜","芝麻"],description:"色泽红亮酸甜可口，排骨酥烂酱汁浓稠。",steps:["排骨切段焯水洗净","锅中少许油，下排骨煎至两面微黄","加入姜片、料酒、酱油翻炒","加足量开水没过排骨，大火烧开转小火","炖30分钟至排骨软烂","加大量白糖和醋（3：2），大火收汁","汁浓稠挂在排骨上即可出锅","撒上白芝麻"]},
{id:"sc059",name:"羊马查渣面",cuisine:"川菜",category:"八大菜系",calories:350,cookingTime:20,difficulty:"简单",ingredients:["细面条200g","猪肉末100g","芽菜","酱油","辣椒油","花椒粉","蒜泥"],description:"肉末炒至酥脆如渣，浇在面上麻辣鲜香。",steps:["猪肉末炒至酥脆干香如渣状","加芽菜翻炒均匀成臊子","碗底放酱油辣椒油花椒粉蒜泥","面条煮熟捞出放入碗中","浇上高汤和肉渣臊子","撒葱花即可"]},
{id:"sc060",name:"甜水面",cuisine:"川菜",category:"八大菜系",calories:400,cookingTime:30,difficulty:"中等",ingredients:["中筋面粉300g","芝麻酱","酱油","红糖","蒜泥","辣椒油","花椒粉"],description:"面条粗如筷子甜辣交织，成都人从小吃到大的味道。",steps:["面粉加盐和清水揉成硬面团，醒面30分钟","擀成约5mm厚的面皮，切成筷子粗的条","沸水下面条，煮到浮起后再煮2分钟捞出","酱油和红糖小火熬成复制酱油","芝麻酱用香油调稀","碗底放复制酱油、芝麻酱、辣椒油、蒜泥、花椒粉","放入面条拌匀，撒葱花即可"]},
// ==================== 粤菜 (60道) ====================
{id:"yc001",name:"白切鸡",cuisine:"粤菜",category:"八大菜系",calories:280,cookingTime:45,difficulty:"中等",ingredients:["三黄鸡1只","姜","葱","沙姜","花生油"],description:"皮爽肉滑清淡鲜美，最能体现粤菜追求食材本味的精髓。",steps:["整鸡处理干净，里外抹盐腌制15分钟","大锅加水烧开放入姜片葱结","手提鸡头将鸡身浸入沸水烫3秒提起（三提三放）","使鸡腹腔内外温度一致","然后将鸡完全浸入水中，水再次微沸即关火","盖盖浸泡25-30分钟（视鸡大小）","取出放入冰水中浸泡15分钟（皮爽的关键）","捞出沥干抹上花生油，斩件装盘","蘸料：姜蓉+葱花+沙姜末+盐，浇上滚烫花生油"]},
{id:"yc002",name:"蜜汁叉烧",cuisine:"粤菜",category:"八大菜系",calories:350,cookingTime:60,difficulty:"中等",ingredients:["猪梅花肉500g","蜂蜜3勺","叉烧酱3勺","老抽1勺","玫瑰露酒1勺","蚝油","五香粉"],description:"色泽红润油亮外焦里嫩，甜中带咸，广式烧腊当家花旦。",steps:["梅花肉切成2-3cm厚的条状","加叉烧酱、老抽、玫瑰露酒、蚝油、五香粉腌制4小时以上","烤箱预热200度","腌好的肉放烤网上（下层接油盘）","200度烤20分钟后取出刷一层蜂蜜","翻面再烤15分钟","再次刷蜂蜜，转220度烤5分钟上色","取出晾凉后切片装盘"]},
{id:"yc003",name:"清蒸鲈鱼",cuisine:"粤菜",category:"八大菜系",calories:180,cookingTime:20,difficulty:"简单",ingredients:["鲈鱼1条","姜","葱","蒸鱼豉油","花生油"],description:"鱼肉细嫩鲜甜原汁原味，清蒸是检验鱼鲜的最高标准。",steps:["鲈鱼处理干净，两面各划三刀","鱼身上铺姜片，鱼肚塞葱结和姜片","蒸锅水烧开后放入鱼，大火蒸8-10分钟","取出倒掉蒸盘中的腥水，移除姜葱","重新铺上新鲜葱丝和姜丝","淋上蒸鱼豉油","锅中烧热花生油至冒烟，均匀浇在葱姜丝上即可"]},
{id:"yc004",name:"干炒牛河",cuisine:"粤菜",category:"八大菜系",calories:420,cookingTime:15,difficulty:"困难",ingredients:["河粉300g","牛肉片150g","豆芽100g","韭黄50g","老抽","生抽","蚝油"],description:"镬气十足河粉不碎不粘，牛肉嫩滑，考验师傅火候的经典。",steps:["牛肉片加生抽、料酒、少许淀粉腌制","河粉用手抖散分开（不要用水冲）","锅中多油大火烧至冒烟，下牛肉快速滑炒盛出","留底油放入河粉，大火翻炒至热透","加老抽上色，生抽蚝油调味","倒回牛肉、加豆芽韭黄","大火快速翻炒均匀即可出锅"]},
{id:"yc005",name:"烧鹅",cuisine:"粤菜",category:"八大菜系",calories:500,cookingTime:120,difficulty:"困难",ingredients:["整鹅1只","海鲜酱","柱候酱","麦芽糖","白醋","五香粉","蒜","姜"],description:"皮脆肉嫩汁水丰盈，广式烧腊之王。",steps:["整鹅处理干净，用开水烫皮收紧","腔内外抹匀五香盐腌制2小时","缝住鹅的肛门开口，从颈部灌入酱料","吹气使皮肉分离（皮脆关键），烫皮刷脆皮水","挂通风处风干12小时","200度烤40分钟，转180度再烤40分钟","烤至皮色金红油亮即可斩件"]},
{id:"yc006",name:"白灼虾",cuisine:"粤菜",category:"八大菜系",calories:150,cookingTime:10,difficulty:"简单",ingredients:["活虾500g","姜","葱","米酒","生抽","蒜蓉","辣椒"],description:"虾肉鲜甜弹牙，最简单的烹饪最极致的鲜味。",steps:["虾剪去虾须虾枪，挑去虾线","锅中加水、姜片、葱结、少许米酒烧开","水滚后放入虾","大火煮至虾变红弯曲即捞出（约2-3分钟）","立即放入冰水中冷却（虾肉才Q弹）","捞出沥干装盘","蘸料：生抽+蒜蓉+辣椒圈+少许香油"]},
{id:"yc007",name:"豉汁蒸排骨",cuisine:"粤菜",category:"八大菜系",calories:300,cookingTime:25,difficulty:"简单",ingredients:["猪小排400g","豆豉2勺","蒜","姜","酱油","蚝油","淀粉","白糖"],description:"排骨嫩滑豉香浓郁，广式茶楼必点的蒸点。",steps:["排骨切小段，冲洗干净沥干水分","豆豉用刀背压碎，蒜姜切末","排骨加豆豉、蒜姜末、酱油、蚝油、糖、淀粉拌匀","腌制20分钟入味","将排骨均匀铺在盘子上","蒸锅水开后放入，大火蒸12-15分钟","出锅撒葱花即可"]},
{id:"yc008",name:"咕噜肉",cuisine:"粤菜",category:"八大菜系",calories:420,cookingTime:25,difficulty:"中等",ingredients:["猪梅花肉300g","菠萝半只","青红椒","番茄酱","白醋","白糖","鸡蛋","淀粉"],description:"外酥里嫩酸甜可口，外国人最爱的中餐之一。",steps:["猪肉切块，加盐料酒鸡蛋抓匀，裹上干淀粉","油温六成热下锅炸至金黄捞出","锅中底油，下番茄酱炒香","加白醋、白糖、少许水和淀粉煮至浓稠","放入炸好的肉块和菠萝块青红椒","快速翻炒均匀即可"]},
{id:"yc009",name:"椒盐濑尿虾",cuisine:"粤菜",category:"八大菜系",calories:300,cookingTime:20,difficulty:"中等",ingredients:["濑尿虾500g","蒜","干辣椒","椒盐粉","淀粉","葱花"],description:"外壳酥脆虾肉鲜甜，用手剥着吃的乐趣。",steps:["濑尿虾洗净剪去尖刺，裹上薄薄一层淀粉","油温七八成热，下虾炸至外壳酥脆捞出","留底油爆香蒜末和干辣椒","放入炸好的虾快速翻炒","撒椒盐粉和葱花翻匀即可"]},
{id:"yc010",name:"蒜蓉粉丝蒸扇贝",cuisine:"粤菜",category:"八大菜系",calories:180,cookingTime:15,difficulty:"简单",ingredients:["扇贝8只","粉丝1把","大蒜1整头","小葱","蒸鱼豉油"],description:"蒜香四溢粉丝入味，宴客必备的体面菜。",steps:["扇贝清洗干净，壳肉分离后壳做底","粉丝温水泡软剪段","大蒜捣成蒜蓉，一半入油锅炸至金黄","金银蒜混合加少许盐和蒸鱼豉油调味","壳上铺粉丝，放上扇贝肉","每个扇贝上铺满金银蒜","蒸锅水开大火蒸6-8分钟","取出撒葱花，浇少许热油即可"]},
{id:"yc011",name:"煲仔饭",cuisine:"粤菜",category:"八大菜系",calories:500,cookingTime:30,difficulty:"中等",ingredients:["香米200g","腊肠2根","腊肉100g","青菜","酱油","蚝油","白糖","香油"],description:"米饭粒粒分明锅巴焦香，冬天最温暖的慰藉。",steps:["香米洗净泡30分钟后放入砂锅，加水煮饭","腊肠腊肉切片","饭煮至水快干时铺上腊肠腊肉","盖上盖小火焖10分钟","听到锅底有细微噼啪声时关火","再焖5分钟让锅巴形成","青菜焯水摆入煲中","淋上酱油蚝油糖香油调的汁拌匀"]},
{id:"yc012",name:"滑蛋虾仁",cuisine:"粤菜",category:"八大菜系",calories:250,cookingTime:10,difficulty:"中等",ingredients:["虾仁200g","鸡蛋4个","葱花","盐","料酒","牛奶1勺"],description:"鸡蛋嫩滑如丝绸虾仁Q弹，家常中的极致功夫。",steps:["虾仁加盐料酒腌制5分钟，焯水至变红捞出","鸡蛋打散加少许盐和牛奶搅匀","锅中油烧至五成热，倒入蛋液","用铲子从边缘往中间推，让蛋液慢慢凝固","蛋液半凝固时放入虾仁","继续推至八成熟（不能全熟）立即出锅","撒上葱花"]},
{id:"yc013",name:"豉油皇炒面",cuisine:"粤菜",category:"八大菜系",calories:400,cookingTime:15,difficulty:"中等",ingredients:["蛋面200g","豆芽","韭黄","洋葱","老抽","生抽","蚝油","白糖"],description:"面条干香不腻豉油味浓，早茶夜宵两相宜。",steps:["蛋面煮至八成熟捞出过冷水沥干","调豉油汁：老抽+生抽+蚝油+白糖+少许水","锅中多油大火烧热，下面条翻炒至热透","加入洋葱丝豆芽翻炒","淋入豉油汁大火快速翻炒均匀","加入韭黄翻几下即可出锅"]},
{id:"yc014",name:"姜葱炒蟹",cuisine:"粤菜",category:"八大菜系",calories:280,cookingTime:20,difficulty:"中等",ingredients:["花蟹2只","姜","葱","蒜","料酒","酱油","蚝油","淀粉"],description:"蟹肉鲜甜姜葱提香，海鲜大排档的招牌菜。",steps:["花蟹处理干净，斩件，蟹钳用刀背敲裂","蟹件裹少许淀粉","油温七成热，下蟹块炸至变红捞出","留底油爆香姜片和蒜末","放入炸好的蟹块翻炒","淋料酒、加酱油蚝油翻炒均匀","加少许水焖2分钟让蟹入味","放入大量葱段翻炒几下即可"]},
{id:"yc015",name:"菠萝咕咾虾球",cuisine:"粤菜",category:"八大菜系",calories:320,cookingTime:20,difficulty:"中等",ingredients:["大虾仁300g","菠萝半只","青红椒","番茄酱","白醋","白糖","淀粉"],description:"虾球外酥里嫩酸甜可口，升级版的咕噜系列。",steps:["虾仁开背去虾线，加盐料酒腌制","裹上干淀粉，入油锅炸至金黄卷曲成球","菠萝切块，青红椒切块","锅中放番茄酱、白醋、白糖、水、淀粉煮至浓稠","放入炸好的虾球和菠萝青红椒","快速翻炒均匀即可"]},
{id:"yc016",name:"潮州卤水拼盘",cuisine:"粤菜",category:"八大菜系",calories:400,cookingTime:120,difficulty:"困难",ingredients:["鹅掌","鹅翼","豆腐","鸡蛋","卤水料包（八角桂皮香叶等）"],description:"卤香浓郁回味悠长，潮州卤水天下闻名。",steps:["制作卤水：八角、桂皮、香叶、草果、丁香、南姜等装袋","炒糖色：冰糖加油小火炒至枣红色","锅中水烧开，加入卤料包、糖色、酱油、盐","小火熬制1小时出味","各种食材分别焯水预处理","按难熟顺序依次放入卤水中","小火卤制30-60分钟（视食材而定）","关火后在卤水中浸泡1小时更入味"]},
{id:"yc017",name:"沙茶牛肉",cuisine:"粤菜",category:"八大菜系",calories:320,cookingTime:15,difficulty:"简单",ingredients:["牛肉片300g","沙茶酱2勺","洋葱","青椒","蒜","酱油","淀粉"],description:"沙茶酱香牛肉嫩滑，潮汕风味的经典家常菜。",steps:["牛肉片加酱油、料酒、淀粉和少许水抓匀腌制","锅中油热，下牛肉快速滑炒至变色盛出","留底油炒香蒜末和洋葱丝","加沙茶酱炒出香味","倒回牛肉，加青椒翻炒","加少许水翻炒均匀即可"]},
{id:"yc018",name:"虾饺",cuisine:"粤菜",category:"八大菜系",calories:200,cookingTime:40,difficulty:"困难",ingredients:["澄面150g","生粉50g","虾仁300g","猪肉肥膘50g","笋丁","猪油"],description:"皮薄如纸晶莹剔透，广式早茶的四大天王之首。",steps:["澄面加生粉用沸水烫熟揉成面团，加猪油揉光滑","虾仁一半切粒一半剁泥，加肥膘丁笋丁调味成馅","面团擀成饺子皮（越薄越好）","包入虾馅捏出褶纹（至少12褶）","蒸笼垫油纸或胡萝卜片防粘","摆上虾饺，水开大火蒸6-8分钟","皮变透明即可"]},
{id:"yc019",name:"烧卖",cuisine:"粤菜",category:"八大菜系",calories:280,cookingTime:35,difficulty:"中等",ingredients:["猪肉末300g","虾仁100g","香菇","馄饨皮","蟹籽","酱油","蚝油"],description:"顶上一抹橙红蟹籽，皮薄馅大汁多味美。",steps:["猪肉末加虾仁碎、香菇丁、酱油、蚝油调味搅拌上劲","馄饨皮包入大量肉馅，虎口收紧成花瓶状","顶部用勺压平，点上蟹籽","蒸笼垫油纸，摆入烧卖","水开大火蒸10分钟"]},
{id:"yc020",name:"肠粉",cuisine:"粤菜",category:"八大菜系",calories:280,cookingTime:25,difficulty:"中等",ingredients:["粘米粉150g","澄粉30g","水300ml","油","牛肉/虾仁/鸡蛋等馅料"],description:"薄如纸白如雪滑如丝，广东人从早吃到晚。",steps:["粘米粉加澄粉加水调成米浆","蒸盘刷薄油，舀入一层薄米浆","撒上馅料（牛肉/猪肉/虾仁/鸡蛋）","入蒸锅大火蒸2分钟至皮起泡","用刮刀从一端卷起","装盘淋上甜酱油即可"]},
{id:"yc021",name:"奶黄包",cuisine:"粤菜",category:"八大菜系",calories:300,cookingTime:50,difficulty:"中等",ingredients:["面粉300g","酵母","牛奶","鸡蛋2个","黄油50g","白糖100g","吉士粉"],description:"轻轻掰开金黄奶黄馅缓缓流淌，早茶的甜蜜收尾。",steps:["面粉加酵母牛奶揉成面团发酵1小时","鸡蛋+白糖+牛奶+黄油+吉士粉搅拌均匀","将奶黄糊隔水加热并不断搅拌至浓稠","放凉的奶黄馅分成小球","发好的面团排气揉匀，分成剂子","擀皮包入奶黄馅收口朝下","二次醒发20分钟后蒸10分钟"]},
{id:"yc022",name:"叉烧包",cuisine:"粤菜",category:"八大菜系",calories:320,cookingTime:60,difficulty:"中等",ingredients:["面粉300g","叉烧肉200g","蚝油","糖","洋葱","酵母"],description:"开口笑的叉烧包，甜咸适中松软可口。",steps:["叉烧肉切小丁，加蚝油糖洋葱炒成叉烧馅","面粉加酵母糖水和成面团发酵","发好面团排气揉匀","分剂子擀皮包入叉烧馅","收口时故意留一点开口（开花形状）","二次醒发后大火蒸15分钟"]},
{id:"yc023",name:"豉汁凤爪",cuisine:"粤菜",category:"八大菜系",calories:280,cookingTime:60,difficulty:"中等",ingredients:["鸡爪500g","豆豉","蒜","干辣椒","酱油","蚝油","白糖"],description:"软糯脱骨豉香浓郁，早茶必点的吮指美味。",steps:["鸡爪去指甲，入沸水焯烫捞出","入七成热油锅炸至表面金黄起泡","捞出放入冰水中泡2小时（虎皮关键）","豆豉蒜末炒香，加酱油蚝油糖调成豉汁","鸡爪拌上豉汁和淀粉","入蒸锅大火蒸40分钟至软糯脱骨"]},
{id:"yc024",name:"榴莲酥",cuisine:"粤菜",category:"八大菜系",calories:350,cookingTime:40,difficulty:"困难",ingredients:["酥皮面团","榴莲肉200g","黄油","糖","蛋黄液"],description:"层层酥脆包裹浓郁榴莲馅，酥到掉渣香到陶醉。",steps:["榴莲肉加黄油和糖拌匀成馅","酥皮面团反复折叠擀开形成多层","擀成薄片切成方形","包入榴莲馅折叠成三角或长方形","表面刷蛋黄液","烤箱200度烤15-18分钟至金黄酥脆"]},
{id:"yc025",name:"蛋挞",cuisine:"粤菜",category:"八大菜系",calories:250,cookingTime:30,difficulty:"中等",ingredients:["蛋挞皮","鸡蛋2个","牛奶200ml","白糖60g","淡奶油50ml"],description:"挞皮酥脆蛋液嫩滑，新鲜出炉烫嘴也要抢着吃。",steps:["鸡蛋打散加白糖搅匀","加入牛奶和淡奶油搅拌均匀","将蛋液过滤两遍（更细腻）","蛋挞皮放入模具中","蛋液倒入挞皮中八分满","烤箱200度预热，烤20分钟","烤至挞皮金黄蛋液微焦即可"]},
{id:"yc026",name:"西米露",cuisine:"粤菜",category:"八大菜系",calories:200,cookingTime:25,difficulty:"简单",ingredients:["西米100g","椰浆200ml","芒果","糖","冰块"],description:"晶莹Q弹椰香浓郁，粤式糖水的经典之作。",steps:["西米放入沸水中煮至中间只剩小白点","关火盖盖焖10分钟至完全透明","过冷水沥干（口感更Q弹）","椰浆加糖加热融化放凉","碗中放入煮好的西米","倒入椰浆，加入芒果块和冰块即可"]},
{id:"yc027",name:"杨枝甘露",cuisine:"粤菜",category:"八大菜系",calories:220,cookingTime:20,difficulty:"简单",ingredients:["芒果2个","西柚半个","西米50g","椰浆","淡奶","白糖"],description:"酸甜清爽层次丰富，港式甜品之王。",steps:["西米煮至透明过凉水沥干","芒果一半切丁一半打成泥","西柚剥出果肉撕成小块","芒果泥加椰浆淡奶白糖搅拌均匀","碗中放入西米","倒入芒果椰奶底","放上芒果丁和西柚粒即可"]},
{id:"yc028",name:"避风塘炒蟹",cuisine:"粤菜",category:"八大菜系",calories:400,cookingTime:25,difficulty:"中等",ingredients:["螃蟹2只","蒜1整头","面包糠","干辣椒","椒盐","豆豉"],description:"蒜香酥脆蟹肉鲜甜，香港避风塘的招牌名菜。",steps:["螃蟹处理干净斩件，蟹钳敲裂","大量蒜末入油锅炸至金黄成蒜酥","蟹块裹淀粉入油锅炸至变红捞出","留底油炒香干辣椒和豆豉","倒入蟹块翻炒","加入大量面包糠和蒜酥","撒椒盐大火翻炒均匀即可"]},
{id:"yc029",name:"蚝油生菜",cuisine:"粤菜",category:"八大菜系",calories:80,cookingTime:5,difficulty:"简单",ingredients:["生菜300g","蚝油2勺","蒜","生抽","糖","水淀粉"],description:"清脆爽口蚝香浓郁，最简单的素菜最考验火候。",steps:["生菜洗净沥干","锅中水烧开加少许油和盐","生菜入沸水烫10秒立即捞出摆盘","锅中少油炒香蒜末","加蚝油、生抽、少许糖和水烧开","水淀粉勾薄芡","将蚝油汁浇在生菜上即可"]},
{id:"yc030",name:"沙姜猪手",cuisine:"粤菜",category:"八大菜系",calories:350,cookingTime:90,difficulty:"中等",ingredients:["猪前蹄2只","沙姜50g","酱油","蚝油","冰糖","八角","桂皮"],description:"沙姜独特清香渗入猪蹄，皮Q弹肉入味。",steps:["猪蹄烧毛刮洗干净，焯水","锅中炒糖色放入猪蹄翻炒上色","加酱油、蚝油、冰糖、八角、桂皮","沙姜拍碎放入","加开水没过猪蹄","大火烧开转小火炖1.5小时","收汁至浓稠即可"]},
{id:"yc031",name:"云吞面",cuisine:"粤菜",category:"八大菜系",calories:380,cookingTime:25,difficulty:"中等",ingredients:["银丝面100g","云吞皮","鲜虾仁200g","猪肉末100g","大地鱼粉","鸡汤","韭黄"],description:"汤清味鲜云吞爽滑，广式面食的灵魂代表。",steps:["虾仁和猪肉末调味拌成云吞馅","包云吞：取皮放馅捏合","大地鱼干烤香磨粉加入鸡汤熬汤底","汤底加盐和少许韭黄","面条和云吞分别煮熟","碗中先放面条，再放云吞","冲入滚烫的大地鱼鸡汤"]},
{id:"yc032",name:"艇仔粥",cuisine:"粤菜",category:"八大菜系",calories:300,cookingTime:45,difficulty:"中等",ingredients:["大米100g","鱼片","鱿鱼","虾仁","花生","油条","姜丝","葱花"],description:"料足味鲜粥底绵密，珠江河上的艇家美食。",steps:["大米洗净加油和盐腌制30分钟","锅中水烧开放入腌好的米","大火煮开转小火熬成绵密粥底","鱼片用盐和姜丝腌制","鱿鱼切圈，虾仁处理干净","粥底滚沸时放入海鲜料迅速烫熟","盛入碗中，撒上花生碎、油条段、姜丝葱花"]},
{id:"yc033",name:"干炒牛河",cuisine:"粤菜",category:"八大菜系",calories:420,cookingTime:15,difficulty:"困难",ingredients:["河粉300g","牛肉150g","豆芽","韭黄","老抽","生抽"],description:"镬气十足不粘不碎，广式茶餐厅的灵魂炒粉。",steps:["牛肉切薄片加生抽淀粉腌制","河粉用手抖散分离","大火将锅烧到冒烟，倒油滑锅","下牛肉快速翻炒盛出","锅留底油放入河粉，大火翻炒","加老抽上色、生抽调味","加豆芽韭黄和牛肉大火快炒"]},
{id:"yc034",name:"脆皮烧肉",cuisine:"粤菜",category:"八大菜系",calories:480,cookingTime:90,difficulty:"困难",ingredients:["五花肉1块","盐","五香粉","白醋","粗盐"],description:"皮脆肉嫩入口即化，三层分明金黄酥脆。",steps:["五花肉皮朝下入沸水煮10分钟","取出用针在猪皮上密密扎孔","肉面切几刀方便入味","猪皮抹白醋，肉面抹五香粉和盐","猪皮朝上放入冰箱风干24小时","烤箱200度烤30分钟","取出刮掉猪皮上的粗盐","再入烤箱230度烤15分钟至皮爆脆起泡"]},
{id:"yc035",name:"梅菜扣肉",cuisine:"粤菜",category:"八大菜系",calories:500,cookingTime:120,difficulty:"中等",ingredients:["五花肉400g","梅干菜200g","酱油","老抽","冰糖","八角","姜"],description:"肉烂味香肥而不腻，梅菜吸饱肉汁比肉还香。",steps:["五花肉整块煮至七成熟，皮上抹老抽","锅中多油炸至猪皮金红起泡","捞出放凉切成厚片","梅干菜泡发洗净切碎，炒香","肉片皮朝下码入碗中","梅干菜铺在肉上","加酱油冰糖八角姜上蒸锅大火蒸1.5小时","取出倒扣在盘中"]},
{id:"yc036",name:"萝卜牛腩煲",cuisine:"粤菜",category:"八大菜系",calories:420,cookingTime:120,difficulty:"中等",ingredients:["牛腩500g","白萝卜1根","柱候酱","八角","桂皮","姜","蒜"],description:"牛腩软烂萝卜甜糯，冬日里的暖心砂锅菜。",steps:["牛腩切块焯水去血沫","白萝卜去皮切滚刀块","锅中炒香姜蒜和柱候酱","放入牛腩翻炒上色","加八角和桂皮，加开水没过","大火烧开转小火炖1小时","加入萝卜块继续炖30分钟","至牛腩软烂萝卜透明即可"]},
{id:"yc037",name:"清蒸石斑鱼",cuisine:"粤菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"中等",ingredients:["石斑鱼1条","姜","葱","蒸鱼豉油","花生油"],description:"石斑鱼肉质细嫩鲜美，清蒸是最高礼遇。",steps:["石斑鱼处理干净，鱼身两面划刀","鱼身上铺满姜丝","水开大火蒸10-12分钟","取出倒掉蒸出的腥水","重新铺上新鲜葱丝","淋蒸鱼豉油","浇上滚烫热油即可"]},
{id:"yc038",name:"避风塘炒虾",cuisine:"粤菜",category:"八大菜系",calories:350,cookingTime:20,difficulty:"中等",ingredients:["大虾500g","蒜","面包糠","干辣椒","椒盐","豆豉"],description:"蒜香酥脆虾肉鲜甜，避风塘风味席卷味蕾。",steps:["虾去虾线开背，裹薄淀粉","入油锅炸至外壳酥脆捞出","大量蒜末炸至金黄成蒜酥","锅底留油，炒香干辣椒和豆豉","放入虾和大量面包糠翻炒","撒椒盐翻匀即可"]},
{id:"yc039",name:"咸鱼茄子煲",cuisine:"粤菜",category:"八大菜系",calories:300,cookingTime:20,difficulty:"简单",ingredients:["茄子2根","咸鱼50g","猪肉末100g","姜蒜","蚝油","生抽","糖"],description:"咸鱼独特香味渗入茄子，下饭神菜。",steps:["茄子切条，咸鱼蒸软切碎","锅中多油将茄子炸软捞出","留底油炒香咸鱼碎和猪肉末","加姜蒜炒香","放入茄子加蚝油生抽糖翻炒","加少许水焖2分钟入味"]},
{id:"yc040",name:"叉烧肠粉",cuisine:"粤菜",category:"八大菜系",calories:300,cookingTime:20,difficulty:"中等",ingredients:["粘米粉150g","叉烧肉100g","生菜","甜酱油","芝麻","葱花"],description:"肠粉皮薄滑嫩包裹叉烧，淋上甜酱油是经典搭配。",steps:["粘米粉加水调成米浆","蒸盘刷油舀入米浆","撒上叉烧丁","大火蒸2分钟至皮起泡","用刮刀卷起","装盘淋甜酱油撒芝麻葱花"]},
{id:"yc041",name:"糖不甩",cuisine:"粤菜",category:"八大菜系",calories:280,cookingTime:20,difficulty:"简单",ingredients:["糯米粉200g","红糖","花生碎","芝麻","椰丝"],description:"软糯Q弹甜蜜粘牙，广式传统甜点。",steps:["糯米粉加温水和成面团搓成小圆子","水开下圆子煮至浮起捞出","锅中放红糖和少许水熬成糖浆","放入圆子翻炒裹满糖浆","装盘撒花生碎、芝麻和椰丝"]},
{id:"yc042",name:"啫啫鸡煲",cuisine:"粤菜",category:"八大菜系",calories:450,cookingTime:30,difficulty:"中等",ingredients:["鸡腿肉400g","蒜","姜","葱","洋葱","蚝油","生抽","米酒"],description:"端上桌还在滋滋作响，香气四溢的广式煲仔菜。",steps:["鸡腿肉切块加生抽蚝油腌制20分钟","砂锅大火烧热倒油","放入姜蒜洋葱爆香","放入鸡块翻炒","加盖焖煮15分钟","开盖淋米酒大火收汁","撒葱段即可"]},
{id:"yc043",name:"煎酿三宝",cuisine:"粤菜",category:"八大菜系",calories:300,cookingTime:20,difficulty:"中等",ingredients:["茄子","青椒","豆腐","鱼肉滑/猪肉滑","蚝油","生抽"],description:"煎酿手艺代代相传，广式家常美味的代表。",steps:["茄子、青椒切块去籽，中间挖空","鱼肉滑或猪肉滑调味搅上劲","将肉滑酿入蔬菜中","平底锅油热，酿面朝下先煎","煎至金黄翻面","加少许水和蚝油焖3分钟","收汁即可"]},
{id:"yc044",name:"柱侯牛腩",cuisine:"粤菜",category:"八大菜系",calories:450,cookingTime:150,difficulty:"中等",ingredients:["牛腩500g","柱侯酱3勺","八角","桂皮","陈皮","姜","冰糖"],description:"柱侯酱香浓郁牛腩酥烂，广式牛肉料理经典。",steps:["牛腩切块焯水洗净","锅中炒香姜片和柱侯酱","放入牛腩翻炒上色","加八角桂皮陈皮冰糖","加足量开水大火烧开","转小火慢炖2小时至软烂","大火收汁即可"]},
{id:"yc045",name:"叉烧炒饭",cuisine:"粤菜",category:"八大菜系",calories:450,cookingTime:10,difficulty:"简单",ingredients:["米饭2碗","叉烧肉150g","鸡蛋2个","青豆","玉米粒","葱花"],description:"粒粒分明叉烧香甜，剩饭的最佳归宿。",steps:["叉烧肉切丁","鸡蛋打散炒成蛋碎盛出","锅中油热倒入米饭大火翻炒打散","加入叉烧丁、青豆、玉米粒","加蛋碎翻炒均匀","加盐调味，撒葱花出锅"]},
{id:"yc046",name:"马拉糕",cuisine:"粤菜",category:"八大菜系",calories:250,cookingTime:40,difficulty:"中等",ingredients:["低筋面粉200g","鸡蛋2个","红糖100g","黄油80g","泡打粉","吉士粉"],description:"松软香甜色泽金黄，古法马拉糕气孔均匀。",steps:["鸡蛋加红糖打散至糖融化","融化黄油加入蛋液中","加入面粉、泡打粉、吉士粉拌匀","将面糊倒入模具","蒸锅水开大火蒸25分钟","放凉切块即可"]},
{id:"yc047",name:"炒鲜奶",cuisine:"粤菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"困难",ingredients:["鲜牛奶300ml","蛋清4个","虾仁","火腿","淀粉","盐"],description:"洁白嫩滑如凝脂，考究火候的功夫菜。",steps:["牛奶加蛋清、淀粉、少许盐搅匀过滤","虾仁和火腿切碎","锅中少油小火","倒入奶浆小火不停推动","奶浆慢慢凝固成糊状","加入虾仁和火腿","小心推动至八成熟出锅"]},
{id:"yc048",name:"姜汁撞奶",cuisine:"粤菜",category:"八大菜系",calories:150,cookingTime:10,difficulty:"中等",ingredients:["全脂牛奶300ml","老姜汁2勺","白糖"],description:"姜汁的辛辣与牛奶的醇厚碰撞，凝固如嫩豆腐。",steps:["老姜磨碎挤出姜汁（约2勺）","姜汁放入碗底","牛奶加糖加热至70-80度（冒小泡不沸腾）","将热牛奶从高处冲入姜汁碗中","静置5分钟不要搅动","牛奶会自然凝固成豆腐状","趁热食用"]},
{id:"yc049",name:"香煎萝卜糕",cuisine:"粤菜",category:"八大菜系",calories:280,cookingTime:45,difficulty:"中等",ingredients:["白萝卜1根","粘米粉200g","腊肠","虾米","香菇","盐","白胡椒粉"],description:"外焦里嫩萝卜清甜，早茶必备的传统糕点。",steps:["萝卜去皮刨丝，加少许水煮熟","腊肠虾米香菇切碎炒香","粘米粉加水调成米浆","米浆倒入萝卜丝中搅拌均匀","倒入蒸盘大火蒸40分钟至凝固","放凉后切厚片","平底锅煎至两面金黄即可"]},
{id:"yc050",name:"南乳猪手",cuisine:"粤菜",category:"八大菜系",calories:420,cookingTime:120,difficulty:"中等",ingredients:["猪手2只","南乳2块","蒜","姜","冰糖","八角","老抽"],description:"南乳的独特咸香渗入猪手，皮软糯肉入味。",steps:["猪手剁块焯水洗净","锅中炒香姜蒜和南乳","放入猪手翻炒上色","加冰糖八角老抽","加足量开水没过","大火烧开转小火炖1.5小时","收汁至浓稠"]},
{id:"yc051",name:"蒜蓉菜心",cuisine:"粤菜",category:"八大菜系",calories:80,cookingTime:5,difficulty:"简单",ingredients:["菜心300g","蒜","蚝油","盐"],description:"翠绿爽脆蒜香四溢，广东人餐桌必备的绿叶菜。",steps:["菜心洗净摘去老叶","锅中水烧开加盐和油","菜心焯烫1分钟捞出摆盘","锅中油热炒香蒜末","加蚝油和少许水烧开","浇在菜心上即可"]},
{id:"yc052",name:"咖喱鱼蛋",cuisine:"粤菜",category:"八大菜系",calories:250,cookingTime:20,difficulty:"简单",ingredients:["鱼蛋300g","咖喱块2块","椰浆","洋葱","蒜","土豆"],description:"Q弹鱼蛋裹满咖喱，香港街头小吃的代表。",steps:["洋葱蒜切末炒香","加入咖喱块小火炒化","加水和椰浆搅拌均匀","放入土豆块煮10分钟","放入鱼蛋再煮5分钟","至鱼蛋入味即可"]},
{id:"yc053",name:"菠萝油",cuisine:"粤菜",category:"八大菜系",calories:350,cookingTime:30,difficulty:"中等",ingredients:["高筋面粉300g","黄油","鸡蛋","糖","酵母","盐"],description:"热面包夹冰黄油，冰火交融的港式美味。",steps:["面粉加酵母糖盐鸡蛋揉成面团发酵","发好排气分成小面团","二次发酵后表面刷蛋液","烤箱180度烤15分钟","趁热切开夹入厚片冰黄油"]},
{id:"yc054",name:"凉瓜炒蛋",cuisine:"粤菜",category:"八大菜系",calories:150,cookingTime:10,difficulty:"简单",ingredients:["苦瓜1根","鸡蛋3个","蒜","盐","糖"],description:"苦瓜清热鸡蛋嫩滑，广东人的降火家常菜。",steps:["苦瓜去瓤切薄片，加盐腌制10分钟挤去苦水","焯水30秒捞出","鸡蛋打散加少许盐","锅中油热先炒鸡蛋盛出","锅中再放油炒香蒜末","放入苦瓜翻炒，加少许糖","倒回鸡蛋翻炒均匀"]},
{id:"yc055",name:"皮蛋瘦肉粥",cuisine:"粤菜",category:"八大菜系",calories:280,cookingTime:45,difficulty:"简单",ingredients:["大米100g","皮蛋2个","瘦肉150g","姜丝","葱花","盐","白胡椒粉"],description:"粥底绵密皮蛋瘦肉咸香，广式粥品的经典。",steps:["大米提前浸泡30分钟，沥干加油盐拌匀","瘦肉切丝加盐料酒淀粉腌制","锅中水烧开，放入米大火煮开转小火熬30分钟","放入肉丝和姜丝搅散","皮蛋切小丁放入粥中","继续煮5分钟","加盐白胡椒粉调味，撒葱花"]},
{id:"yc056",name:"上汤娃娃菜",cuisine:"粤菜",category:"八大菜系",calories:120,cookingTime:15,difficulty:"简单",ingredients:["娃娃菜2棵","皮蛋1个","咸鸭蛋1个","火腿","蒜","高汤"],description:"汤汁鲜美娃娃菜甜嫩，宴席必备的上汤素菜。",steps:["娃娃菜切四瓣焯水摆盘","皮蛋和咸鸭蛋切丁","锅中少油炒香蒜瓣","放入皮蛋咸鸭蛋火腿丁翻炒","加入高汤烧开煮3分钟","将汤浇在娃娃菜上即可"]},
{id:"yc057",name:"腐皮卷",cuisine:"粤菜",category:"八大菜系",calories:280,cookingTime:25,difficulty:"中等",ingredients:["豆腐皮","猪肉末","虾仁","香菇","胡萝卜","蚝油","生抽"],description:"腐皮包裹鲜美馅料，煎至金黄外酥里嫩。",steps:["猪肉末虾仁香菇胡萝卜切碎调味成馅","豆腐皮切成方块","将馅料放在腐皮上卷起","收口处用面糊封口","平底锅少油小火慢煎","煎至四面金黄熟透","可配蚝油汁蘸食"]},
{id:"yc058",name:"煎堆",cuisine:"粤菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"中等",ingredients:["糯米粉300g","白糖","白芝麻","红豆沙","泡打粉"],description:"金黄圆润外脆内糯，广东过年必备的吉祥食品。",steps:["糯米粉加白糖水和泡打粉揉成面团","分成小剂子，包入红豆沙馅","搓圆后蘸水滚上白芝麻","油温四成热小火慢炸","不断翻动使其受热均匀","圆子会慢慢膨胀变大","炸至金黄捞出"]},
{id:"yc059",name:"碗仔翅",cuisine:"粤菜",category:"八大菜系",calories:180,cookingTime:20,difficulty:"简单",ingredients:["粉丝","鸡肉丝","木耳","香菇","鸡蛋","高汤","老抽","胡椒粉"],description:"平民版的鱼翅羹，香港街头小吃的暖心汤羹。",steps:["鸡肉丝焯水，木耳香菇切丝","高汤烧开放入鸡肉丝木耳香菇","粉丝泡软放入","加老抽调色，加盐调味","淋入蛋液搅成蛋花","水淀粉勾芡至浓稠","撒上大量胡椒粉和香油"]},
{id:"yc060",name:"鸳鸯奶茶",cuisine:"粤菜",category:"八大菜系",calories:180,cookingTime:10,difficulty:"简单",ingredients:["红茶包2个","咖啡","淡奶","白糖"],description:"咖啡与奶茶的完美融合，港式茶餐厅的灵魂饮品。",steps:["红茶包用沸水冲泡5分钟，取出茶包","咖啡用热水冲好","红茶和咖啡按1：1混合","加入淡奶和白糖搅匀","可热饮也可加冰"]},
// ==================== 鲁菜 (45道) ====================
{id:"lc001",name:"葱烧海参",cuisine:"鲁菜",category:"八大菜系",calories:200,cookingTime:90,difficulty:"困难",ingredients:["海参4只","大葱3根","高汤","酱油","料酒","白糖","水淀粉"],description:"海参软糯弹牙葱香浓郁，鲁菜宴席扛鼎之作。",steps:["海参提前3天泡发，每天换水","泡发好的海参切条，焯水去腥","大葱取葱白切段，入油锅炸至金黄","炸好的葱段盛出，葱油留用","锅中加葱油，下白糖炒糖色","加高汤、酱油、料酒烧开","放入海参和炸好的葱段","小火慢烧20分钟使海参入味","大火收汁，水淀粉勾薄芡即可"]},
{id:"lc002",name:"九转大肠",cuisine:"鲁菜",category:"八大菜系",calories:380,cookingTime:120,difficulty:"困难",ingredients:["猪大肠500g","山楂","桂皮","砂仁","白胡椒粉","白糖","醋","酱油"],description:"色泽红润酸甜苦辣咸五味俱全，九转而功成。",steps:["大肠用面粉和醋反复搓洗至无异味","将大肠套成双层（口感更厚实）","冷水下锅焯水去腥","锅中炒糖色至枣红色，加开水","放入大肠和各种香料（桂皮砂仁山楂等）","小火卤制1小时至大肠能用筷子扎透","捞出切段","原汁大火收浓浇在大肠上即可"]},
{id:"lc003",name:"糖醋鲤鱼",cuisine:"鲁菜",category:"八大菜系",calories:350,cookingTime:40,difficulty:"中等",ingredients:["黄河鲤鱼1条","醋3勺","白糖4勺","番茄酱","水淀粉","姜蒜末"],description:"鱼身金黄弯曲如跃龙门，浇上酸甜酱汁外酥里嫩。",steps:["鲤鱼处理干净，两面打花刀","鱼身上抹盐和料酒腌制10分钟","裹上厚厚一层水淀粉糊","手提鱼尾倒挂，用热油浇淋使鱼身定型弯曲","再将整条鱼放入油锅炸至金黄酥脆","另起锅炒糖醋汁：白糖+醋+番茄酱+水煮开","水淀粉勾芡至浓稠","将汁浇在鱼身上即可"]},
{id:"lc004",name:"油焖大虾",cuisine:"鲁菜",category:"八大菜系",calories:300,cookingTime:20,difficulty:"简单",ingredients:["大虾500g","姜","葱","番茄酱","料酒","白糖","盐","水淀粉"],description:"色泽红亮虾肉鲜甜，咸甜适口吮指回味。",steps:["大虾剪去须脚，开背去虾线","锅中油热放入虾，小火煎至两面变红","用铲子按压虾头挤出虾油","加入姜丝和葱段炒香","加料酒、番茄酱、白糖、盐和少许水","大火烧开后转小火焖3分钟","水淀粉勾薄芡收汁即可"]},
{id:"lc005",name:"四喜丸子",cuisine:"鲁菜",category:"八大菜系",calories:500,cookingTime:60,difficulty:"中等",ingredients:["猪肉末400g","马蹄100g","鸡蛋1个","淀粉","酱油","姜葱","八角"],description:"四个大肉丸寓意福禄寿喜，软嫩鲜香入口即化。",steps:["猪肉末（肥瘦3：7）加姜葱水搅拌上劲","马蹄切碎加入肉馅中，再加鸡蛋和淀粉拌匀","将肉馅团成四个大丸子","油温七成热下丸子炸至表面金黄定型","锅中加高汤、酱油、八角、姜片烧开","放入炸好的丸子","小火慢炖40分钟","捞出装盘，汤汁勾芡浇上"]},
{id:"lc006",name:"爆炒腰花",cuisine:"鲁菜",category:"八大菜系",calories:250,cookingTime:15,difficulty:"困难",ingredients:["猪腰2个","木耳","青椒","红椒","酱油","醋","料酒","淀粉"],description:"麦穗花刀考验刀工，急火快炒脆嫩无腥。",steps:["猪腰剖开片去白色筋膜（一定要去干净否则腥）","斜刀和直刀交叉切出麦穗花纹（不切断）","切成小块，加料酒淀粉抓匀","快速焯水5秒捞出","锅中大火热油，下腰花快速翻炒","加木耳青红椒翻炒","淋入碗芡（酱油醋料酒淀粉）急火快炒出锅"]},
{id:"lc007",name:"锅塌豆腐",cuisine:"鲁菜",category:"八大菜系",calories:220,cookingTime:20,difficulty:"中等",ingredients:["北豆腐1块","鸡蛋2个","面粉","鸡汤","酱油","料酒","葱姜"],description:"豆腐裹蛋液煎至金黄，再用汤汁塌制入味软嫩。",steps:["豆腐切厚片，用盐和料酒腌制5分钟","豆腐片拍上面粉，裹上蛋液","平底锅油热放入豆腐，小火煎至两面金黄","锅中加鸡汤、酱油、料酒、葱姜末","大火烧开转小火塌制5分钟","收汁即可"]},
{id:"lc008",name:"酱爆鸡丁",cuisine:"鲁菜",category:"八大菜系",calories:320,cookingTime:20,difficulty:"中等",ingredients:["鸡胸肉300g","黄瓜1根","甜面酱2勺","白糖","酱油","淀粉"],description:"酱香浓郁鸡肉嫩滑，鲁菜酱爆技法的经典之作。",steps:["鸡胸肉切丁加盐料酒淀粉抓匀","黄瓜切丁","锅中油热下鸡丁滑炒至变色盛出","锅留底油，小火将甜面酱炒香","加白糖和少许酱油","倒入鸡丁和黄瓜丁大火翻炒","酱汁均匀包裹即可"]},
{id:"lc009",name:"红烧大虾",cuisine:"鲁菜",category:"八大菜系",calories:320,cookingTime:20,difficulty:"简单",ingredients:["大虾500g","酱油","白糖","料酒","姜","葱","蒜"],description:"色泽红亮味道鲜美，鲁菜海鲜料理的经典。",steps:["大虾去虾线开背","锅中油热放入大虾煎至两面变红","加姜蒜末炒香","加酱油、白糖、料酒和少量水","大火烧开转小火焖3分钟","收汁撒葱花即可"]},
{id:"lc010",name:"赛螃蟹",cuisine:"鲁菜",category:"八大菜系",calories:200,cookingTime:10,difficulty:"简单",ingredients:["鸡蛋4个","姜","醋","盐","糖","黄酒"],description:"用鸡蛋模拟蟹肉口感，软嫩鲜香以假乱真。",steps:["蛋清和蛋黄分开打散","姜切极细的末，加醋糖调成姜醋汁","锅中油热，先倒入蛋清滑炒至凝固盛出","再倒蛋黄滑炒","倒回蛋清翻炒","淋入姜醋汁快速翻匀即可"]},
{id:"lc011",name:"清汤燕菜",cuisine:"鲁菜",category:"八大菜系",calories:100,cookingTime:180,difficulty:"困难",ingredients:["燕窝","清鸡汤","火腿丝","盐"],description:"汤清如水鲜美无比，鲁菜高档宴席的清汤代表。",steps:["燕窝提前泡发挑净杂质","清鸡汤用鸡茸扫汤法反复澄清至透明","发好的燕窝放入碗中","倒入滚烫的澄清鸡汤","放上火腿丝即可"]},
{id:"lc012",name:"木须肉",cuisine:"鲁菜",category:"八大菜系",calories:280,cookingTime:15,difficulty:"简单",ingredients:["猪里脊150g","鸡蛋2个","木耳","黄花菜","黄瓜","酱油","料酒"],description:"荤素搭配色彩丰富，鲁菜最家常的代表菜。",steps:["猪肉切片加料酒酱油腌制","鸡蛋打散炒成蛋碎盛出","锅中油热下肉片滑炒","加木耳黄花菜翻炒","倒回蛋碎和黄瓜片","加酱油调味翻炒均匀"]},
{id:"lc013",name:"炝锅面",cuisine:"鲁菜",category:"八大菜系",calories:400,cookingTime:20,difficulty:"简单",ingredients:["面条200g","猪肉片100g","木耳","青菜","酱油","醋","胡椒粉","葱花"],description:"炝锅的烟火气渗透到面汤里，一碗暖到心底。",steps:["锅中油热下肉片煸炒出油","加入葱花和酱油炝锅","加入足量开水","水开后下面条煮熟","加木耳和青菜","加醋和胡椒粉调味"]},
{id:"lc014",name:"奶汤蒲菜",cuisine:"鲁菜",category:"八大菜系",calories:120,cookingTime:20,difficulty:"中等",ingredients:["蒲菜300g","奶汤（猪骨汤）","火腿","姜","盐"],description:"汤白如奶蒲菜清甜，济南特有的汤菜。",steps:["蒲菜去老皮留嫩心切段","奶汤大火烧开","放入蒲菜煮3分钟","加火腿丝和盐调味即可"]},
{id:"lc015",name:"拔丝山药",cuisine:"鲁菜",category:"八大菜系",calories:300,cookingTime:25,difficulty:"困难",ingredients:["山药500g","白糖200g","食用油","芝麻"],description:"金丝缕缕糖衣酥脆，考验火候的鲁菜甜品。",steps:["山药去皮切滚刀块，入油锅炸至金黄熟透","锅中少油加白糖","小火慢炒至糖完全融化变成琥珀色","迅速倒入炸好的山药块","快速翻匀使每块山药裹上糖浆","装盘时能拉出长长的糖丝","配凉水蘸食更脆"]},
{id:"lc016",name:"酥锅",cuisine:"鲁菜",category:"八大菜系",calories:450,cookingTime:180,difficulty:"中等",ingredients:["五花肉","海带","藕","白菜","豆腐","鱼干","酱油","醋","糖"],description:"一层一层码入锅中慢炖，酸甜咸香冷吃更佳。",steps:["所有食材处理好切片或段","砂锅底铺一层白菜帮","然后码入五花肉、海带、藕、豆腐、鱼干","每层之间再铺白菜","加入酱油醋糖等调味料","最上面盖白菜叶","小火慢炖2-3小时","放凉后切块食用"]},
{id:"lc017",name:"葱爆羊肉",cuisine:"鲁菜",category:"八大菜系",calories:350,cookingTime:10,difficulty:"简单",ingredients:["羊肉片300g","大葱3根","酱油","料酒","孜然粉","姜"],description:"大葱的辛香与羊肉的鲜美碰撞，急火快炒一气呵成。",steps:["羊肉切薄片，加料酒酱油腌制10分钟","大葱切滚刀块","锅中大火热油至冒烟","下羊肉快速滑炒至变色","放入大葱和姜丝","加酱油和孜然粉","大火快速翻炒30秒出锅"]},
{id:"lc018",name:"芙蓉鸡片",cuisine:"鲁菜",category:"八大菜系",calories:200,cookingTime:20,difficulty:"困难",ingredients:["鸡胸肉200g","鸡蛋清4个","淀粉","鸡汤","盐","火腿"],description:"鸡片白如芙蓉嫩滑无比，考验手艺的精细鲁菜。",steps:["鸡胸肉去筋砸成泥","加入蛋清和淀粉顺一个方向搅拌成鸡浆","锅中宽油三四成热","将鸡浆用勺舀成薄片滑入油中","鸡片浮起变白捞出","另锅加鸡汤烧开，放入鸡片","加盐调味，火腿末点缀"]},
{id:"lc019",name:"扒酿海参",cuisine:"鲁菜",category:"八大菜系",calories:250,cookingTime:60,difficulty:"困难",ingredients:["海参4只","猪肉末200g","虾仁","高汤","酱油","淀粉"],description:"海参腹中酿入鲜美肉馅，扒制入味软糯鲜香。",steps:["海参泡发好洗净","猪肉末加虾仁碎调味搅拌上劲","将肉馅酿入海参腹中","上蒸锅蒸15分钟定型","另锅加高汤酱油烧开","放入蒸好的海参","小火扒制15分钟入味","勾芡收汁"]},
{id:"lc020",name:"一品豆腐",cuisine:"鲁菜",category:"八大菜系",calories:280,cookingTime:30,difficulty:"中等",ingredients:["嫩豆腐1块","虾仁","火腿","香菇","鸡蛋清","鸡汤"],description:"豆腐上铺满珍味蒸制，清鲜嫩滑宴席大菜。",steps:["豆腐切成大方块，中间挖一个浅坑","虾仁火腿香菇切丁加蛋清调味","将馅料填在豆腐坑中","入蒸锅大火蒸10分钟","另起锅加鸡汤勾薄芡","浇在豆腐上即可"]},
{id:"lc021",name:"醋椒鱼",cuisine:"鲁菜",category:"八大菜系",calories:200,cookingTime:30,difficulty:"中等",ingredients:["鲤鱼1条","醋5勺","白胡椒粉","葱姜丝","香菜","高汤"],description:"酸辣适中汤清鱼嫩，一道开胃暖身的汤菜。",steps:["鲤鱼处理干净两面划刀","锅中水烧开放入鱼煮至熟透捞出","另锅加高汤烧开","加大量醋和白胡椒粉","放入葱姜丝和香菜","将鱼放入汤中即可"]},
{id:"lc022",name:"干烧鱼",cuisine:"鲁菜",category:"八大菜系",calories:350,cookingTime:40,difficulty:"中等",ingredients:["鲤鱼1条","猪肉末","香菇丁","笋丁","豆瓣酱","酱油","糖","醋"],description:"汤汁收干滋味渗入每条鱼肉，咸甜微辣回味悠长。",steps:["鲤鱼处理干净划刀，入油锅煎至两面金黄盛出","锅中炒香猪肉末","加豆瓣酱香菇丁笋丁炒香","加酱油糖醋和适量水","放入煎好的鱼","大火烧开转小火慢烧15分钟","大火收干汤汁即可"]},
{id:"lc023",name:"鸡茸干贝",cuisine:"鲁菜",category:"八大菜系",calories:180,cookingTime:20,difficulty:"中等",ingredients:["干贝50g","鸡胸肉150g","鸡蛋清","鸡汤","淀粉","盐"],description:"鸡茸洁白干贝鲜美，一勺入口即化的精细菜。",steps:["干贝泡发后撕成丝","鸡胸肉砸成泥加蛋清淀粉搅拌成鸡茸","鸡汤烧开转小火","将鸡茸缓缓倒入汤中搅散","放入干贝丝","加盐调味勾薄芡"]},
{id:"lc024",name:"山东煎饼",cuisine:"鲁菜",category:"八大菜系",calories:250,cookingTime:20,difficulty:"中等",ingredients:["小米面","黄豆面","小麦粉","鸡蛋","葱花","甜面酱","薄脆"],description:"薄如纸韧如皮卷天下万物，山东人的精神食粮。",steps:["三种面粉混合加水调成稀面糊","鏊子烧热刷薄油","舀一勺面糊用刮板快速摊开","打一个鸡蛋刮匀","撒葱花芝麻","翻面烙片刻","抹甜面酱放薄脆和喜欢的菜","卷起即可"]},
{id:"lc025",name:"坛子肉",cuisine:"鲁菜",category:"八大菜系",calories:500,cookingTime:180,difficulty:"中等",ingredients:["五花肉500g","酱油","冰糖","黄酒","八角","桂皮","姜","葱"],description:"小坛密封慢火细炖，肉质酥烂油脂尽出香而不腻。",steps:["五花肉切大方块焯水","小坛底铺姜片葱段","放入肉块","加酱油冰糖黄酒八角桂皮","坛口密封","小火慢炖2-3小时","开坛时香气扑鼻","肉酥烂入口即化"]},
{id:"lc026",name:"煎饼卷大葱",cuisine:"鲁菜",category:"八大菜系",calories:300,cookingTime:10,difficulty:"简单",ingredients:["杂粮煎饼","大葱","甜面酱","鸡蛋","虾皮"],description:"煎饼卷大葱蘸酱，山东人最朴素的美味。",steps:["大葱切段","煎饼摊开","抹上甜面酱","放大葱段","可加鸡蛋和虾皮","紧紧卷起即可"]},
{id:"lc027",name:"德州扒鸡",cuisine:"鲁菜",category:"八大菜系",calories:400,cookingTime:180,difficulty:"中等",ingredients:["整鸡1只","酱油","蜂蜜","八角","桂皮","花椒","姜","丁香"],description:"五香脱骨肉烂味醇，中国四大名鸡之一。",steps:["整鸡处理干净造型固定","表面抹蜂蜜晾干","锅中多油将鸡炸至金黄","卤锅加水和所有香料","放入鸡大火烧开","转小火扒制2小时","至骨肉分离即可"]},
{id:"lc028",name:"红烧蹄筋",cuisine:"鲁菜",category:"八大菜系",calories:280,cookingTime:90,difficulty:"中等",ingredients:["猪蹄筋或牛蹄筋300g","酱油","冰糖","黄酒","八角","姜","葱"],description:"蹄筋软糯Q弹吸饱汤汁，胶原蛋白满满。",steps:["蹄筋提前泡发（或买发好的）","切段焯水","锅中炒糖色放入蹄筋翻炒","加酱油黄酒八角姜葱","加开水小火慢炖1小时","大火收汁即可"]},
{id:"lc029",name:"烩乌鱼蛋",cuisine:"鲁菜",category:"八大菜系",calories:120,cookingTime:30,difficulty:"中等",ingredients:["乌鱼蛋200g","鸡汤","醋","白胡椒粉","香菜","淀粉"],description:"酸辣开胃鲜香滑嫩，鲁菜经典汤羹。",steps:["乌鱼蛋洗净撕成薄片","鸡汤烧开放入乌鱼蛋","加盐醋白胡椒粉调味","水淀粉勾薄芡","撒上香菜即可"]},
{id:"lc030",name:"醋溜白菜",cuisine:"鲁菜",category:"八大菜系",calories:100,cookingTime:10,difficulty:"简单",ingredients:["大白菜500g","干辣椒","花椒","醋","酱油","糖","淀粉"],description:"酸辣脆爽开胃解腻，最简单却最下饭的素菜。",steps:["白菜帮片成薄片","调碗汁：醋+酱油+糖+淀粉+水","锅中油热下干辣椒花椒爆香","放入白菜大火翻炒","白菜变软出水时淋入碗汁","快速翻炒均匀出锅"]},
{id:"lc031",name:"黄焖鸡",cuisine:"鲁菜",category:"八大菜系",calories:420,cookingTime:40,difficulty:"中等",ingredients:["鸡腿肉400g","香菇","土豆","青椒","酱油","黄豆酱","冰糖","姜"],description:"汤汁浓郁鸡肉嫩滑，鲁菜家常滋味的极致。",steps:["鸡腿斩块焯水","锅中炒糖色放入鸡块翻炒","加黄豆酱和酱油炒香","加姜片和足量开水","放入香菇和土豆","中火焖煮25分钟","放入青椒大火收汁"]},
{id:"lc032",name:"干烧大虾",cuisine:"鲁菜",category:"八大菜系",calories:350,cookingTime:25,difficulty:"中等",ingredients:["大虾8只","猪肉末50g","豆瓣酱","番茄酱","糖","醋","姜蒜"],description:"汤汁收干味道浓缩，每只虾都裹满浓郁酱汁。",steps:["大虾去虾线开背","入油锅略煎至变红盛出","锅中炒香猪肉末","加豆瓣酱番茄酱姜蒜炒香","加少许水和糖醋","放入大虾烧5分钟","大火收干汤汁"]},
{id:"lc033",name:"糟熘鱼片",cuisine:"鲁菜",category:"八大菜系",calories:200,cookingTime:20,difficulty:"中等",ingredients:["鱼肉片300g","香糟酒","木耳","鸡蛋清","淀粉","鸡汤"],description:"糟香浓郁鱼片嫩滑，鲁菜香糟技法的代表。",steps:["鱼肉片加蛋清淀粉上浆","锅中水微沸将鱼片滑熟捞出","另锅加鸡汤和香糟酒烧开","加盐糖调味","放入鱼片和木耳","勾薄芡轻轻推匀"]},
{id:"lc034",name:"清炒虾仁",cuisine:"鲁菜",category:"八大菜系",calories:180,cookingTime:10,difficulty:"简单",ingredients:["虾仁300g","鸡蛋清","淀粉","盐","料酒","葱姜"],description:"虾仁洁白晶莹弹嫩，火候精准的清炒功夫。",steps:["虾仁加蛋清盐料酒淀粉上浆","油温四成热下虾仁滑散","虾仁变白立即捞出","锅中留底油爆香葱姜","倒入虾仁快速翻炒","少许盐调味出锅"]},
{id:"lc035",name:"冰糖肘子",cuisine:"鲁菜",category:"八大菜系",calories:550,cookingTime:180,difficulty:"中等",ingredients:["猪肘子1只","冰糖100g","酱油","料酒","八角","桂皮","姜"],description:"色泽红亮皮糯肉烂，宴席上的压轴硬菜。",steps:["肘子烧毛刮洗干净","冷水煮开后撇去浮沫","炒糖色加水烧开成糖色水","放入肘子加酱油料酒八角桂皮姜","大火烧开转小火炖2.5小时","至皮糯肉烂可用筷子轻松扎透","大火收汁即可"]},
{id:"lc036",name:"油爆双脆",cuisine:"鲁菜",category:"八大菜系",calories:280,cookingTime:15,difficulty:"困难",ingredients:["猪肚尖","鸡胗","青椒","红椒","蒜","料酒","盐"],description:"一脆一嫩口感对比分明，急火快炒的功夫菜。",steps:["猪肚尖和鸡胗分别切花刀","焯水5秒立即捞出","大火热油至冒烟","下双脆快速翻炒10秒","加青红椒和调味","快速翻炒出锅（整个过程不超过30秒）"]},
{id:"lc037",name:"水晶肘子",cuisine:"鲁菜",category:"八大菜系",calories:350,cookingTime:120,difficulty:"中等",ingredients:["猪肘子1只","猪皮","花椒","八角","姜","蒜泥蘸料"],description:"晶莹剔透如水晶，清凉爽口蘸蒜泥酱吃。",steps:["肘子和猪皮焯水去毛","锅中加水、花椒、八角、姜煮1.5小时","取出肘子去骨压入模具","汤汁过滤后倒入模具","冷藏凝固成冻","切片蘸蒜泥酱油食用"]},
{id:"lc038",name:"玫瑰锅炸",cuisine:"鲁菜",category:"八大菜系",calories:300,cookingTime:30,difficulty:"中等",ingredients:["鸡蛋2个","面粉","淀粉","白糖","玫瑰酱","食用油"],description:"外酥里嫩浇上玫瑰糖浆，鲁菜传统甜品。",steps:["鸡蛋打散加面粉和水搅成稠糊","倒入锅中小火不停搅拌至熟透浓稠","倒入抹油的盘中抹平放凉","凝固后切条","裹上干淀粉入油锅炸至金黄","白糖加水熬成糖浆，加玫瑰酱","浇在炸好的锅炸上"]},
{id:"lc039",name:"芫爆肚丝",cuisine:"鲁菜",category:"八大菜系",calories:220,cookingTime:15,difficulty:"中等",ingredients:["猪肚300g","香菜（芫荽）","蒜","白胡椒粉","醋","料酒"],description:"香菜清香与肚丝脆嫩完美搭配，清爽利落。",steps:["猪肚煮熟切丝","香菜切段","锅中大火热油爆香蒜末","放入肚丝快速翻炒","淋料酒和醋","加白胡椒粉和盐","放入香菜快速翻炒10秒出锅"]},
{id:"lc040",name:"糖醋里脊",cuisine:"鲁菜",category:"八大菜系",calories:380,cookingTime:20,difficulty:"中等",ingredients:["猪里脊300g","鸡蛋","面粉","淀粉","番茄酱","醋","白糖"],description:"外酥里嫩酸甜可口，老少皆宜的家常美味。",steps:["里脊肉切条，加盐料酒腌制","鸡蛋面粉淀粉调成糊","肉条裹上面糊入油炸至金黄","调糖醋汁：番茄酱+醋+白糖+水+淀粉","锅中烧开糖醋汁","放入炸好的里脊快速翻炒均匀"]},
{id:"lc041",name:"翡翠虾环",cuisine:"鲁菜",category:"八大菜系",calories:180,cookingTime:15,difficulty:"简单",ingredients:["虾仁200g","黄瓜","鸡蛋清","淀粉","盐","鸡汤"],description:"虾仁洁白黄瓜翠绿，清新雅致如翡翠。",steps:["虾仁加蛋清淀粉上浆","黄瓜切段挖空中间成环","虾仁滑油至变色捞出","锅中加鸡汤调味","放入虾仁和黄瓜环","快速翻炒勾薄芡"]},
{id:"lc042",name:"清炸大肠",cuisine:"鲁菜",category:"八大菜系",calories:400,cookingTime:40,difficulty:"中等",ingredients:["熟大肠300g","葱","花椒盐","酱油","料酒"],description:"外酥里嫩蘸椒盐，越嚼越香的下酒好菜。",steps:["熟大肠切段，表面划几刀","加酱油料酒腌制10分钟","油温七八成热放入大肠","炸至表面金黄酥脆捞出","切小段配葱丝和花椒盐食用"]},
{id:"lc043",name:"烩两丁",cuisine:"鲁菜",category:"八大菜系",calories:200,cookingTime:15,difficulty:"简单",ingredients:["虾仁","海参","笋丁","鸡汤","鸡蛋清","淀粉","盐"],description:"虾仁和海参切成细丁，用鸡汤烩制极尽鲜美。",steps:["虾仁和海参分别切小丁","虾仁丁加蛋清淀粉上浆滑熟","锅中加鸡汤烧开","放入虾仁丁、海参丁和笋丁","加盐调味","水淀粉勾薄芡"]},
{id:"lc044",name:"三不沾",cuisine:"鲁菜",category:"八大菜系",calories:250,cookingTime:20,difficulty:"困难",ingredients:["鸡蛋黄5个","白糖100g","淀粉","猪油"],description:"不粘盘不粘筷不粘牙，神奇的三不沾考验功夫。",steps:["蛋黄加白糖和水淀粉充分搅匀过滤","锅中放猪油烧热","倒入蛋黄糊","中小火不断用手勺推搅","持续推搅约10-15分钟","至糊状变成固体不粘锅","盛盘即可"]},
{id:"lc045",name:"炸烹虾段",cuisine:"鲁菜",category:"八大菜系",calories:320,cookingTime:15,difficulty:"中等",ingredients:["大虾500g","葱姜丝","蒜片","酱油","醋","料酒","淀粉"],description:"先炸后烹虾壳酥脆，酸甜咸香口味丰富。",steps:["大虾去虾线切段，裹干淀粉","入油锅炸至虾壳酥脆捞出","碗中调汁：酱油+醋+料酒+少许水","锅中留底油爆香葱姜丝蒜片","倒入虾段和调好的汁","大火快速烹炒均匀"]},
// ==================== 苏菜 (40道) ====================
{id:"suc001",name:"松鼠桂鱼",cuisine:"苏菜",category:"八大菜系",calories:400,cookingTime:45,difficulty:"困难",ingredients:["桂鱼1条","番茄酱","松子","虾仁","青豆","白醋","白糖","淀粉"],description:"刀工精湛形似松鼠，酸甜可口外酥里嫩苏菜代表作。",steps:["桂鱼处理干净，去骨留尾","鱼肉切菱形花刀（肉断皮不断）","加盐料酒腌制后裹上干淀粉","油温七成热，将鱼肉炸至金黄蓬松形似松鼠","另起锅炒番茄酱+白醋+白糖+水+淀粉调酸甜汁","浇在炸好的鱼上","撒上松子、虾仁和青豆"]},
{id:"suc002",name:"清炖蟹粉狮子头",cuisine:"苏菜",category:"八大菜系",calories:350,cookingTime:120,difficulty:"困难",ingredients:["五花肉500g","蟹粉100g","马蹄","鸡蛋","清鸡汤","青菜"],description:"口感软嫩入口即化蟹粉提鲜，肥而不腻淮扬名菜。",steps:["五花肉切成石榴籽大小的丁（不能剁成泥）","加蟹粉、马蹄丁、蛋清、葱姜水搅拌上劲","团成大肉丸（狮子头）","砂锅中放入清鸡汤","将狮子头轻轻放入汤中","上面盖一片白菜叶防止表面干燥","小火慢炖2小时（不能滚沸）","最后放入烫好的青菜即可"]},
{id:"suc003",name:"大煮干丝",cuisine:"苏菜",category:"八大菜系",calories:180,cookingTime:30,difficulty:"中等",ingredients:["白豆腐干300g","火腿","虾仁","鸡汤","鸡丝","青菜"],description:"刀工细腻干丝如发汤清味醇，看似清淡实则极尽鲜美。",steps:["白豆腐干片成薄片再切成细丝（越细越好）","干丝入沸水烫2次去豆腥","砂锅中加鸡汤烧开","放入干丝、火腿丝、虾仁、鸡丝","小火煮10分钟入味","加盐调味，放入烫好的青菜","出锅撒少许白胡椒粉"]},
{id:"suc004",name:"叫花鸡",cuisine:"苏菜",category:"八大菜系",calories:450,cookingTime:180,difficulty:"困难",ingredients:["三黄鸡1只","荷叶","黄酒","香菇","火腿","姜葱","盐"],description:"荷叶包裹泥土烤制，香气四溢鸡肉酥烂入味。",steps:["整鸡处理干净，用黄酒盐姜葱腌制2小时","鸡腹中塞入香菇火腿","用荷叶将鸡包裹严实","再用锡纸紧密包裹","和好的黄泥涂在锡纸外面（或直接进烤箱）","烤箱180度烤2小时","敲开泥壳剥开荷叶即可"]},
{id:"suc005",name:"盐水鸭",cuisine:"苏菜",category:"八大菜系",calories:300,cookingTime:120,difficulty:"中等",ingredients:["整鸭1只","盐","花椒","八角","姜","葱","料酒"],description:"皮白肉红骨绿，咸香鲜嫩不腥不柴的南京名片。",steps:["盐和花椒入锅干炒至微黄出香味","将热椒盐均匀抹在鸭身内外腌制4小时","锅中水烧开加姜葱料酒八角","放入腌好的鸭子","大火烧开转小火煮40分钟","关火后在汤中浸泡1小时入味","捞出晾凉斩件"]},
{id:"suc006",name:"无锡排骨",cuisine:"苏菜",category:"八大菜系",calories:480,cookingTime:90,difficulty:"中等",ingredients:["猪排骨500g","酱油","冰糖","黄酒","红曲粉","姜","八角","桂皮"],description:"色泽红亮甜中带咸骨香肉烂，无锡的城市名片。",steps:["排骨斩段焯水洗净","锅中少油加冰糖炒糖色","放入排骨翻炒上色","加酱油、黄酒、姜、八角、桂皮","加开水没过排骨大火烧开转小火","加红曲粉使颜色红亮","炖1小时至排骨软烂","大火收汁至汤汁浓稠包裹排骨"]},
{id:"suc007",name:"扬州炒饭",cuisine:"苏菜",category:"八大菜系",calories:500,cookingTime:15,difficulty:"中等",ingredients:["米饭2碗","鸡蛋3个","虾仁","火腿","青豆","玉米粒","葱花"],description:"粒粒分明配料丰富，扬州的碎金饭天下闻名。",steps:["米饭提前煮好晾凉（隔夜饭最佳）","虾仁焯水，火腿切丁","鸡蛋打散，锅中多油炒成蛋碎盛出","锅中放油烧热，倒入米饭大火翻炒","将饭粒炒散炒透","加入所有配料翻炒","加盐调味，撒葱花出锅"]},
{id:"suc008",name:"糖醋排骨",cuisine:"苏菜",category:"八大菜系",calories:420,cookingTime:45,difficulty:"中等",ingredients:["猪小排400g","醋3勺","冰糖30g","酱油","料酒","姜"],description:"排骨软烂酸甜适口，冷吃也不腻的江南做法。",steps:["排骨斩段焯水洗净","锅中少油小火将冰糖炒至融化微黄","加水烧开制成糖色水","放入排骨，加酱油、料酒、姜","大火烧开转小火炖30分钟","加醋和冰糖，继续炖10分钟","大火收汁至浓稠"]},
{id:"suc009",name:"文思豆腐",cuisine:"苏菜",category:"八大菜系",calories:100,cookingTime:30,difficulty:"困难",ingredients:["嫩豆腐1块","火腿","香菇","青菜","鸡汤","盐"],description:"豆腐切丝细如发丝在汤中飘如云雾，刀工极致。",steps:["嫩豆腐先片成薄片再切成细丝（极考验刀工）","将豆腐丝放入清水中轻轻散开","火腿、香菇切同样细的丝","鸡汤烧开，加盐调味","将豆腐丝捞入汤中，小火煮2分钟","放入火腿丝香菇丝和青菜丝即可"]},
{id:"suc010",name:"响油鳝糊",cuisine:"苏菜",category:"八大菜系",calories:350,cookingTime:25,difficulty:"中等",ingredients:["鳝鱼300g","蒜","姜","酱油","糖","白胡椒粉","香油"],description:"鳝鱼嫩滑上桌浇热油，吱吱作响香气四溢。",steps:["鳝鱼处理干净切段","锅中油热下鳝段翻炒","加姜蒜酱油糖调味","水淀粉勾芡成糊","出锅装盘中间挖一小坑","放上蒜末和白胡椒粉","上桌后浇一勺滚烫热油"]},
{id:"suc011",name:"鸡汁煮干丝",cuisine:"苏菜",category:"八大菜系",calories:180,cookingTime:25,difficulty:"中等",ingredients:["白豆腐干300g","鸡清汤","火腿丝","虾仁","鸡丝","小油菜"],description:"鸡汤煨制干丝吸足鲜味，入口软嫩汤清味浓。",steps:["白豆干片薄片再切细丝","干丝入沸水烫两次去豆腥","砂锅加鸡清汤烧开","放入干丝小火煮10分钟","放入火腿丝、虾仁、鸡丝","加盐调味","最后放入烫好的小油菜"]},
{id:"suc012",name:"梁溪脆鳝",cuisine:"苏菜",category:"八大菜系",calories:400,cookingTime:30,difficulty:"中等",ingredients:["鳝鱼500g","酱油","糖","醋","姜丝","淀粉"],description:"鳝鱼炸至酥脆如枯枝，酸甜可口无锡名菜。",steps:["鳝鱼去骨切长段，加酱油腌制","裹上干淀粉","油温七成热炸至酥脆捞出","另锅加酱油糖醋熬成浓汁","放入炸好的鳝鱼快速翻匀","装盘放上姜丝"]},
{id:"suc013",name:"平桥豆腐",cuisine:"苏菜",category:"八大菜系",calories:150,cookingTime:20,difficulty:"简单",ingredients:["嫩豆腐1块","鸡汤","火腿末","虾仁","鸡蛋清"],description:"豆腐切菱角片在鸡汤中煨制，简简单单却鲜美无比。",steps:["豆腐切成小菱角片","鸡汤烧开放入豆腐片","小火煨10分钟","放入虾仁","淋入蛋清搅成蛋花","撒火腿末即可"]},
